name: windows-build (feasibility)

# ★목적: Windows x64 자기완결 설치파일(cys-terminal + cysjavis 팩 + bash/python 런타임) 빌드·검증.
#   feat/windows-x64-dist 브랜치 push 시 자동 실행 → setup.exe 를 Actions 아티팩트로 업로드.
#   release.yml(태그 트리거·공개 repo 발행)과 완전 독립 — 이 잡은 어떤 릴리스도 만들지 않는다.
#   미서명(프로파일 A). createUpdaterArtifacts=false 라 서명키 불요.

on:
  push:
    branches: ['feat/windows-x64-dist']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ★시크릿/개인정보 발행 hard-gate (빌드·임베드 전 최우선 — fail-fast). git-추적 전 트리를
      # fail-closed로 스캔해 개인 홈경로·개인 프로필 디렉토리·개인 계정 핸들·이메일·키토큰
      # 누출을 차단한다. 비0이면 워크플로우 실패. windows 러너라 Git Bash로 실행(shell: bash).
      - name: Secret/PII scan (pre-build hard-gate)
        shell: bash
        run: bash scripts/secret-scan.sh --all

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust (x86_64-pc-windows-msvc = 러너 네이티브)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: windows-x64-feasibility

      - name: 동봉 런타임 준비 (PortableGit + Python embeddable)
        shell: bash
        run: |
          set -euo pipefail
          RT="src-tauri/runtime"
          rm -rf "$RT"; mkdir -p "$RT"
          echo "== PortableGit 2.55.0 (bash + coreutils + git) =="
          curl -fL -o pg.7z.exe "https://github.com/git-for-windows/git/releases/download/v2.55.0.windows.1/PortableGit-2.55.0-64-bit.7z.exe"
          7z x pg.7z.exe -o"$RT/git" -y >/dev/null
          # 안전한 경량화: 문서·매뉴얼만 제거(런타임 기능 무관).
          rm -rf "$RT/git/mingw64/share/doc" "$RT/git/usr/share/doc" \
                 "$RT/git/mingw64/share/man" "$RT/git/usr/share/man" 2>/dev/null || true
          echo "== Python 3.12.10 embeddable (stdlib + _sqlite3 + ssl) =="
          curl -fL -o py.zip "https://www.python.org/ftp/python/3.12.10/python-3.12.10-embed-amd64.zip"
          7z x py.zip -o"$RT/python" -y >/dev/null
          cp "$RT/python/python.exe" "$RT/python/python3.exe"
          # embeddable ._pth: 스크립트 dir(.) + site 활성화(형제 import·표준 경로 계산 존중).
          printf 'python312.zip\n.\nimport site\n' > "$RT/python/python312._pth"
          # ── pip 부트스트랩 (embeddable은 pip 미포함 → 'No module named pip' 방지) ──
          echo "== get-pip (embeddable python pip 부트스트랩) =="
          curl -fL -o "$RT/python/get-pip.py" "https://bootstrap.pypa.io/get-pip.py"
          "$RT/python/python.exe" "$RT/python/get-pip.py" --no-warn-script-location
          rm -f "$RT/python/get-pip.py"
          # ── uv/uvx 동봉 (serena·nlm-mcp-cli가 uvx 전제 → C20/C43 FAIL 방지). runtime/python은 cysd가 PATH 주입. ──
          echo "== uv 0.11.26 (x86_64-pc-windows-msvc) 동봉 =="
          curl -fL -o uv.zip "https://github.com/astral-sh/uv/releases/download/0.11.26/uv-x86_64-pc-windows-msvc.zip"
          7z x uv.zip -o"$RT/python" -y >/dev/null
          ls -la "$RT/python/uv.exe" "$RT/python/uvx.exe"
          # ── node + npm/npx 동봉 (mac 0.7.0 파리티 — 순정 Windows엔 node 부재. runtime/node는 cysd가 PATH 주입) ──
          echo "== Node.js 22.17.1 (npm/npx — win-x64, mac과 동일 핀) =="
          curl -fL -o node.zip "https://nodejs.org/dist/v22.17.1/node-v22.17.1-win-x64.zip"
          7z x node.zip -o"$RT" -y >/dev/null
          mv "$RT/node-v22.17.1-win-x64" "$RT/node"
          ls -la "$RT/node/node.exe" "$RT/node/npm.cmd"
          # 라이선스 고지(동봉 재배포 의무).
          mkdir -p "$RT/LICENSES"
          printf 'Bundled runtimes and their licenses:\n- Git for Windows (git): GPLv2 (https://github.com/git-for-windows/git)\n- MSYS2 bash + GNU coreutils: GPLv3\n- CPython (embeddable): PSF License (https://www.python.org)\n- pip (get-pip bootstrap): MIT\n- uv (astral-sh): Apache-2.0 OR MIT (https://github.com/astral-sh/uv)\n- Node.js (+npm/npx): MIT (https://nodejs.org)\nWritten offer for corresponding source: contact the distributor.\n' > "$RT/LICENSES/BUNDLED-RUNTIMES.txt"
          echo "== 확인 =="
          ls -la "$RT/git/usr/bin/bash.exe" "$RT/git/cmd/git.exe" "$RT/python/python3.exe"
          du -sh "$RT" "$RT/git" "$RT/python" || true

      - name: Build Windows x64 (Tauri → NSIS setup.exe)
        shell: bash
        env:
          PYTHONUTF8: '1'   # Windows Python 기본 cp1252 stdout에서 한국어 print 크래시 방지
        run: |
          # createUpdaterArtifacts=false 인라인 override — 이 잡은 서명키 없는 가능성 빌드라
          # updater 서명 산출을 끈다(릴리스 경로 release.yml은 windows conf 기본값 true+서명키 사용).
          bunx @tauri-apps/cli@2 build --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload NSIS installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cys-windows-x64-nsis
          path: |
            target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: 자기완결 검증 (silent install → 동봉 bash·python3 실행)
        shell: pwsh
        run: |
          $exe = Get-ChildItem target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          if (-not $exe) { throw "setup.exe 없음" }
          Write-Host ("installer: {0}  size={1}MB" -f $exe.FullName, [math]::Round($exe.Length/1MB,1))
          Start-Process -FilePath $exe.FullName -ArgumentList '/S' -Wait
          Start-Sleep -Seconds 6
          Get-Process cys,cysd -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          $inst = Get-ChildItem "$env:LOCALAPPDATA" -Recurse -Filter cysd.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $inst) { throw "설치 후 cysd.exe 를 LOCALAPPDATA 아래에서 못 찾음" }
          $dir = $inst.Directory.FullName
          $rt = Join-Path $dir 'runtime'
          Write-Host "install dir: $dir"
          Write-Host "== runtime top-level =="; if (Test-Path $rt) { Get-ChildItem $rt | Select-Object -ExpandProperty Name } else { throw "runtime 폴더 없음: $rt" }
          # cysd PATH 주입이 기대하는 정확 경로(구조 보존 시): runtime\git\usr\bin\bash.exe · runtime\python\python3.exe
          $bash = Get-ChildItem -Path $rt -Recurse -Filter bash.exe -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -match 'git\\usr\\bin\\bash\.exe$' } | Select-Object -First 1
          if (-not $bash) { $bash = Get-ChildItem -Path $rt -Recurse -Filter bash.exe -ErrorAction SilentlyContinue | Select-Object -First 1 }
          $py = Get-ChildItem -Path $rt -Recurse -Filter python3.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          Write-Host "bash: $($bash.FullName)"
          Write-Host "python3: $($py.FullName)"
          if (-not $bash) { throw "동봉 bash.exe 를 runtime 아래에서 못 찾음" }
          if (-not $py)   { throw "동봉 python3.exe 를 runtime 아래에서 못 찾음" }
          # cysd 하드코딩 경로와 실제 구조 일치 확인(불일치 시 명시 실패 → cysd PATH 주입도 교정 필요).
          if ($bash.FullName -notmatch 'runtime\\git\\usr\\bin\\bash\.exe$') { throw "bash 경로가 cysd 기대(runtime\git\usr\bin)와 불일치: $($bash.FullName)" }
          if ($py.FullName   -notmatch 'runtime\\python\\python3\.exe$')     { throw "python3 경로가 cysd 기대(runtime\python)와 불일치: $($py.FullName)" }
          & $bash.FullName --version
          & $py.FullName --version
          & $py.FullName -c "import sqlite3, ssl, json, hashlib, urllib.request, ast; print('embeddable stdlib OK (sqlite3+ssl+json+hashlib+urllib+ast)')"
          if ($LASTEXITCODE -ne 0) { throw "동봉 python3 stdlib import 실패" }
          Write-Host "OK: 자기완결 런타임 설치·실행·경로일치 검증 통과"

      - name: PTY 스모크 (검은 pane 회귀 게이트 — ConPTY 셸 출력·실행 실측)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $inst = Get-ChildItem "$env:LOCALAPPDATA" -Recurse -Filter cysd.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $inst) { throw "설치된 cysd.exe 미발견" }
          $dir = $inst.Directory.FullName
          $cys = Join-Path $dir 'cys.exe'
          # list가 형제 cysd를 자동 기동(4초 대기 내장) — ping은 순수 프로브라 autostart가
          # 의도적으로 꺼져 있어(cys.rs) 부트스트랩에 못 쓴다. 첫 시도 실패 시 1회 재시도.
          & $cys list; if ($LASTEXITCODE -ne 0) { Start-Sleep -Seconds 3; & $cys list }
          if ($LASTEXITCODE -ne 0) { throw "cysd 기동 실패 (named pipe 미응답)" }
          $ref = (& $cys new-surface --title pty-smoke | Select-Object -Last 1).Trim()
          if (-not $ref) { throw "new-surface 실패" }
          Write-Host "surface: $ref"
          # ① 셸 프롬프트 도달 실측 — 검은 pane 회귀 시 여기서 실패한다.
          #    (ConPTY 자식이 pseudoconsole에 못 붙으면 출력이 PTY에 영영 도달하지 않는다.)
          $deadline = (Get-Date).AddSeconds(60); $screen = ''
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Seconds 3
            $screen = (& $cys read-screen --surface $ref) -join "`n"
            if ($screen -match 'PS ') { break }
          }
          Write-Host "== screen(prompt) =="; Write-Host $screen
          if ($screen -notmatch '\S') { throw "PTY 출력 0바이트 — 검은 pane 회귀 (셸 출력이 pseudoconsole에 도달하지 않음)" }
          if ($screen -notmatch 'PS ') { throw "PowerShell 프롬프트 미검출 — 셸이 pseudoconsole에 붙지 않았거나 즉시 종료" }
          # ② 입력→실행→출력 왕복 실측 — 문자열 연결 결과는 셸이 실제 평가해야만 화면에 나타난다
          #    (타이핑 에코만으로는 'cys-exec-proof' 원문이 등장하지 않게 조합).
          & $cys send --surface $ref "echo ('cys-exec-' + 'proof')"
          & $cys send-key --surface $ref Return
          $deadline = (Get-Date).AddSeconds(40); $ok = $false
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Seconds 3
            $screen = (& $cys read-screen --surface $ref) -join "`n"
            if ($screen -match 'cys-exec-proof') { $ok = $true; break }
          }
          if (-not $ok) { Write-Host "== screen(roundtrip) =="; Write-Host $screen; throw "실행 왕복 실패 — PTY 입력 또는 셸 실행 경로 결함" }
          Write-Host "OK: ConPTY 프롬프트·실행 왕복 실측 통과"
          Get-Process cys,cysd -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue

      # ─────────────────────────────────────────────────────────────────────────
      # T3 기능 스모크 (WINFIX_T3_SMOKE_PLAN.md · row별 PASS/FAIL). release 무관.
      # 행별 결과를 "T3-N RESULT: PASS|FAIL" 로 stdout에 남긴다(매트릭스 승격 판독원). 크리티컬 행만 throw.
      # ─────────────────────────────────────────────────────────────────────────
      - name: T3 기능 스모크 (온보딩·hook·env주입·부서·python3)
        shell: pwsh
        timeout-minutes: 12   # ★백스톱: 어떤 하위 호출이 hang해도 12분에 스텝 종료(6h 방지)
        run: |
          $inst = Get-ChildItem "$env:LOCALAPPDATA" -Recurse -Filter cysd.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $inst) { throw "설치된 cysd.exe 미발견" }
          $dir = $inst.Directory.FullName
          $cys = Join-Path $dir 'cys.exe'
          $results = @{}
          $userHome = $env:USERPROFILE
          function Rec($id,$ok,$note){ $results["$id"] = [bool]$ok; Write-Host ("T3-{0} RESULT: {1}  {2}" -f $id, ($(if($ok){'PASS'}else{'FAIL'})), $note) }
          # ★바운드 실행: 외부 exe가 hang해도 스텝이 멈추지 않게 timeout kill. @{Code;Out} 반환(Code=-1=timeout).
          function Bx($exe,$argv,$ms){
            $o=[System.IO.Path]::GetTempFileName(); $e=[System.IO.Path]::GetTempFileName()
            try {
              $p=Start-Process -FilePath $exe -ArgumentList $argv -NoNewWindow -PassThru -RedirectStandardOutput $o -RedirectStandardError $e
              if(-not $p.WaitForExit($ms)){ try{$p.Kill($true)}catch{}; Write-Host ("  [timeout {0}ms] {1} {2}" -f $ms,$exe,($argv -join ' ')); return @{Code=-1;Out=''} }
              $out=Get-Content $o -Raw -ErrorAction SilentlyContinue
              $er=Get-Content $e -Raw -ErrorAction SilentlyContinue
              return @{Code=$p.ExitCode;Out="$out$er"}
            } finally { Remove-Item $o,$e -Force -ErrorAction SilentlyContinue }
          }

          # ── T3-1/T3-2: 온보딩(init-pack) + hook 등록·내용(RC-1·RC-2) ──
          try {
            (Bx $cys @('init-pack') 60000).Out | Out-Host
            $packOk = Test-Path (Join-Path $userHome '.cys\pack\agents.json')
            $settings = @(Get-ChildItem (Join-Path $userHome '.cys\claude\settings.json'),(Join-Path $userHome '.claude\settings.json') -ErrorAction SilentlyContinue)
            $hookCmd = ''
            foreach ($s in $settings) { try { $j=Get-Content $s.FullName -Raw|ConvertFrom-Json; $c=$j.hooks.SessionStart.hooks.command; if($c){$hookCmd="$c"} } catch {} }
            Rec 1 ($packOk) "pack=$packOk"
            Rec 2 ($hookCmd -match '^bash "') "hookCmd=$hookCmd"
          } catch { Rec 1 $false "$_"; Rec 2 $false "$_" }

          # ── T3-1b(autostart) daemon install → schtasks 등록 + ★진짜 KeepAlive(RestartOnFailure·ExecutionTimeLimit PT0S) ──
          try {
            (Bx $cys @('daemon','install') 30000).Out | Out-Host
            $q = (schtasks /Query /TN cysd 2>&1); $reg = ($LASTEXITCODE -eq 0)
            $xml = (schtasks /Query /TN cysd /XML 2>&1) -join "`n"
            $hasRof = ($xml -match 'RestartOnFailure'); $hasPt0 = ($xml -match 'PT0S')
            Rec '1b' ($reg -and $hasRof -and $hasPt0) "cysd reg=$reg RestartOnFailure=$hasRof ExecTimeLimit_PT0S=$hasPt0"
          } catch { Rec '1b' $false "$_" }

          # ── 데몬 기동(named pipe 바인드·RC-4 기본) — 바운드 ──
          $r = Bx $cys @('list') 30000; if ($r.Code -ne 0) { Start-Sleep 3; $r = Bx $cys @('list') 30000 }
          Rec 'pipe' ($r.Code -eq 0) "named pipe bind (code=$($r.Code))"

          # ── T3-13: python3 해소(RC-12) — 동봉 runtime python3.exe 실재+실행 ──
          try { $py = Join-Path $dir 'runtime\python\python3.exe'; $rp = Bx $py @('-c','print(1)') 15000; Rec 13 ($rp.Code -eq 0 -and (Test-Path $py)) "python3=$py code=$($rp.Code)" } catch { Rec 13 $false "$_" }

          # ── T3-3(env주입 메커니즘·스텁): claude 실로그인 불가 → 스텁 에이전트로 env 주입만 검증(전부 바운드) ──
          try {
            $py = Join-Path $dir 'runtime\python\python3.exe'
            $aj = Join-Path $userHome '.cys\pack\agents.json'
            $pyprog = 'import json,sys; aj=sys.argv[1]; d=json.load(open(aj,encoding="utf-8")); d["stubenv"]={"cmd":"Write-Host CCDPROOF=$env:CLAUDE_CONFIG_DIR","env":{"CLAUDE_CONFIG_DIR":"${CYS_ACCOUNT_DIR:-ENVINJECT_OK}"},"inject_delay_secs":3,"ready_marker":"CCDPROOF=","clear_cmd":"/clear"}; json.dump(d,open(aj,"w",encoding="utf-8"),ensure_ascii=False,indent=2); print("stubenv OK")'
            # 복잡인자(공백·$·따옴표)는 Bx(Start-Process 재-quoting)가 깨뜨림 → 직접 & 호출(빠른 파일쓰기·hang 무).
            & $py -c $pyprog $aj | Out-Host
            (Bx $cys @('launch-agent','--role','worker','--agent','stubenv') 90000).Out | Out-Host
            & $cys send --to worker 'Write-Host CCDFRESH=$env:CLAUDE_CONFIG_DIR' 2>&1 | Out-Null
            & $cys send-key --to worker Return 2>&1 | Out-Null
            $envProof=$false; $scr=''
            $deadline=(Get-Date).AddSeconds(40)
            while((Get-Date) -lt $deadline){ Start-Sleep 3; $scr=(Bx $cys @('read-screen','--to','worker') 15000).Out; if($scr -match 'CCDFRESH=ENVINJECT_OK'){$envProof=$true;break} }
            if (-not $envProof) { Write-Host "== stub screen =="; Write-Host $scr }
            Rec 3 $envProof "env주입 스텁 CCDFRESH=ENVINJECT_OK (해소+주입 E2E · claude 실발동은 오너 실기 마커)"
          } catch { Rec 3 $false "$_" }

          # ── T3-7/T3-10: 부서 스폰·로그(RC-5/6/15·단일부서·전부 바운드) ──
          try {
            $bash = Join-Path $dir 'runtime\git\usr\bin\bash.exe'
            $deptTool = Join-Path $userHome '.cys\pack\bin\cys-dept'
            $env:PATH = "$dir;$(Join-Path $dir 'runtime\git\usr\bin');$(Join-Path $dir 'runtime\python');$env:PATH"
            $env:CYS_DEPT_DEFAULT_ACCOUNT = 'citest'   # 부서 계정격리 base 해석용(미설정 시 allocate fail-closed exit5)
            $r = Bx $bash @($deptTool,'allocate') 60000; Write-Host "cys-dept allocate: $($r.Out)"
            $name = (($r.Out -split "`n") | Where-Object { $_ -match '^dept-\d+' } | Select-Object -Last 1)
            if ($name) { $name = $name.Trim() }
            $deptOk = ($r.Code -eq 0 -and $name -match '^dept-\d+$')
            $logdir = Join-Path $env:LOCALAPPDATA "cys\cys-dept-$name"
            Start-Sleep 3
            $logOk = ($deptOk -and (Test-Path (Join-Path $logdir 'cysd.log')))
            Rec 7 $deptOk "cys-dept allocate → $name (code=$($r.Code))"
            Rec 10 $logOk "dept_logdir cysd.log @ $logdir"
            if ($deptOk) { (Bx $bash @($deptTool,'down',$name) 30000) | Out-Null }
          } catch { Rec 7 $false "$_"; Rec 10 $false "$_" }

          # ── 집계 + 크리티컬 게이트 ──
          Write-Host "== T3 SMOKE 집계 =="
          $results.GetEnumerator() | Sort-Object Name | ForEach-Object { Write-Host ("  T3-{0}: {1}" -f $_.Key, ($(if($_.Value){'PASS'}else{'FAIL'}))) }
          Get-Process cys,cysd -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          $crit = @('1','2','1b','pipe','13')
          $failed = $crit | Where-Object { -not $results["$_"] }
          if ($failed) { throw ("크리티컬 T3 행 실패: " + ($failed -join ',')) }
          Write-Host "OK: T3 크리티컬 스모크 통과 (나머지 행은 집계 로그로 승격 판독)"

      # ─────────────────────────────────────────────────────────────────────────
      # T4 무중단 재설치 스모크 (P1 rename-swap + P1b 잔해청소 — nsis-hooks.nsh의 실기기 검증).
      # 핵심 assert: 라이브 데몬+세션 위로 setup.exe /S 재설치 → 데몬 PID 불변·세션 생존·
      # cysd.prev.exe 존재(kill이 아니라 rename이었다는 증거) → 새 cysd 기동 시 prev 청소(P1b).
      # + T4-9/10 rotate_daemon 프리미티브(P3 지연 핸드오프): lame-duck 데몬의 drain 봉사·PID 세대교체.
      # 이 기능은 "업데이트=전 세션 사망" 불안을 없애는 축이라 실기기 검증 없이 출하 금지.
      # ─────────────────────────────────────────────────────────────────────────
      - name: T4 무중단 재설치 스모크 (rename-swap 데몬 생존)
        shell: pwsh
        timeout-minutes: 10
        run: |
          $ErrorActionPreference = 'Stop'
          function Bx($exe,$argv,$ms){
            $o=[System.IO.Path]::GetTempFileName(); $e=[System.IO.Path]::GetTempFileName()
            try {
              $p=Start-Process -FilePath $exe -ArgumentList $argv -NoNewWindow -PassThru -RedirectStandardOutput $o -RedirectStandardError $e
              if(-not $p.WaitForExit($ms)){ try{$p.Kill($true)}catch{}; return @{Code=-1;Out=''} }
              return @{Code=$p.ExitCode;Out="$(Get-Content $o -Raw -ErrorAction SilentlyContinue)$(Get-Content $e -Raw -ErrorAction SilentlyContinue)"}
            } finally { Remove-Item $o,$e -Force -ErrorAction SilentlyContinue }
          }
          $inst = Get-ChildItem "$env:LOCALAPPDATA" -Recurse -Filter cysd.exe -ErrorAction SilentlyContinue | Where-Object { $_.Name -eq 'cysd.exe' } | Select-Object -First 1
          if (-not $inst) { throw "T4: 설치된 cysd.exe 미발견" }
          $dir = $inst.Directory.FullName; $cys = Join-Path $dir 'cys.exe'; $cysd = $inst.FullName
          $setup = Get-ChildItem target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          if (-not $setup) { throw "T4: setup.exe 미발견" }

          # ① 데몬 기동 + PID 기록 + 라이브 세션(role=master 셸) 생성
          Get-Process cys,cysd -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep 1
          Start-Process -FilePath $cysd -WindowStyle Hidden
          $r = $null; foreach($i in 1..20){ Start-Sleep 1; $r = Bx $cys @('list') 15000; if($r.Code -eq 0){ break } }
          if ($r.Code -ne 0) { throw "T4: 데몬 기동 실패(pipe 미응답)" }
          $pidBefore = (Get-Process cysd | Select-Object -First 1).Id
          (Bx $cys @('new-surface','--role','master') 30000).Out | Out-Host
          $before = (Bx $cys @('list') 15000).Out
          if ($before -notmatch 'role=master') { throw "T4: 사전 세션 생성 실패: $before" }
          # ①' 실장애 재현(2026-07-02 msys-2.0.dll Can't write → Abort): 라이브 bash가 runtime DLL을
          # 로드한 상태로 재설치한다 — T4 초판은 PowerShell 셸이라 이 잠금을 재현 못 해 놓쳤다.
          $bash = Join-Path $dir 'runtime\git\usr\bin\bash.exe'
          # ArgumentList 배열은 공백 인자 quoting을 잃는다(PS Start-Process 고질) → 단일 문자열로 전달
          $bp = Start-Process -FilePath $bash -ArgumentList '-c "sleep 600"' -PassThru -WindowStyle Hidden
          Start-Sleep 2
          if ($bp.HasExited) { throw "T4: bash 잠금 프로세스 기동 실패" }
          Write-Host "T4 사전상태: daemon pid=$pidBefore, master surface 생성됨, bash(msys DLL 잠금) pid=$($bp.Id)"

          # ② 라이브 상태 그대로 silent 재설치 (rename-swap 경로)
          $ri = Start-Process -FilePath $setup.FullName -ArgumentList '/S' -PassThru -Wait
          Write-Host ("T4-1 RESULT: {0}  reinstall exit={1}" -f ($(if($ri.ExitCode -eq 0){'PASS'}else{'FAIL'})), $ri.ExitCode)
          if ($ri.ExitCode -ne 0) { throw "T4-1: 재설치 실패 exit=$($ri.ExitCode)" }
          Start-Sleep 2

          # ③ assert: 데몬 PID 불변 + pipe 응답 + 세션 생존 + prev 존재 + 새 cysd.exe 존재
          $alive = Get-Process -Id $pidBefore -ErrorAction SilentlyContinue
          Write-Host ("T4-2 RESULT: {0}  daemon pid={1} alive" -f ($(if($alive){'PASS'}else{'FAIL'})), $pidBefore)
          $after = (Bx $cys @('list') 20000)
          $sessOk = ($after.Code -eq 0 -and $after.Out -match 'role=master')
          Write-Host ("T4-3 RESULT: {0}  pipe+session (code={1})" -f ($(if($sessOk){'PASS'}else{'FAIL'})), $after.Code)
          $prevOk = Test-Path (Join-Path $dir 'cysd.prev.exe')
          Write-Host ("T4-4 RESULT: {0}  cysd.prev.exe 존재(rename 증거)" -f ($(if($prevOk){'PASS'}else{'FAIL'})))
          $newOk = Test-Path $cysd
          Write-Host ("T4-5 RESULT: {0}  새 cysd.exe 존재" -f ($(if($newOk){'PASS'}else{'FAIL'})))
          $bashAlive = -not $bp.HasExited
          Write-Host ("T4-7 RESULT: {0}  잠금 bash 생존(무사망)" -f ($(if($bashAlive){'PASS'}else{'FAIL'})))
          $msysOk = Test-Path (Join-Path $dir 'runtime\git\usr\bin\msys-2.0.dll')
          Write-Host ("T4-8 RESULT: {0}  msys-2.0.dll 신본 추출(잠금 스윕 검증)" -f ($(if($msysOk){'PASS'}else{'FAIL'})))
          if (-not ($alive -and $sessOk -and $prevOk -and $newOk -and $bashAlive -and $msysOk)) { Write-Host "== after list =="; Write-Host $after.Out; throw "T4: 무중단 재설치 assert 실패" }

          # ③' T4-9 rotate_daemon 1단계 스모크: 스큐(lame-duck) 상태의 구 데몬이 drain RPC를 봉사하는지.
          # rotate_daemon(src-tauri/main.rs)은 drain을 best-effort(let _ =)로 취급하므로 exit 코드는
          # 로그만 남기고(비0 허용 = 프로덕션 의미론 동일), 워치독 내 완주(hang 아님)만 게이트한다.
          $dr = Bx $cys @('drain') 30000
          $drOk = ($dr.Code -ne -1)
          Write-Host ("T4-9 RESULT: {0}  drain 완주(lame-duck 데몬 RPC, exit={1})" -f ($(if($drOk){'PASS'}else{'FAIL'})), $dr.Code)
          if (-not $drOk) { throw "T4-9: drain이 워치독(30s) 내 미완주 — lame-duck 데몬 hang" }

          # ④ P1b: 잠금 해제(bash 종료) → 구 데몬 종료 → 새 cysd 기동 → prev 잔해 재귀 자가청소 assert
          try { $bp.Kill($true) } catch {}
          Stop-Process -Id $pidBefore -Force; Start-Sleep 2
          Start-Process -FilePath $cysd -WindowStyle Hidden
          $r2 = $null; foreach($i in 1..20){ Start-Sleep 1; $r2 = Bx $cys @('list') 15000; if($r2.Code -eq 0){ break } }
          if ($r2.Code -ne 0) { throw "T4: 새 데몬 기동 실패" }
          Start-Sleep 2
          # T4-10 rotate 세대교체 증거: 새 데몬 PID ≠ 구 PID (교대가 재사용이 아니라 신 바이너리 프로세스).
          $pidAfter = (Get-Process cysd | Select-Object -First 1).Id
          $swapOk = ($pidAfter -ne $pidBefore)
          Write-Host ("T4-10 RESULT: {0}  데몬 세대교체(신 pid={1} ≠ 구 pid={2})" -f ($(if($swapOk){'PASS'}else{'FAIL'})), $pidAfter, $pidBefore)
          $rootPrev = Test-Path (Join-Path $dir 'cysd.prev.exe')
          $rtPrev = @(Get-ChildItem (Join-Path $dir 'runtime') -Recurse -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -like '*.prev*' }).Count
          $cleaned = (-not $rootPrev) -and ($rtPrev -eq 0)
          Write-Host ("T4-6 RESULT: {0}  새 cysd 기동 후 prev 잔해 재귀 청소(P1b — root+runtime, 잔존 {1}개)" -f ($(if($cleaned){'PASS'}else{'FAIL'})), $rtPrev)
          Get-Process cys,cysd -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          if (-not $cleaned) { throw "T4-6: prev 잔해 미청소" }
          if (-not $swapOk) { throw "T4-10: 데몬 세대교체 실패(PID 불변 — 구 데몬 잔존)" }
          Write-Host "OK: T4 무중단 재설치 스모크 전행 통과 — 업데이트 중 데몬·세션 무사망 실증"

      # ─────────────────────────────────────────────────────────────────────────
      # T5 피닉스(불사조 무손실 복원) Windows 패리티 스모크 (S1~S5 + 진짜 KeepAlive 실측).
      # 경로/파이프 매핑·supervisor(schtasks)·재시작 프리미티브(identify→taskkill→파이프해제→retrigger→epoch delta)
      # ·snapshot+독립 runbook(.ps1)·stub restore(M9 VERIFIED)·deploy --plan exit 계약 + ★케이스⑦ 진짜 KeepAlive
      # (RestartOnFailure: taskkill→스케줄러 자동 재기동→epoch delta·유발 없이 순수 관측)을 결정론·자기완결로 검증한다.
      # 스모크는 checkout 된 repo 경로에서 직접 실행(pack 임베드 비의존)하고 동봉 python3 + 설치된 cys/cysd 를 구동한다.
      # 실패 시 throw(=게이트) — T4 관용과 정합. mac unix 하네스(javis_phoenix_harness.py)는 무접촉.
      # ─────────────────────────────────────────────────────────────────────────
      - name: T5 피닉스 Windows 패리티 스모크 (무손실 복원 S1~S5 + KeepAlive)
        shell: pwsh
        timeout-minutes: 20   # ★백스톱: 케이스⑦ RestartOnFailure 실전 재기동 지연 ~4분(예산 420s)+①~⑥ ~3분+오버헤드 → ~11-12분·여유 상향(hang은 스모크 롤링 워치독이 잡음)
        env:
          PYTHONUTF8: '1'     # 한글 stdout cp1252 크래시 방지(RC-16 관례)
        run: |
          $ErrorActionPreference = 'Stop'
          $inst = Get-ChildItem "$env:LOCALAPPDATA" -Recurse -Filter cysd.exe -ErrorAction SilentlyContinue | Where-Object { $_.Name -eq 'cysd.exe' } | Select-Object -First 1
          if (-not $inst) { throw "T5: 설치된 cysd.exe 미발견" }
          $dir = $inst.Directory.FullName
          $cys = Join-Path $dir 'cys.exe'
          $cysd = $inst.FullName
          $py = Join-Path $dir 'runtime\python\python3.exe'
          if (-not (Test-Path $py))  { throw "T5: 동봉 python3.exe 미발견: $py" }
          if (-not (Test-Path $cys)) { throw "T5: 설치된 cys.exe 미발견: $cys" }
          $smoke = Join-Path (Get-Location) 'cysjavis-pack\bin\javis_phoenix_win_smoke.py'
          if (-not (Test-Path $smoke)) { throw "T5: 스모크 파일 미발견(checkout 경로): $smoke" }
          Write-Host "cys=$cys"; Write-Host "cysd=$cysd"; Write-Host "py=$py"; Write-Host "smoke=$smoke"
          # 사전 정리(이전 스텝 잔류 데몬) — 스모크는 테스트 전용 파이프(cys-phxsmoke-*)를 쓰지만 결정성 위해 정돈.
          Get-Process cys,cysd -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep 1
          $env:PHOENIX_CYS = $cys
          $env:PHOENIX_CYSD = $cysd
          & $py $smoke
          $code = $LASTEXITCODE
          # ★케이스⑦ 정리: 실 cysd 스케줄러 태스크가 남으면 안 됨(스모크가 finally 로 uninstall 하나 방어적 재정리)
          & $cys daemon uninstall 2>$null
          Get-Process cys,cysd -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          if ($code -ne 0) { throw "T5: 피닉스 Windows 패리티 스모크 실패 (exit=$code)" }
          Write-Host "OK: T5 피닉스 Windows 패리티 스모크 통과 (경로매핑·schtasks·재시작·snapshot/ps1·stub restore·deploy plan·★KeepAlive respawn·★⑧실경로 auto-restore[주입 없이 cysd 자체 decide_auto_restore]·★⑨Job Object 자식트리 동반사망[D3 P2-9])"
          # ★Actions pwsh 래퍼는 스크립트 말미에 exit $LASTEXITCODE 를 붙인다 — 위 방어적 uninstall(스모크 finally 가
          #   이미 제거해 rc=1)이 그 값을 오염시켜 '스모크 성공인데 스텝 exit 1'(run 28738140283 실증). 판정은 $code 로 끝 — 명시 exit 0.
          exit 0
