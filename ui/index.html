<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>cys — CYSJavis Terminal</title>
  <link rel="stylesheet" href="./xterm.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header id="topbar">
    <span id="brand">cys</span>
    <span id="daemon-info">daemon: connecting…</span>
    <span class="spacer"></span>
    <button id="btn-new" title="새 surface (⌘T)">+ New</button>
    <button id="btn-split-h" title="오른쪽 분할 (⌘D)">Split →</button>
    <button id="btn-split-v" title="아래 분할 (⌘⇧D)">Split ↓</button>
    <button id="btn-equalize" title="역할별 표준 배치로 정렬 — master·CSO(좌) · 워커(가운데 균등) · agy·codex(우) · 수동 크기 조절엔 영향 없음">정렬</button>
    <button id="btn-close" title="pane 닫기 — 자식 트리 강제 종료 (⌘W)">Close</button>
    <button id="btn-feed" title="승인 Feed">Feed <span id="feed-badge" class="badge" hidden>0</span></button>
    <button id="btn-files" title="파일 트리 (선택한 surface의 폴더)">Files</button>
    <button id="btn-cc" title="Control Center — 실시간 플릿·사용량·시스템 모니터링">Control Center</button>
    <button id="btn-update" title="업데이트 확인">Update <span id="update-badge" class="badge" hidden>!</span></button>
  </header>
  <div id="body-row">
    <nav id="wsbar">
      <div id="wsbar-head"><span>워크스페이스</span><button id="btn-ws-new" title="새 워크스페이스">＋</button></div>
      <div id="ws-tabs"></div>
    </nav>
    <aside id="ft-panel" hidden>
      <div id="ft-head"><span id="ft-root-label">파일</span><button id="btn-ft-close">×</button></div>
      <div id="ft-body"></div>
    </aside>
    <main id="root"></main>
    <aside id="feed-panel" hidden>
      <div id="feed-panel-head">승인 Feed <button id="btn-feed-close">×</button></div>
      <div id="feed-items"></div>
    </aside>
    <aside id="cc-panel" hidden>
      <div id="cc-header">
        <span class="cc-pulse"></span>
        <span class="cc-title">JARVIS Control Center</span>
        <span id="cc-livebadge" class="cc-badge idle">IDLE</span>
        <span id="cc-alertbadge" class="cc-alert-badge" hidden></span>
        <span id="cc-clock"></span>
        <button id="btn-cc-close" title="닫기">×</button>
      </div>
      <div id="cc-tabs">
        <button class="cc-tab active" data-view="live">Live</button>
        <button class="cc-tab" data-view="eff">비용·효율</button>
        <button class="cc-tab" data-view="skills">스킬·에이전트</button>
      </div>
      <div id="cc-body">
        <div id="cc-view-live">
          <div id="cc-alerts" class="cc-alerts"></div>
          <div class="cc-gauges">
            <div class="cc-radar" id="cc-radar">
              <span class="cc-radar-sweep"></span>
              <span class="cc-radar-val" id="cc-radar-val">0%</span>
              <span class="cc-radar-sub" id="cc-radar-sub">0/0 활성</span>
            </div>
            <div class="cc-uptime">
              <span class="cc-uptime-val" id="cc-uptime-val">00:00:00</span>
              <span class="cc-sub">가동시간</span>
            </div>
          </div>
          <div class="cc-kpi" id="cc-kpi"></div>
          <div class="cc-section"><div class="cc-h">플릿 현황</div><div id="cc-fleet"></div></div>
          <div class="cc-section"><div class="cc-h">토큰 · 비용</div>
            <div id="cc-token-bars"></div>
            <div class="cc-token-stats" id="cc-token-stats"></div>
            <div class="cc-mix" id="cc-model-mix"></div>
            <div class="cc-spark" id="cc-spark"></div>
          </div>
          <div class="cc-section"><div class="cc-h">시스템</div><div id="cc-sys"></div></div>
        </div>
        <div id="cc-view-eff" hidden>
          <div class="cc-eff-win" id="cc-eff-win">
            <button class="cc-win active" data-window="today">오늘</button>
            <button class="cc-win" data-window="7d">7일</button>
            <button class="cc-win" data-window="all">전체</button>
          </div>
          <div class="cc-kpi" id="cc-eff-kpi"></div>
          <div class="cc-section"><div class="cc-h">토큰 4분해</div><div id="cc-eff-tokens"></div></div>
          <div class="cc-section"><div class="cc-h">모델별 비용</div><div id="cc-eff-models"></div></div>
          <div class="cc-section"><div class="cc-h">에이전트 믹스</div><div id="cc-eff-agents"></div></div>
          <div class="cc-section"><div class="cc-h">생산성</div><div class="cc-token-stats" id="cc-eff-prod"></div></div>
        </div>
        <div id="cc-view-skills" hidden>
          <div class="cc-eff-win" id="cc-skills-win">
            <button class="cc-win active" data-window="today">오늘</button>
            <button class="cc-win" data-window="7d">7일</button>
            <button class="cc-win" data-window="all">전체</button>
          </div>
          <div class="cc-kpi" id="cc-skills-kpi"></div>
          <div class="cc-section"><div class="cc-h">🔥 반복 실패 (exit≠0)</div><div id="cc-skills-fail"></div></div>
          <div class="cc-section"><div class="cc-h">스킬 호출 TOP</div><div id="cc-skills-skills"></div></div>
          <div class="cc-section"><div class="cc-h">툴 호출 TOP</div><div id="cc-skills-tools"></div></div>
          <div class="cc-section"><div class="cc-h">서브에이전트 위임</div><div id="cc-skills-agents"></div></div>
        </div>
        <div id="cc-footer"></div>
      </div>
    </aside>
  </div>
  <div id="toasts"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
