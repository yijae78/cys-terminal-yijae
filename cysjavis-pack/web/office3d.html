<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>CYSJAVIS · Metaverse Office</title>
<style>
  html,body{margin:0;height:100%;background:#05080f;overflow:hidden;
    font-family:'SF Mono',Menlo,monospace;color:#cfeeff}
  #scene{position:fixed;inset:0}
  .hud{position:fixed;z-index:10;pointer-events:none;text-shadow:0 0 8px rgba(0,20,50,.9)}
  #hud-tl{top:14px;left:16px}
  #hud-tl h1{margin:0;font-size:30px;letter-spacing:1px}
  #hud-tl .sub{font-size:21px;color:#8cc3eb;margin-top:5px}
  #hud-tl .stats{font-size:26px;color:#6ee1be;margin-top:7px}
  #conn{display:inline-block;width:16px;height:16px;border-radius:50%;background:#666;margin-right:5px}
  #conn.on{background:#35e0c0;box-shadow:0 0 6px #35e0c0}
  #conn.off{background:#ff5a5a;box-shadow:0 0 6px #ff5a5a}
  #ticker{top:110px;right:16px;width:700px;text-align:right;font-size:23px;line-height:1.5}
  #ticker .h{color:#78c8ff;font-weight:600;font-size:24px;margin-bottom:6px}
  #ticker .row{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#8ccdf0}
  #ticker .row.warn{color:#ffcd78}
  #ticker .row.alert{color:#ff7878}
  #legend{bottom:16px;left:16px;font-size:24px;color:#aacdeb}
  #legend i{display:inline-block;width:18px;height:18px;margin-right:10px;border-radius:3px}
  #legend div{margin-top:6px}
  #clock{bottom:16px;right:16px;font-size:30px;color:#a0d2f5}
  #paused{top:40%;left:50%;transform:translate(-50%,-50%);font-size:34px;color:#ff5a5a;
    letter-spacing:8px;display:none;text-shadow:0 0 24px rgba(255,60,60,.8)}
  /* 지시 패널 (클릭→조작) */
  #panel{position:fixed;right:16px;bottom:70px;width:460px;z-index:20;display:none;
    background:rgba(7,16,30,.94);border:1px solid rgba(90,190,255,.55);border-radius:8px;
    padding:14px;box-shadow:0 0 24px rgba(20,120,220,.25)}
  #panel h2{margin:0 0 6px;font-size:20px;color:#cfeeff}
  #panel .meta{font-size:16px;color:#8cc3eb;line-height:1.6;margin-bottom:8px}
  #panel textarea{width:100%;box-sizing:border-box;height:64px;background:#050c18;
    color:#d8ecfa;border:1px solid rgba(90,190,255,.4);border-radius:5px;padding:7px;
    font:16px 'SF Mono',Menlo,monospace;resize:vertical}
  #panel .row2{display:flex;gap:8px;margin-top:8px;align-items:center}
  #panel button{background:#0d2c4a;color:#bfeaff;border:1px solid rgba(90,190,255,.6);
    border-radius:5px;padding:6px 13px;font:600 16px 'SF Mono',Menlo,monospace;cursor:pointer}
  #panel button:hover{background:#144066}
  #panel button:disabled{opacity:.4;cursor:default}
  #panel #p-close{background:transparent;border:none;position:absolute;top:8px;right:8px;
    color:#6d93b5;font-size:14px;padding:2px 6px}
  #panel .status{font-size:15px;margin-top:7px;min-height:14px;color:#8ccdf0}
  #panel .status.ok{color:#35e0c0} #panel .status.err{color:#ff8080}
  /* 카페·상점 선물 패널 (D6) */
  #shop{position:fixed;left:16px;bottom:70px;width:420px;z-index:21;display:none;
    background:rgba(14,10,7,.95);border:1px solid rgba(255,183,90,.55);border-radius:8px;
    padding:14px;box-shadow:0 0 24px rgba(220,150,40,.25)}
  #shop h2{margin:0 0 6px;font-size:19px;color:#ffd88a}
  #shop .meta{font-size:15px;color:#e2c79a;line-height:1.6;margin-bottom:8px}
  #shop button{background:#3a2c10;color:#ffd88a;border:1px solid rgba(255,183,90,.6);
    border-radius:5px;padding:6px 12px;font:600 15px 'SF Mono',Menlo,monospace;cursor:pointer;margin:3px 4px 0 0}
  #shop button:hover{background:#55420f} #shop button:disabled{opacity:.35;cursor:default}
  #shop #shop-close{background:transparent;border:none;position:absolute;top:8px;right:8px;color:#b58a55;font-size:14px}
  #shop #shop-targets{margin-top:8px;max-height:150px;overflow-y:auto}
  #shop .status{font-size:14px;margin-top:8px;min-height:14px;color:#e2c79a}
  #shop .status.ok{color:#35e0c0} #shop .status.err{color:#ff8080}
  .embed #shop{width:min(80vw,360px);bottom:52px;padding:10px}
  .embed #shop h2{font-size:14px} .embed #shop .meta{font-size:11px}
  .embed #shop button{font-size:12px;padding:5px 9px}
  /* 근접 대화 팝업 (#talk — 주인이 아바타에 다가가면 자동) */
  #talk{position:fixed;z-index:18;width:360px;display:none;
    background:rgba(10,18,32,.94);border:1.5px solid rgba(255,209,102,.75);border-radius:9px;
    padding:10px;box-shadow:0 0 22px rgba(255,190,80,.22)}
  #talk .t-title{font-size:15px;color:#ffd166;font-weight:600;margin-bottom:6px}
  #talk .t-row{display:flex;gap:6px}
  #talk input{flex:1;background:#050c18;color:#d8ecfa;border:1px solid rgba(255,209,102,.4);
    border-radius:5px;padding:6px;font:14px 'SF Mono',Menlo,monospace}
  #talk button{background:#3a2c10;color:#ffd166;border:1px solid rgba(255,209,102,.6);
    border-radius:5px;padding:6px 10px;font:600 13px 'SF Mono',Menlo,monospace;cursor:pointer}
  #talk .t-status{font-size:12px;color:#8cc3eb;margin-top:6px;min-height:14px}
  /* MMORPG 채팅창 · 버튼바 · 타임머신 */
  #chat{position:fixed;left:16px;bottom:252px;width:600px;z-index:15;
    background:rgba(6,14,26,.9);border:1px solid rgba(90,190,255,.45);border-radius:8px;padding:10px}
  #chat-log{height:150px;overflow-y:auto;font-size:15px;line-height:1.55}
  #chat-log .o{color:#ffd166} #chat-log .st{color:#7fd2c0} #chat-log .sy{color:#7fa8c8}
  #chat-input-row{display:flex;gap:6px;margin-top:8px;align-items:center}
  #chat-target{font-size:13px;color:#8cc3eb;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis}
  #chat-input{flex:1;background:#050c18;color:#d8ecfa;border:1px solid rgba(90,190,255,.4);
    border-radius:5px;padding:7px;font:15px 'SF Mono',Menlo,monospace}
  #chat button, #btnbar button{background:#0d2c4a;color:#bfeaff;border:1px solid rgba(90,190,255,.6);
    border-radius:5px;padding:6px 10px;font:600 13px 'SF Mono',Menlo,monospace;cursor:pointer}
  #btnbar{position:fixed;right:16px;bottom:64px;z-index:15;display:flex;gap:8px}
  #btnbar button.on{background:#14563e;border-color:#35e0c0}
  #timeline{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;width:42%;z-index:15;
    display:flex;gap:10px;align-items:center;background:rgba(6,14,26,.82);
    border:1px solid rgba(90,190,255,.35);border-radius:8px;padding:6px 12px}
  #tl-slider{flex:1}
  #tl-label{font-size:14px;color:#8ce7ff;min-width:90px;text-align:right}
  #panel .note{font-size:13px;color:#5f81a0;margin-top:6px;line-height:1.5}
  /* ── 임베드(CC iframe) 컴팩트 모드 ──────────────────────────────────
     위 절대 px는 대형 풀스크린 모니터 튜닝 — CC 패널 뷰포트(논리 ~1000×530)에선
     HUD가 3D를 지배(티커 700px=폭 70%·chat bottom 252px=화면 중앙 점유·겹침).
     iframe 감지(.embed — 스타일 블록 바로 뒤의 스크립트) 시에만 축소·재배치. 브라우저
     직접 열람(풀스크린)은 불변. 인라인 스타일 요소만 !important.
     ★주의: 이 주석 안에 style 종료태그 문자열을 쓰면 HTML 파서가 그 지점에서 스타일을
     조기 종료해 이하 규칙 전부가 본문 텍스트로 노출된다(2026-07-10 실사고). */
  .embed #hud-tl h1{font-size:15px;letter-spacing:.5px}
  .embed #hud-tl .sub{font-size:10px;margin-top:2px}
  .embed #hud-tl .stats{font-size:12px;margin-top:3px}
  .embed #conn{width:9px;height:9px;margin-right:4px}
  .embed #ticker{top:56px;width:min(38vw,340px);font-size:10px;line-height:1.45;
    max-height:42vh;overflow:hidden}
  .embed #ticker .h{font-size:11px;margin-bottom:3px}
  .embed #legend{font-size:10px}
  .embed #legend i{width:9px;height:9px;margin-right:5px}
  .embed #legend div{margin-top:3px}
  .embed #clock{font-size:12px}
  .embed #paused{font-size:20px;letter-spacing:4px}
  .embed #chat{width:min(44vw,400px);bottom:48px;padding:7px}
  .embed #chat-log{height:80px;font-size:11px}
  .embed #chat-target{font-size:10px;max-width:100px}
  .embed #chat-input{font-size:11px;padding:5px}
  .embed #chat button, .embed #btnbar button{font-size:10px;padding:4px 7px}
  .embed #btnbar{bottom:8px}
  .embed #timeline{bottom:6px;width:46%;padding:4px 9px}
  .embed #timeline span{font-size:10px !important}
  .embed #tl-label{font-size:10px;min-width:60px}
  .embed #panel{width:min(88vw,380px);bottom:52px;padding:10px}
  .embed #panel h2{font-size:14px}
  .embed #panel .meta{font-size:11px}
  .embed #panel textarea{font-size:12px;height:48px}
  .embed #panel button{font-size:12px;padding:5px 10px}
  .embed #panel .note{font-size:10px}
  .embed #talk{width:280px;padding:8px}
  .embed #talk input{font-size:11px}
</style>
<script>/* CC iframe 임베드 감지 — 첫 페인트 전 동기 적용(깜빡임 0) */
if (window.self !== window.top) document.documentElement.classList.add("embed");</script>
</head>
<body>
<canvas id="scene"></canvas>
<div class="hud" id="hud-tl">
  <h1>CYSJAVIS · METAVERSE OFFICE</h1>
  <div class="sub"><span id="conn"></span><span id="conn-t">연결 중…</span> · 127.0.0.1 · 노드 클릭=지시 패널</div>
  <div class="stats" id="stats">—</div>
  <div class="sub">🎮 주인 조종: 방향키/WASD 보행 · 바닥 클릭 이동 · 엘리베이터 안 ⬆⬇=층 이동(진입 시 줌인)</div>
</div>
<div class="hud" id="ticker"><div class="h">LIVE EVENTS ─ cys events</div><div id="tick-rows"></div></div>
<div class="hud" id="legend"></div>
<div class="hud" id="clock"></div>
<div class="hud" id="paused">PAUSED</div>
<div id="talk">
  <div class="t-title" id="t-title">—</div>
  <div class="t-row">
    <input id="t-input" placeholder="명령 입력… (Enter=실전달)">
    <button id="t-send">전달</button>
    <button id="t-peek" title="이 직원 pane 최근 출력 회수">응답</button>
  </div>
  <div class="t-status" id="t-status"></div>
</div>
<div id="chat">
  <div id="chat-log"></div>
  <div id="chat-input-row">
    <span id="chat-target">대상: (노드 클릭)</span>
    <input id="chat-input" placeholder="선택 직원에게 지시… Enter = 주인 강림 전달">
    <button id="chat-peek" title="해당 pane 최근 출력을 1회 조회해 답변으로 표시">응답</button>
    <button id="chat-meet" title="선택 노드의 부서 전원 회의 소집 (실제 send)">🏛 회의</button>
  </div>
</div>
<div id="btnbar">
  <button id="b-shuffle" title="부서 자리배치를 세션 랜덤으로 다시 섞기 (타임머신 중 비활성)">🔀 배치 섞기</button>
  <button id="b-director" title="중요 이벤트 자동 줌인 — 기본 꺼짐(주인 이동 줌인과 혼동 방지)">🎥 디렉터</button>
  <button id="b-voice" title="실패·승인·경보 한국어 안내방송">🔇 방송</button>
  <button id="b-theme" title="메타버스 테마 전환 (저장됨)">🎨 테마</button>
  <button id="b-wide" hidden>🔭 전체 보기</button>
  <button id="b-dismiss" hidden>회의 해산</button>
</div>
<div id="timeline">
  <span style="font-size:14px;color:#8cc3eb">⏪ 타임머신</span>
  <input id="tl-slider" type="range" min="0" max="1000" value="1000">
  <span id="tl-label">LIVE</span>
</div>
<div id="panel">
  <button id="p-close">✕</button>
  <h2 id="p-title">—</h2>
  <div class="meta" id="p-meta">—</div>
  <textarea id="p-text" placeholder="이 직원에게 보낼 지시를 입력… (1줄 · 전송 시 Return까지 주입)"></textarea>
  <div class="row2">
    <button id="p-send">지시 전송 → cys-terminal</button>
    <span id="p-status" class="status"></span>
  </div>
  <div class="note">전송 = cys send + Return (해당 pane에 즉시 타이핑됨). 배달은
    surface.input_injected 이벤트로 이 화면에 되돌아와 확인된다(동시성 루프).</div>
</div>
<div id="shop">
  <button id="shop-close">✕</button>
  <h2 id="shop-title">—</h2>
  <div class="meta" id="shop-desc">—</div>
  <button id="shop-gift">🎁 선물하기</button>
  <div id="shop-targets"></div>
  <div class="status" id="shop-status"></div>
</div>

<script type="module">
import * as THREE from '/vendor/three.module.js';
const HUD_TOKEN = "__HUD_TOKEN__";   // 브리지가 서빙 시 주입 (파일 직접 열면 조작 비활성)

// ── E2E 검증 훅 (?debug=1 에서만 활성 — 프로덕션 무영향) ──
// WebGL 화면은 직접 단언 불가하므로 각 디테일 기능의 적용 상태를 카운터/스냅샷으로 노출한다.
const DEBUG = new URLSearchParams(location.search).get('debug') === '1';
let taskTip = null;                  // task 전문 말풍선 (#4 · snapshot에서 참조)
const dbg = DEBUG ? {
  fx:{}, patchTop:{}, ringPulse:0, verdict:0, reviewConvened:0,
  runcardFail:0, runcardOk:0, docFrom:0, docNoFrom:0, blockedFx:0, unblockedFx:0,
  _kanbanCards:0, _boardTs:0, _blockedArrows:0,
  snapshot(){   // 씬의 실시간 상태를 노드 순회로 집계 (이벤트 카운터와 별개)
    let gauges=0, rateLeds=0, idle=0, rings=0, runCards=0, papers=0; const ringPcts=[];
    nodes.forEach(e=>{
      if (e.set.gaugeFill && e.set.gaugeFill.visible) gauges++;
      if (e.set.rateLed && e.set.rateLed.visible) rateLeds++;
      if (e.idleSprite) idle++;
      if (e.set.progRing && e.set.progRing.visible){ rings++; ringPcts.push(e.data.progress?.pct); }
      if (e.set.runCards) runCards += e.set.runCards.filter(c=>c.visible).length;
      if (e.set.activeCard && e.set.activeCard.visible) runCards++;
      if (e.set.papers) papers += e.set.papers.filter(p=>p.visible).length;
    });
    return { gauges, rateLeds, idle, rings, ringPcts, runCards, papers, taskTip: !!taskTip,
      kanbanCards:this._kanbanCards, boardTs:this._boardTs, blockedArrows:this._blockedArrows,
      fx:this.fx, patchTop:this.patchTop, ringPulse:this.ringPulse, verdict:this.verdict,
      reviewConvened:this.reviewConvened, runcardFail:this.runcardFail, runcardOk:this.runcardOk,
      docFrom:this.docFrom, docNoFrom:this.docNoFrom, blockedFx:this.blockedFx, unblockedFx:this.unblockedFx };
  }
} : null;
if (DEBUG) window.__officeDebug = dbg;

/* ============================================================
   CYSJAVIS 메타버스 오피스 — 리얼리티 렌더러 v2 (Wave 2)
   실물감: 조명·그림자·목재 책상·모니터·의자·관절 있는 사람(포즈 6종)
   조작:   노드 클릭 → 지시 패널 → POST /command → cys send+Return
   ============================================================ */

// ---------- 상수 ----------
const ROLE_COLOR = { master:0xd9a441, worker:0x3fb8dd, cso:0x9b7bd8,
  'reviewer-gemini':0x5f8fd9, 'reviewer-codex':0x63c47f, 'reviewer-agy':0x7fd2c0,
  '무소속':0x8a93a6, owner:0xf2c14e };
const HAIR = [0x2b2119, 0x1a1a1e, 0x4a3320, 0x555a60];
const SKIN = 0xe4b48c;
const FLOOR_H = 3.8, SLAB_W = 13.0, SLAB_D = 8.6;
// 회장실 왕좌 위치·좌면 — makeChairmanOffice(배치)와 자동 착석(updateThroneSeat)의 단일 SOT.
const THRONE = { x: 0.5, z: -3.65, seatY: 0.55, nearR: 0.9 };
const TOOL_ICON = { Bash:'⌘', Read:'📖', Edit:'✎', Write:'✎', Grep:'🔍', Glob:'🔍',
  WebSearch:'🌐', WebFetch:'🌐', Task:'⚙', Agent:'⚙', TodoWrite:'☑' };
const PRESENCE_KO = { active:'활동중', waiting:'대기', drowsy:'꾸벅', sleeping:'수면',
  quiescing:'컨텍스트 정리중', dead:'소등', unknown:'미상' };

// ---------- 렌더러·씬·조명 ----------
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05080f);
scene.fog = new THREE.Fog(0x05080f, 30, 70);
const camera = new THREE.PerspectiveCamera(48, 1, 0.1, 220);

const hemi = new THREE.HemisphereLight(0xaec6e0, 0x1c2634, 1.25);
scene.add(hemi);
let hemiBase = 1.25;
const sun = new THREE.DirectionalLight(0xfff1dc, 1.35);
sun.position.set(14, 26, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, { left:-18, right:18, top:22, bottom:-8, far:70 });
scene.add(sun);
const grid = new THREE.GridHelper(90, 45, 0x14324a, 0x0a1a2a);
grid.position.y = -3.6; scene.add(grid);

// ---------- 오빗 카메라 ----------
const orbit = { theta: Math.PI*0.24, phi: Math.PI*0.36, r: 30, ty: 6.4, lastInput: 0 };
let dragging=false, dragMoved=false, px=0, py=0;
canvas.addEventListener('pointerdown', e=>{dragging=true;dragMoved=false;px=e.clientX;py=e.clientY;});
addEventListener('pointerup', ()=>dragging=false);
addEventListener('pointermove', e=>{
  if(!dragging) return;
  if (Math.abs(e.clientX-px)+Math.abs(e.clientY-py) > 3) dragMoved = true;
  orbit.theta -= (e.clientX-px)*0.005; orbit.phi -= (e.clientY-py)*0.004;
  orbit.phi = Math.max(0.12, Math.min(1.4, orbit.phi));
  px=e.clientX; py=e.clientY; orbit.lastInput=performance.now();
});
let fitR = 30, userZoom = 1, baseTy = 6.4, buildingTopY = FLOOR_H; // buildWorld가 옥상 y 갱신
const camGoal = { active:false, r:30, tx:0, ty:6.4, tz:0, until:0, kind:null };
canvas.addEventListener('wheel', e=>{
  // 휠 줌 = fit 기준 대비 배율 — 리사이즈·층수 변화의 refit과 공존(절대 r 조작이던 구 userR 대체).
  userZoom = Math.max(0.35, Math.min(2.2, userZoom + e.deltaY*0.0006));
  orbit.lastInput = performance.now();
}, {passive:true});
// 건물 fit 프레이밍 — 건물 8코너를 실제 투영해 "모든 코너가 화면 안(97%)에 들어가는
// 최소 카메라 거리"를 이분탐색. 정의상 잘림 불가 + 최대 확대이며, 창 비율·층수·회전각
// 어디서든 성립(각도 근사식은 내려다보는 시점의 상단 근접을 놓쳐 과확대·잘림 — 실사고).
const _fitCam = new THREE.PerspectiveCamera(48, 1, 0.1, 220);
const _fitV = new THREE.Vector3();
function refitCam(){
  const topY = buildingTopY + 2.2;                       // 옥상 구조물·간판 여유
  const hw = SLAB_W/2 + 0.8, hd = SLAB_D/2 + 0.8, ty = topY/2;
  baseTy = ty;                                            // 타깃 = 건물 중앙
  _fitCam.fov = camera.fov; _fitCam.aspect = camera.aspect; _fitCam.updateProjectionMatrix();
  const ok = (r)=>{
    _fitCam.position.set(
      Math.sin(orbit.theta)*Math.sin(orbit.phi)*r,
      Math.cos(orbit.phi)*r + ty,
      Math.cos(orbit.theta)*Math.sin(orbit.phi)*r);
    _fitCam.lookAt(0, ty, 0); _fitCam.updateMatrixWorld();
    for (let sx=-1; sx<=1; sx+=2) for (let sy=0; sy<=1; sy++) for (let sz=-1; sz<=1; sz+=2){
      _fitV.set(sx*hw, sy*topY, sz*hd).project(_fitCam);
      if (Math.abs(_fitV.x) > 0.97 || Math.abs(_fitV.y) > 0.97 || _fitV.z > 1) return false;
    }
    return true;
  };
  let lo = 8, hi = 58;
  if (ok(lo)) { fitR = lo; return; }
  for (let i=0; i<16; i++){ const m = (lo+hi)/2; if (ok(m)) hi = m; else lo = m; }
  fitR = hi;
}
orbit.tx = 0; orbit.tz = 0;
function updateCamera(dt){
  if (performance.now()-orbit.lastInput > 9000 && !camGoal.active) orbit.theta += 0.0005;
  if (camGoal.active && camGoal.until && performance.now() > camGoal.until) releaseCam();
  if (!camGoal.active) refitCam(); // 회전(자동·드래그)·창 변화에 연속 재프레이밍 — lerp가 스무딩
  const gr = camGoal.active ? camGoal.r : fitR*userZoom;
  const gtx = camGoal.active ? camGoal.tx : 0;
  const gty = camGoal.active ? camGoal.ty : baseTy;
  const gtz = camGoal.active ? camGoal.tz : 0;
  const L = Math.min(dt*2.6, 1);
  orbit.r += (gr-orbit.r)*L; orbit.tx += (gtx-orbit.tx)*L;
  orbit.ty += (gty-orbit.ty)*L; orbit.tz += (gtz-orbit.tz)*L;
  camera.position.set(
    orbit.tx + Math.sin(orbit.theta)*Math.sin(orbit.phi)*orbit.r,
    Math.cos(orbit.phi)*orbit.r + orbit.ty,
    orbit.tz + Math.cos(orbit.theta)*Math.sin(orbit.phi)*orbit.r);
  camera.lookAt(orbit.tx, orbit.ty, orbit.tz);
}
function setCam(kind, tx, ty, tz, r, holdMs){
  // 우선순위: focus(주인·층) > director. 낮은 우선순위는 높은 것을 못 뺏는다.
  if (camGoal.active && camGoal.kind === 'focus' && kind === 'director') return;
  Object.assign(camGoal, { active:true, kind, tx, ty, tz, r,
    until: holdMs ? performance.now()+holdMs : 0 });
  document.getElementById('b-wide').hidden = kind !== 'focus';
}
function releaseCam(){
  camGoal.active = false; camGoal.kind = null; camGoal.until = 0;
  document.getElementById('b-wide').hidden = true;
}
document.getElementById('b-wide').onclick = releaseCam;
addEventListener('keydown', e=>{ if (e.key === 'Escape') releaseCam(); });
function resize(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  refitCam(); // 창 크기 변화 → 건물 프레이밍 즉시 재계산(연동의 핵심)
}

function textSprite(txt, {size=22, color='#cfeeff', bg=null, pad=8, scale=0.013}={}){
  const c = document.createElement('canvas'), g = c.getContext('2d');
  g.font = `600 ${size}px 'SF Mono', Menlo, monospace`;
  const w = Math.ceil(g.measureText(txt).width)+pad*2, h = size+pad*2;
  c.width=w; c.height=h;
  g.font = `600 ${size}px 'SF Mono', Menlo, monospace`;
  if (bg){ g.fillStyle=bg; const r=6;
    g.beginPath(); g.moveTo(r,0); g.lineTo(w-r,0); g.arcTo(w,0,w,r,r); g.lineTo(w,h-r);
    g.arcTo(w,h,w-r,h,r); g.lineTo(r,h); g.arcTo(0,h,0,h-r,r); g.lineTo(0,r); g.arcTo(0,0,r,0,r);
    g.fill(); g.strokeStyle='rgba(120,220,255,.8)'; g.stroke(); }
  g.fillStyle=color; g.textBaseline='middle'; g.textAlign='center';
  g.fillText(txt, w/2, h/2+1);
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false }));
  sp.scale.set(w*scale, h*scale, 1);
  return sp;
}
function batterySprite(pct){
  const c=document.createElement('canvas'); c.width=120; c.height=30;
  const g=c.getContext('2d');
  const col = pct==null?'#556': pct>=90?'#ff5050': pct>=60?'#ffcc55':'#35e0c0';
  g.strokeStyle='rgba(190,225,250,.9)'; g.lineWidth=2; g.strokeRect(6,8,70,14);
  g.fillStyle='rgba(190,225,250,.9)'; g.fillRect(78,11,4,8);
  if (pct!=null){ g.fillStyle=col; g.fillRect(8,10,66*Math.min(pct,100)/100,10); }
  g.font='600 15px Menlo,monospace'; g.fillStyle=col; g.textBaseline='middle';
  g.fillText(pct==null?'—':pct+'%', 88, 16);
  const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));
  sp.scale.set(1.35,0.34,1);
  return sp;
}

function makePerson(role, seed){
  const shirt = roleMat(role);
  const hair = hairMats[seed % hairMats.length];
  const P = new THREE.Group();                       // 원점 = 의자 좌면 위 골반
  P.add(mesh(G.hips, M.pants, 0, 0.08, 0));
  const torsoG = new THREE.Group(); torsoG.position.set(0, 0.16, 0);   // 허리 피벗
  torsoG.add(mesh(G.torso, shirt, 0, 0.21, 0));
  const headG = new THREE.Group(); headG.position.set(0, 0.46, 0);     // 목 피벗
  const headM = mesh(G.head, M.skin, 0, 0.1, 0);
  const hairM = mesh(G.hairCap, hair, 0, 0.115, -0.012);
  headG.add(headM); headG.add(hairM);
  torsoG.add(headG);
  function arm(side){                                 // side: -1 좌 / +1 우
    const sh = new THREE.Group(); sh.position.set(side*0.21, 0.36, 0); // 어깨 피벗
    sh.add(mesh(G.upperArm, shirt, 0, -0.12, 0));
    const el = new THREE.Group(); el.position.set(0, -0.25, 0);        // 팔꿈치 피벗
    el.add(mesh(G.foreArm, M.skin, 0, -0.1, 0));
    sh.add(el); torsoG.add(sh);
    return { sh, el };
  }
  const lA = arm(-1), rA = arm(1);
  // 다리 — 앉은 ㄴ자(기본) / 선 자세(보행·회의 — #2 #3)
  const legsSeat = new THREE.Group();
  legsSeat.add(mesh(G.thigh, M.pants, -0.09, 0.06, -0.18));
  legsSeat.add(mesh(G.thigh, M.pants,  0.09, 0.06, -0.18));
  legsSeat.add(mesh(G.shin, M.pants, -0.09, -0.14, -0.31, false));
  legsSeat.add(mesh(G.shin, M.pants,  0.09, -0.14, -0.31, false));
  P.add(legsSeat);
  const legsStand = new THREE.Group(); legsStand.visible = false;
  const mkLeg = (sx)=>{ const hip = new THREE.Group(); hip.position.set(sx, 0.02, 0);
    hip.add(mesh(new THREE.BoxGeometry(0.12,0.32,0.12), M.pants, 0, -0.16, 0));
    hip.add(mesh(new THREE.BoxGeometry(0.10,0.30,0.10), M.pants, 0, -0.48, 0, false));
    legsStand.add(hip); return hip; };
  const legL = mkLeg(-0.09), legR = mkLeg(0.09);
  P.add(legsStand);
  P.add(torsoG);
  return { grp:P, torsoG, headG, lA, rA,
    setStanding(on){ legsSeat.visible = !on; legsStand.visible = on; },
    swing(ph){ legL.rotation.x = Math.sin(ph)*0.55; legR.rotation.x = -Math.sin(ph)*0.55; } };
}

function applyPose(ent, t, dt){
  const { person:pr, screen } = ent.set;
  const n = ent.data, a = ent.anim;
  const act = n.activity || 0;
  const pres = n.presence;
  if (ent.override){                    // 보행·회의(서기) — 상태 포즈를 대체 (#3)
    pr.grp.visible = pres !== 'dead';
    const L2 = Math.min(8*dt, 1);
    pr.torsoG.rotation.x += (0 - pr.torsoG.rotation.x)*L2;
    pr.headG.rotation.x += (0.04 - pr.headG.rotation.x)*L2;
    pr.headG.rotation.y += (0 - pr.headG.rotation.y)*L2;
    pr.lA.sh.rotation.x += (-0.15 - pr.lA.sh.rotation.x)*L2;
    pr.rA.sh.rotation.x += (-0.15 - pr.rA.sh.rotation.x)*L2;
    pr.lA.el.rotation.x += (-0.2 - pr.lA.el.rotation.x)*L2;
    pr.rA.el.rotation.x += (-0.2 - pr.rA.el.rotation.x)*L2;
    ent.set.selRing.material.opacity = (selected === n.key) ? 0.6 : 0;
    return;
  }
  // 기본 리셋 목표값 (부드럽게 lerp)
  let torsoX = -0.06, headX = 0.12, headY = 0;
  let lSh = -0.9, lEl = -0.5, rSh = -0.9, rEl = -0.5;   // 타이핑 기본(팔 앞으로)
  let visible = true, screenGlow = 0.12;
  if (pres === 'active' || pres === 'quiescing'){
    const speed = 8 + act*14;
    lEl += Math.sin(t*speed)*0.16; rEl += Math.sin(t*speed+Math.PI)*0.16;
    headX = 0.16; screenGlow = 0.55 + 0.25*Math.min(act,1) + Math.sin(t*3)*0.05;
  } else if (pres === 'waiting'){
    lSh = -0.25; lEl = -0.35; rSh = -0.25; rEl = -0.35;  // 손 내림
    headY = Math.sin(t*0.5 + ent.seed)*0.3;               // 두리번
    screenGlow = 0.3;
  } else if (pres === 'drowsy'){
    lSh = -0.2; lEl = -0.3; rSh = -0.2; rEl = -0.3;
    headX = 0.3 + Math.max(0, Math.sin(t*1.1 + ent.seed))*0.35;  // 꾸벅
    screenGlow = 0.18;
  } else if (pres === 'sleeping'){
    torsoX = 0.72; headX = 0.5;                          // 책상에 엎드림
    lSh = -1.25; lEl = -0.1; rSh = -1.25; rEl = -0.1;
    screenGlow = 0.05;
  } else if (pres === 'dead'){
    visible = false; screenGlow = 0.0;                   // 빈 자리 — 소등
  } else { screenGlow = 0.1; }
  if (a.handupUntil && t < a.handupUntil){ rSh = 2.6; rEl = 0.15; } // 손들기(승인 대기)
  if (a.rateLimited){ rSh = -0.05; rEl = -1.5; }         // 커피잔 든 팔
  pr.grp.visible = visible;
  const L = 8*dt;                                        // 포즈 블렌딩 속도
  pr.torsoG.rotation.x += (torsoX - pr.torsoG.rotation.x)*L;
  pr.headG.rotation.x += (headX - pr.headG.rotation.x)*L;
  pr.headG.rotation.y += (headY - pr.headG.rotation.y)*L;
  pr.lA.sh.rotation.x += (lSh - pr.lA.sh.rotation.x)*L;
  pr.lA.el.rotation.x += (lEl - pr.lA.el.rotation.x)*L;
  pr.rA.sh.rotation.x += (rSh - pr.rA.sh.rotation.x)*L;
  pr.rA.el.rotation.x += (rEl - pr.rA.el.rotation.x)*L;
  screen.material.emissiveIntensity +=
    (screenGlow - screen.material.emissiveIntensity)*Math.min(6*dt,1);
  if (a.critical){
    ent.set.ring.material.opacity = 0.3 + 0.45*Math.abs(Math.sin(t*4));
  } else ent.set.ring.material.opacity = 0;
  ent.set.selRing.material.opacity = (selected === ent.data.key)
    ? 0.5 + 0.3*Math.abs(Math.sin(t*3)) : 0;
}

function disposeGroup(g){
  g.traverse(o=>{
    if (o.geometry && !Object.values(G).includes(o.geometry) && !Object.values(DG).includes(o.geometry)) o.geometry.dispose();
    if (o.material && !Object.values(M).includes(o.material)
        && !hairMats.includes(o.material) && !Object.values(roleMats).includes(o.material)
        && !Object.values(DM).includes(o.material)){
      (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>{
        if (m.map) m.map.dispose(); m.dispose(); });
    }
  });
  scene.remove(g);
}
// ── D1. FloorPlan SOT ── 층 배치 단일 기술자. 각 가구 함수의 좌표 소유권을 여기로 회수한다.
//   템플릿 5종(격자·클러스터·창가열·미러·중앙광장) × seed 미세변주. seed 기본=부서 라벨 해시(결정론).
const floorPlans = new Map();        // deptId → plan (buildWorld가 채움)
let shuffleSeed = null;              // null=부서 해시(결정론) · 숫자=세션 랜덤("배치 섞기")
function hashStr(s){ let h = 2166136261; const t = String(s);
  for (let i=0;i<t.length;i++){ h ^= t.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; }
function rngOf(seed){ let a = seed >>> 0;
  return ()=>{ a = a + 0x6D2B79F5 | 0; let x = Math.imul(a ^ a>>>15, 1|a);
    x = x + Math.imul(x ^ x>>>7, 61|x) ^ x; return ((x ^ x>>>14) >>> 0) / 4294967296; }; }
// 데스크 배치기 — region 안·비겹침(간격 ≥ ~2.0), 좌표 리터럴 대신 파생값. rot=set.grp.rotation.y.
function fillGrid(n, x0, x1, z0, z1, rot){
  const out=[]; if (n<=0) return out;
  const cols = Math.max(1, Math.min(n, Math.round(Math.sqrt(n*(x1-x0)/Math.max(0.4, z1-z0)))));
  const rows = Math.ceil(n/cols);
  for (let i=0;i<n;i++){ const c=i%cols, r=Math.floor(i/cols);
    out.push([ cols>1 ? x0+(x1-x0)*c/(cols-1) : (x0+x1)/2,
               rows>1 ? z0+(z1-z0)*r/(rows-1) : (z0+z1)/2, rot ]); }
  return out;
}
function fillPods(n, x0, x1, z0, z1){        // 4인 클러스터 — 2×2 포드가 서로 마주봄
  const out=[]; if (n<=0) return out;
  const pods = Math.ceil(n/4);
  const pcols = Math.max(1, Math.min(pods, Math.round(Math.sqrt(pods*(x1-x0)/Math.max(0.4, z1-z0)))));
  const prows = Math.ceil(pods/pcols);
  const off = [[-0.85,-0.95,0],[0.85,-0.95,0],[-0.85,0.95,Math.PI],[0.85,0.95,Math.PI]];
  let placed=0;
  for (let p=0;p<pods && placed<n;p++){ const pc=p%pcols, pr=Math.floor(p/pcols);
    const px = pcols>1 ? x0+(x1-x0)*pc/(pcols-1) : (x0+x1)/2;
    const pz = prows>1 ? z0+(z1-z0)*pr/(prows-1) : (z0+z1)/2;
    for (let k=0;k<4 && placed<n;k++){ out.push([px+off[k][0], pz+off[k][1], off[k][2]]); placed++; } }
  return out;
}
function fillRow(n, x0, x1, zRow, rowGap, rot){   // 창가 일렬 — 넘치면 뒷줄로
  const out=[]; if (n<=0) return out;
  const per = Math.max(1, Math.floor((x1-x0)/1.9)+1);
  for (let i=0;i<n;i++){ const c=i%per, r=Math.floor(i/per);
    const cnt = Math.min(per, n - r*per);
    out.push([ cnt>1 ? x0+(x1-x0)*c/(cnt-1) : (x0+x1)/2, zRow - r*rowGap, rot ]); }
  return out;
}
// 템플릿 뱅크 5종 → plan. 좌표는 SLAB(x∈±6.5·z∈±4.3) 안, 가구·데스크·순찰 비겹침을 수제 보장.
function floorPlanOf(deptKey, seed, nodeCount){
  const es = (seed==null ? hashStr(deptKey) : (seed ^ hashStr(deptKey))) >>> 0;
  const rng = rngOf(es);
  const tpl = es % 5;
  const n = Math.max(0, nodeCount|0);
  const jz = (rng()-0.5)*0.5;                       // 미세 변주(오프셋)
  const acc = Math.floor(rng()*ACCENTS.length);
  let plan;
  if (tpl === 0){            // 격자형 — 회의실 우후 · 라운지 우전 · 데스크 좌측 격자
    plan = { meeting:{x:4.4,z:-2.2,w:3.6,d:2.9}, lounge:{x:4.6,z:2.4},
      kanban:{x:-3.2}, amenity:'plants', amenityPos:{x:-1.0,z:3.5},
      desks: fillGrid(n, -4.6, 1.5, -3.2+jz, 2.3+jz, 0),
      patrol: [[-4.2,3.6],[0,3.6],[2.5,0],[2.5,-3.0]] };
  } else if (tpl === 1){     // 4인 클러스터형 — 데스크가 포드로 묶여 마주봄
    plan = { meeting:{x:4.4,z:-2.2,w:3.6,d:2.9}, lounge:{x:4.6,z:2.4},
      kanban:{x:-3.2}, amenity:'pingpong', amenityPos:{x:-5.2,z:-3.0},
      desks: fillPods(n, -4.2, 0.8, -2.4, 1.9),
      patrol: [[-4.2,3.6],[0,3.6],[2.5,0],[2.5,-3.0]] };
  } else if (tpl === 2){     // 창가 일렬형 — 회의실 후중앙 · 데스크 앞창가(창 바라봄)
    plan = { meeting:{x:-0.2,z:-2.6,w:3.4,d:2.6}, lounge:{x:5.0,z:-1.4},
      kanban:{x:3.4}, amenity:'plants', amenityPos:{x:5.4,z:3.2},
      desks: fillRow(n, -4.6, 3.2, 3.3, 1.5, Math.PI),
      patrol: [[-4.0,-3.6],[4.0,-3.6],[5.5,1.5],[-5.2,-0.5]] };
  } else if (tpl === 3){     // 미러 반전형 — 회의실 좌후 · 라운지 좌전 · 데스크 우측 격자
    plan = { meeting:{x:-4.4,z:-2.2,w:3.6,d:2.9}, lounge:{x:-4.6,z:2.4},
      kanban:{x:3.2}, amenity:'plants', amenityPos:{x:1.0,z:3.5},
      desks: fillGrid(n, -1.5, 4.6, -3.2+jz, 2.3+jz, 0),
      patrol: [[4.2,3.6],[0,3.6],[-2.5,0],[-2.5,-3.0]] };
  } else {                   // 중앙 광장형 — 라운지 전중앙(광장) · 데스크 압축 격자
    plan = { meeting:{x:4.4,z:-2.2,w:3.6,d:2.9}, lounge:{x:0.2,z:3.4},
      kanban:{x:-3.4}, amenity:'plants', amenityPos:{x:-5.2,z:-2.8},
      desks: fillGrid(n, -4.6, 1.5, -3.2, 0.7, 0),
      patrol: [[-4.2,-3.4],[-1.0,-3.4],[2.5,0],[2.5,-3.2]] };
  }
  plan.gather = { x: plan.meeting.x, z: plan.meeting.z };
  plan.accent = ACCENTS[acc];
  return plan;
}

function drawChairDash(force){
  if (!chairDashCanvas) return;

  const g = chairDashCanvas.getContext('2d');

  g.fillStyle = 'rgba(10,14,26,0.96)'; g.fillRect(0,0,512,256);

    ns.forEach(n=>{
      if (n.progress && n.progress.pct != null){ pSum += n.progress.pct; pN++; }
      const r = (n.rate||[]).find(x=>x.label==='5h') || (n.rate||[])[0];
      const used = r && (r.used_pct ?? r.pct);
      if (used != null){ tSum += Math.max(0, 100-used); tN++; }
    });
    const pct = pN ? Math.round(pSum/pN) : 0;
    const tok = tN ? Math.round(tSum/tN) : null;
    g.fillStyle = '#bfe6ff'; g.font = '18px Menlo,monospace'; g.fillText(String(d.id).slice(0,10), 20, ry);
    g.fillStyle = '#132033'; g.fillRect(178, ry-15, 170, 16);
    g.fillStyle = pct>=90 ? '#6ee1be' : '#3fa8e0'; g.fillRect(178, ry-15, 170*Math.min(pct,100)/100, 16);
    g.fillStyle = '#cfeeff'; g.font = '15px Menlo,monospace'; g.fillText(pct+'%', 354, ry);
    g.fillStyle = tok==null ? '#667788' : (tok<15 ? '#ff8a8a' : '#ffd88a');
    g.fillText(tok==null ? '토큰 —' : ('토큰 '+tok+'%'), 400, ry);
    ry += 32;
  });
  const cost = lastWorld && lastWorld.board && lastWorld.board.cost_today;
  if (cost){ let t = '오늘 비용';

    g.fillStyle = '#ffd88a'; g.font = '600 20px Menlo,monospace'; g.fillText(t, 20, 244);
  }
  chairDashTex.needsUpdate = true;
}

// #9 칸반 벽면 — 부서 층 뒷벽 3열 보드(CanvasTexture, ≥2s 스로틀·patch_top 즉시).
//  전 보드에 동일 칸반(공유 백로그)을 그린다 — owner→부서 매핑 없이 결정론·게이트 친화.
function makeKanbanBoard(y, kx){
  const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 256;
  const tex = new THREE.CanvasTexture(canvas); tex.colorSpace = THREE.SRGBColorSpace;

  const grp = new THREE.Group(); grp.add(pane);
  return { grp, canvas, tex, lastDraw:0 };
}
function drawKanban(force){
  const kb = lastWorld && lastWorld.kanban;
  if (!kb || !kanbanBoards.length) return;
  const now = performance.now();
  const cols = [['todo','할일'],['doing','진행'],['done','완료']];
  let drawn = 0;
  kanbanBoards.forEach(board=>{
    if (!force && now - board.lastDraw < 2000) return;   // ≥2s 스로틀
    board.lastDraw = now;
    const g = board.canvas.getContext('2d');
    g.clearRect(0,0,512,256);
    g.fillStyle = 'rgba(8,18,32,0.92)'; g.fillRect(0,0,512,256);
    g.strokeStyle = '#3fa8e0'; g.lineWidth = 2; g.strokeRect(3,3,506,250);
    g.fillStyle = '#9fd8ff'; g.font = '600 20px Menlo,monospace'; g.fillText('KANBAN', 12, 26);
    let bd = 0;
    cols.forEach(([st,label],ci)=>{
      const x = 14 + ci*166;
      g.fillStyle = '#7fb8e8'; g.font = '600 16px Menlo,monospace'; g.fillText(label, x, 52);
      let cy = 66;
      (kb.tasks||[])
        .filter(t=> st==='doing' ? (t.status==='doing'||t.status==='blocked') : t.status===st)
        .slice(0,5).forEach(t=>{
          const blocked = t.status==='blocked';
          g.fillStyle = blocked ? '#3a1414' : '#0d2c4a'; g.fillRect(x, cy, 150, 30);
          g.fillStyle = blocked ? '#ff9a9a' : '#cfeeff'; g.font = '14px Menlo,monospace';
          g.fillText((blocked?'🔒 ':'') + String(t.title||t.id||'').slice(0,14), x+6, cy+20);
          cy += 36; bd++;
        });
    });
    board.tex.needsUpdate = true; drawn = bd;             // 보드당 카드 수(전 보드 동일)
  });
  if (dbg && drawn) dbg._kanbanCards = drawn;
}
// #12 로비 전광판 — 노드×24h 히트맵 + 오늘 비용(60s 스로틀·patch_top 즉시).
function makeBoardBillboard(y){
  boardCanvas = document.createElement('canvas'); boardCanvas.width = 512; boardCanvas.height = 256;
  boardTex = new THREE.CanvasTexture(boardCanvas); boardTex.colorSpace = THREE.SRGBColorSpace;
  lastBoardDraw = 0;
  const pane = new THREE.Mesh(new THREE.PlaneGeometry(3.4, 1.7),
    new THREE.MeshBasicMaterial({ map:boardTex, transparent:true }));
  pane.position.set(-SLAB_W/2+2.2, y+1.85, -SLAB_D/2+0.35);

  const g = new THREE.Group(); g.add(frame); g.add(pane);
  drawBoard(true);
  return g;
}
function drawBoard(force){
  if (!boardCanvas) return;
  const now = performance.now();
  if (!force && now - lastBoardDraw < 60000) return;      // 60s 스로틀
  lastBoardDraw = now;
  const g = boardCanvas.getContext('2d');
  g.clearRect(0,0,512,256);
  g.fillStyle = 'rgba(6,16,30,0.95)'; g.fillRect(0,0,512,256);
  g.strokeStyle = '#3fa8e0'; g.lineWidth = 3; g.strokeRect(4,4,504,248);
  g.fillStyle = '#7fe3ff'; g.font = '600 26px Menlo,monospace'; g.fillText('24H 히트맵 · 비용', 20, 38);
  const board = lastWorld && lastWorld.board;
  const heat = (board && board.heat) || {};
  let ry = 60;
  Object.entries(heat).slice(0,6).forEach(([key,arr])=>{
    g.fillStyle = '#8cc3eb'; g.font = '14px Menlo,monospace';
    g.fillText(String(key).replace('surface:','S'), 12, ry+14);
    for (let h=0; h<24 && h<(arr||[]).length; h++){
      const v = Math.max(0, Math.min(arr[h]||0, 1));
      g.fillStyle = `rgba(${Math.round(60+v*195)},${Math.round(120+v*60)},${Math.round(200-v*120)},${0.25+v*0.7})`;
      g.fillRect(70 + h*17, ry, 15, 20);
    }
    ry += 27;
  });
  const cost = board && board.cost_today;
  if (cost){                                              // null 필드는 생략
    let txt = '오늘';
    if (cost.usd != null) txt += ` $${cost.usd.toFixed(2)}`;
    if (cost.tokens != null) txt += ` · ${Math.round(cost.tokens/10000)}만 tok`;
    g.fillStyle = '#ffd77a'; g.font = '600 22px Menlo,monospace'; g.fillText(txt, 20, 242);
  }
  boardTex.needsUpdate = true;
  if (dbg) dbg._boardTs = now;
}
// #8 의존 화살표 — blocked[] 중 양측 노드 귀속 시 점선. 미귀속은 칸반 보드 표기로 대체.
function resolveNode(ref){
  if (ref == null) return null;
  if (nodes.has(ref)) return nodes.get(ref);              // 노드 key 직접 참조
  const rl = String(ref).toLowerCase();
  for (const e of nodes.values()){
    if (String(e.data.role||'').toLowerCase() === rl) return e;
    if (rl.length>3 && String(e.data.task||'').toLowerCase().includes(rl)) return e;
  }
  return null;
}
function rebuildBlocked(){
  blockedLines.forEach(l=>{ worldGroup.remove(l);
    l.geometry.dispose(); l.material.dispose();
    if (l.userData.lbl){ worldGroup.remove(l.userData.lbl);
      l.userData.lbl.material.map.dispose(); l.userData.lbl.material.dispose(); } });
  blockedLines = [];
  const items = (lastWorld && lastWorld.blocked) || [];
  let arrows = 0;
  items.forEach(it=>{
    const wait = it.key && nodes.get(it.key);
    if (!wait) return;                                    // 미귀속 → 칸반 보드가 표기
    (it.blocked_by||[]).forEach(bk=>{
      const pre = resolveNode(bk);
      if (!pre || pre === wait) return;
      const A = wait.group.position.clone().add(new THREE.Vector3(0,1.3,0));
      const B = pre.group.position.clone().add(new THREE.Vector3(0,1.3,0));
      const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints([A,B]),
        new THREE.LineDashedMaterial({ color:0xff9a5a, dashSize:0.25, gapSize:0.18,
          transparent:true, opacity:0.8 }));
      line.computeLineDistances(); worldGroup.add(line);
      const lbl = textSprite('⛔ ' + String(it.task||'').slice(0,16), { size:13, color:'#ffb488' });
      lbl.position.copy(A.clone().add(B).multiplyScalar(0.5)).add(new THREE.Vector3(0,0.35,0));
      worldGroup.add(lbl); line.userData.lbl = lbl;
      blockedLines.push(line); arrows++;
    });
  });
  if (dbg) dbg._blockedArrows = arrows;
}
// #10 patch_top review 최신 항목 → 판정 반영(fx verdict 경로와 동일 처리).
function handleReview(){
  const items = lastWorld && lastWorld.review && lastWorld.review.items;

// 상단 필드 갱신 프레임 (kanban/review/board/blocked). 미지 필드는 조용히 무시.
function handlePatchTop(f){
  if (!lastWorld || !f || !('field' in f)) return;
  if (dbg) dbg.patchTop[f.field] = (dbg.patchTop[f.field]||0) + 1;
  lastWorld[f.field] = f.value;
  if (f.field === 'kanban') drawKanban(true);
  else if (f.field === 'board') drawBoard(true);
  else if (f.field === 'blocked') rebuildBlocked();
  else if (f.field === 'review') handleReview();
}

function addNode(n, deptId, pos, seed, rot=0){
  const set = makeDeskSet(n, seed);
  set.grp.position.copy(pos);
  set.grp.rotation.y = rot;          // D1 데스크 방향(템플릿 창가열·클러스터 변주)
  const bat = batterySprite(n.ctx?.pct);
  bat.position.set(0, 1.95, 0); set.grp.add(bat);
  const label = textSprite(n.role, { size:20, color:'#d8ecfa' });
  label.position.set(0, 0.14, 0.95); set.grp.add(label);
  let note = null;
  if (n.task){ note = textSprite(n.task.slice(0,26), { size:14, color:'#86aacd' });
    note.position.set(0, -0.06, 0.95); set.grp.add(note); }
  set.grp.traverse(o=>{ o.userData.nodeKey = n.key; });   // 클릭 판정용
  worldGroup.add(set.grp);
  const ent = { set, group:set.grp, data:n, deptId, battery:bat, seed,
    anim:{ handupUntil:0, critical:false, rateLimited:false } };
  nodes.set(n.key, ent);
  applyNodeFlags(ent);
  updateDetails(ent);          // 디테일 12종 초기 반영
}
function applyNodeFlags(ent){
  const n = ent.data;
  ent.anim.critical = (n.flags||[]).includes('ctx_critical') || n.presence==='quiescing';
  ent.anim.rateLimited = (n.flags||[]).includes('rate_limited');
  ent.set.mug.visible = ent.anim.rateLimited;
}
function patchNode(key, n){
  const ent = nodes.get(key);
  if (!ent){ fetchWorld(); return; }
  const prev = ent.data; ent.data = n;
  if ((prev.ctx?.pct??null) !== (n.ctx?.pct??null)){
    ent.group.remove(ent.battery);
    ent.battery.material.map.dispose(); ent.battery.material.dispose();
    ent.battery = batterySprite(n.ctx?.pct);
    ent.battery.position.set(0, 2.15, 0); ent.group.add(ent.battery);
    if ((n.ctx?.pct??0) >= 90 && (prev.ctx?.pct??0) < 90)
      addTick(`⚠ ${labelOf(key)} 컨텍스트 ${n.ctx.pct}% — /clear 임박`, 2);
  }
  if (prev.presence !== n.presence)
    addTick(`${labelOf(key)} ${PRESENCE_KO[prev.presence]||prev.presence} → ${PRESENCE_KO[n.presence]||n.presence}`, 0);
  applyNodeFlags(ent);
  updateDetails(ent);          // ctx·activity·rate·run·progress·idle 재반영
  refreshStats();
  if (selected === key) fillPanel(ent);
}
function labelOf(key){
  const e = nodes.get(key);
  return e ? `${e.deptId}·${e.data.role}` : key;
}

// ---------- 직원 디테일 갱신 (12종 · 이벤트 구동 — per-frame 아님) ----------
function updateCtxGauge(ent){                       // #1
  const { gaugeFill:g, gaugeTrack:tr } = ent.set;
  const pct = ent.data.ctx?.pct;
  if (pct == null){ g.visible = false; tr.visible = false; ent.gaugeCrit = false; return; }
  tr.visible = true; g.visible = true;
  const h = Math.max(0.03, Math.min(pct,100)/100 * 0.8);
  g.scale.y = h; g.position.y = 0.5 + h/2;          // 아래 앵커
  g.material.color.setHex(pct>=90 ? 0xff4646 : pct>=60 ? 0xffcc55 : 0x35e0c0);
  g.material.opacity = 1;
  ent.gaugeCrit = pct >= 90;                        // ≥90 점멸(프레임 루프)
}
function drawCode(ent){                             // #2 모니터 코드 라인 (활동 ∝ 밀도·밝기)
  const c = ent.set.codeCanvas, g = c.getContext('2d');
  const act = ent.data.activity || 0;
  g.fillStyle = '#060a12'; g.fillRect(0,0,128,128);
  if (ent.data.presence === 'dead'){ ent.set.codeTex.needsUpdate = true; return; }
  const hue = act > 0.6 ? '#6ee1be' : act > 0.2 ? '#7fb8e8' : '#3a5068';
  for (let i=0;i<14;i++){
    g.fillStyle = i % 5 === 0 ? '#c9a86a' : hue;
    const x = 6 + (i*13 % 22), w = 26 + ((i*37) % 66) * (0.4 + act*0.6);
    g.globalAlpha = 0.45 + 0.55*Math.min(act*1.4, 1);
    g.fillRect(x, 4 + i*9, w, 3);
  }
  g.globalAlpha = 1; ent.set.codeTex.needsUpdate = true;
}
function updateActivity(ent){                        // #2
  drawCode(ent);                                    // 내용 갱신은 패치 구동(≥1s 스로틀 자연 충족)
  const act = ent.data.activity || 0;
  const n = ent.data.presence==='dead' ? 0 : act>=0.75?3: act>=0.5?2: act>=0.25?1:0;
  ent.set.papers.forEach((p,i)=> p.visible = i < n);
  ent.codeSpeed = ent.data.presence==='dead' ? 0 : act;   // 스크롤 속도(프레임 루프)
}
function updateRateLed(ent){                         // #3
  const led = ent.set.rateLed, rate = ent.data.rate || [];
  const r = rate.find(x=>x.label==='5h') || rate[0];
  const used = r && (r.used_pct ?? r.pct);
  if (used == null){ led.visible = false; return; }
  led.visible = true;
  const frac = Math.max(0, Math.min(used,100))/100;
  led.scale.x = Math.max(0.02, frac);
  led.position.x = -0.31 + (0.62*frac)/2;           // 좌측 앵커
  led.material.color.setHex(used>=90 ? 0xff5a5a : used>=70 ? 0xffcc55 : 0x35e0c0);
}
function updateRun(ent){                             // #7
  const run = ent.data.run;
  const q = run ? Math.min(run.queued||0, 5) : 0;
  ent.set.runCards.forEach((c,i)=> c.visible = i < q);
  if (!ent.failCardUntil) ent.set.activeCard.visible = !!(run && run.active);
}
function updateProgress(ent){                        // #6
  const pr = ent.data.progress, ring = ent.set.progRing, fill = ent.set.ringFill;
  if (!pr){ ring.visible = false;
    if (ent.progLabel){ ent.set.grp.remove(ent.progLabel);
      ent.progLabel.material.map.dispose(); ent.progLabel.material.dispose();
      ent.progLabel = null; ent.progLabelTxt = null; }
    return; }
  ring.visible = true;

const VERDICT_COL = { ACCEPT:0x35e0c0, REVISE:0xffcc55, BLOCK:0xff5a5a, ESCALATE:0xb07fe0 };
function reviewerNodes(reviewer){
  const rv = (reviewer||'').toLowerCase(); if (!rv) return [];
  return [...nodes.values()].filter(e=>{
    const role = (e.data.role||'').toLowerCase();
    return role === rv || role === 'reviewer-'+rv || (rv.length>2 && role.endsWith(rv));
  });
}
function handleVerdict(f){
  const col = VERDICT_COL[f.verdict] || 0x9fd8ff;
  const matched = reviewerNodes(f.reviewer);
  addTick(`⚖ ${f.reviewer||''} ${f.verdict||''}${f.target?' · '+f.target:''}`,
    f.verdict==='BLOCK'?2 : f.verdict==='ACCEPT'?0 : 1);
  matched.forEach(e=> pop(e, `⚖ ${f.verdict||''}`, '#'+col.toString(16).padStart(6,'0')));
  if (matched.length){ gatherReview(matched); if (dbg) dbg.reviewConvened++; }
}
function gatherReview(members){
  members.forEach((e,i)=>{ if (e.data.presence==='dead' || e.override || e.walkAnim) return;
    const plan = floorPlans.get(e.deptId); if (!plan) return;   // 각자 소속 부서 회의실로(plan SOT)
    const ang = (i/members.length)*Math.PI*2;
    const rx = plan.meeting.w/2 - 0.5, rz = plan.meeting.d/2 - 0.5;
    entWalkTo(e, plan.gather.x + Math.cos(ang)*rx, plan.gather.z + Math.sin(ang)*rz, 'stand'); });
  reviewGather = { members, until: performance.now() + 8000 };   // 8초 후 자동 복귀
}

// ---------- 말풍선 (MMORPG 대화 · #2) ----------
const bubbles = [];
function makeBubble(text){
  const c = document.createElement('canvas'), g = c.getContext('2d');
  const size = 26, pad = 16, maxW = 560;
  g.font = `600 ${size}px 'SF Mono', Menlo, monospace`;
  const words = text.split(' '); const lines = ['']; 
  for (const w of words){
    const t = (lines[lines.length-1] + ' ' + w).trim();
    if (g.measureText(t).width > maxW && lines[lines.length-1]) lines.push(w);
    else lines[lines.length-1] = t;
    if (lines.length >= 4){ lines[3] += '…'; break; }
  }
  const w = Math.min(maxW, Math.max(...lines.map(l=>g.measureText(l).width))) + pad*2;
  const h = lines.length*size*1.25 + pad*2 + 14;
  c.width = w; c.height = h;
  g.font = `600 ${size}px 'SF Mono', Menlo, monospace`;
  g.fillStyle = 'rgba(240,246,252,0.96)';
  const r = 12, bw = w, bh = h-14;
  g.beginPath(); g.moveTo(r,0); g.lineTo(bw-r,0); g.arcTo(bw,0,bw,r,r); g.lineTo(bw,bh-r);
  g.arcTo(bw,bh,bw-r,bh,r); g.lineTo(bw/2+12,bh); g.lineTo(bw/2,h); g.lineTo(bw/2-12,bh);
  g.lineTo(r,bh); g.arcTo(0,bh,0,bh-r,r); g.lineTo(0,r); g.arcTo(0,0,r,0,r); g.fill();
  g.fillStyle = '#101820'; g.textBaseline = 'top';
  lines.forEach((l,i)=>g.fillText(l, pad, pad + i*size*1.25));
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false }));
  sp.scale.set(w*0.0062, h*0.0062, 1);
  return sp;
}
function sayAt(pos, text, life=5.5){
  const sp = makeBubble(text);
  sp.position.copy(pos).add(new THREE.Vector3(0, 2.35, 0));
  worldGroup.add(sp); bubbles.push({ s:sp, life });
}

const ELEV = { x: -SLAB_W/2+0.9, z: SLAB_D/2-0.8 };

// 👑 왕좌 근접 자동 착석 — 주인이 옥상 왕좌 반경 안에서 멈추면 앉고, 이동을 시작하면 일어선다.
let ownerSeated = false;
// 자리 존 AABB — 책상+왕좌를 포함. 존 안에서 정지(idle)하면 왕좌로 스냅 걷기 후 착석.
const SEAT_ZONE = { x0:-0.7, x1:1.7, z0:-3.9, z1:-2.2 };
function updateThroneSeat(dt){
  if (ownerSeated) return;
  const g = owner.pr.grp;
  const roofY = FLOORS.length ? FLOORS[FLOORS.length-1] : 0;
  const onRoof = Math.abs(g.position.y - (roofY + 0.74)) < 0.45;
  const inZone = onRoof && g.position.x > SEAT_ZONE.x0 && g.position.x < SEAT_ZONE.x1
                        && g.position.z > SEAT_ZONE.z0 && g.position.z < SEAT_ZONE.z1;
  if (!inZone) return;
  const dx = THRONE.x - g.position.x, dz = THRONE.z - g.position.z;
  const dist = Math.hypot(dx, dz);
  if (dist > 0.06){                    // 왕좌 핀포인트로 짧은 스냅 걷기(다음 프레임 계속)
    const step = Math.min(WALK_SPEED*(dt||0.016), dist);
    g.position.x += dx/dist*step; g.position.z += dz/dist*step;
    g.rotation.y = Math.atan2(dx, dz);
    owner.walkPh += (dt||0.016)*9; owner.pr.swing(owner.walkPh);
    return;
  }
  ownerSeated = true;                  // 도착 → 착석
  g.position.set(THRONE.x, roofY + THRONE.seatY, THRONE.z);
  g.rotation.y = Math.PI;              // ㄴ자 다리(-z)가 책상(+z)으로 — 직원 착석과 동일 패턴
  owner.pr.setStanding(false);         // 착석 포즈
  owner.pr.swing(0);
}
function standFromThrone(){
  if (!ownerSeated) return;
  ownerSeated = false;
  owner.pr.setStanding(true);          // 기립 포즈
  const roofY = FLOORS.length ? FLOORS[FLOORS.length-1] : 0;
  owner.pr.grp.position.y = roofY + 0.74;   // 좌면고(seatY)→층 보행고 복원(침하 보행 결함 수리)
  owner.pr.swing(0);
}

function ownerDeliver(key, text, opts={}){
  const ent = nodes.get(key); if (!owner || !ent) return false;
  if (owner.busy){ addChat('sy','시스템','주인이 이동 중입니다 — 잠시 후 다시.'); return false; }

function advanceOwner(dt, t){
  if (!owner || !owner.plan.length){
    if (owner){ owner.busy = false; updateThroneSeat(dt); }   // 정지 상태 — 자리 존이면 스냅 착석

  const g = owner.pr.grp, step = owner.plan[0];
  if (step.t === 'walk'){
    const d = step.to.clone().sub(g.position); d.y = 0;
    const dist = d.length();
    if (dist < 0.08){ g.position.x = step.to.x; g.position.z = step.to.z;
      owner.pr.swing(0); owner.plan.shift(); return; }
    d.normalize(); g.position.addScaledVector(d, Math.min(WALK_SPEED*dt, dist));
    g.rotation.y = Math.atan2(d.x, d.z);
    owner.walkPh += dt*9; owner.pr.swing(owner.walkPh);
  } else if (step.t === 'ride'){
    const dy = step.y - g.position.y;
    const mv = Math.sign(dy) * Math.min(RIDE_SPEED*dt, Math.abs(dy));
    g.position.y += mv; elevCar.position.y = g.position.y + 0.24;
    if (Math.abs(step.y - g.position.y) < 0.03){ g.position.y = step.y; owner.plan.shift(); }
  } else if (step.t === 'focus'){
    setCam('focus', 0, step.y + 1.5, 0, 14, 0); owner.plan.shift();
  } else if (step.t === 'unfocus'){
    setTimeout(releaseCam, 1200); owner.plan.shift();
  } else if (step.t === 'say'){
    sayAt(g.position, step.text); owner.plan.shift();
  } else if (step.t === 'post'){
    postCommand(step.key, step.text, step.meeting).then(ok=>{
      if (!ok) addChat('sy','시스템','전달 실패 — 게이트 거부 또는 브리지 오류');
    });
    owner.plan.shift();
  } else if (step.t === 'wait'){
    step.s -= dt; if (step.s <= 0) owner.plan.shift();
  } else if (step.t === 'arrive'){
    arriveFloor(step.y); owner.plan.shift();
  } else if (step.t === 'manualDone'){
    owner.busy = false; owner.manual = false; owner.pr.swing(0); owner.plan.shift();
  } else owner.plan.shift();
}
// ---------- 주인 직접 조종 (MMORPG · 2026-07-07 박사님 지시) ----------
let FLOORS = [];            // buildWorld가 채움 (로비·부서층·옥상 y 목록)
const FLOOR_NAMES = new Map();
const keys = {};
const KEYMAP = { arrowup:'up', arrowdown:'down', arrowleft:'left', arrowright:'right',
                 w:'up', s:'down', a:'left', d:'right' };
addEventListener('keydown', e=>{
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;   // 채팅 타이핑은 이동 아님
  const k = KEYMAP[e.key.toLowerCase()];
  if (k){ keys[k] = true; e.preventDefault(); }
});
addEventListener('keyup', e=>{
  const k = KEYMAP[e.key.toLowerCase()];
  if (k) keys[k] = false;
});
let elevCooldown = 0;
function curFloorY(){ return owner ? owner.pr.grp.position.y - 0.74 : 0; }
function arriveFloor(fy){
  // 줌인 규율: 주인이 이동해 층에 '들어갈 때만' 줌인. 옥상 복귀 = 전체 뷰.
  const roof = FLOORS.length ? FLOORS[FLOORS.length-1] : null;
  if (roof !== null && Math.abs(fy - roof) < 0.3) releaseCam();
  else setCam('focus', 0, fy + 1.5, 0, 14, 0);
  const nm = FLOOR_NAMES.get(Math.round(fy*10)/10);
  if (nm) sayAt(owner.pr.grp.position, `${nm} 도착`, 2.2);
}
function moveOwnerTo(fy, x, z){
  if (!owner || (owner.busy && !owner.manual)) return;   // 강림(지시 전달) 중엔 보호
  x = Math.max(-SLAB_W/2+0.5, Math.min(SLAB_W/2-0.5, x));
  z = Math.max(-SLAB_D/2+0.5, Math.min(SLAB_D/2-0.5, z));
  const cy = curFloorY();
  owner.manual = true; owner.busy = true;
  if (Math.abs(cy - fy) < 0.3){
    owner.plan = [ { t:'walk', to:new THREE.Vector3(x, fy+0.74, z) }, { t:'manualDone' } ];
  } else {
    owner.plan = [
      { t:'walk', to:new THREE.Vector3(ELEV.x, cy+0.74, ELEV.z) },
      { t:'ride', y: fy+0.74 },
      { t:'arrive', y: fy },
      { t:'walk', to:new THREE.Vector3(x, fy+0.74, z) },
      { t:'manualDone' },
    ];
  }
}
function ownerManualTick(dt){
  if (!owner) return;
  elevCooldown = Math.max(0, elevCooldown - dt);
  if (owner.busy && !owner.manual) return;               // 강림 플랜 보호
  const g = owner.pr.grp;
  const inElev = Math.hypot(g.position.x - ELEV.x, g.position.z - ELEV.z) < 1.15;
  const ax = (keys.right?1:0) - (keys.left?1:0);
  const az = (keys.up?1:0) - (keys.down?1:0);
  if (inElev && az !== 0 && ax === 0){                    // 엘리베이터 존: ⬆⬇ = 층 이동
    if (elevCooldown > 0) return;
    const cy = curFloorY();
    const i = FLOORS.findIndex(f=>Math.abs(f-cy) < 0.3);
    const ni = i + (az > 0 ? 1 : -1);
    if (i >= 0 && ni >= 0 && ni < FLOORS.length){
      elevCooldown = 0.6;
      owner.manual = true; owner.busy = true;
      owner.plan = [ { t:'ride', y: FLOORS[ni]+0.74 }, { t:'arrive', y: FLOORS[ni] },
                     { t:'manualDone' } ];
    }
    return;
  }
  if (ax === 0 && az === 0) return;
  standFromThrone();                                        // 키보드 이동도 기립 트리거(스케이팅 결함 수리)
  if (owner.manual && owner.plan.length){
    if (owner.plan[0].t === 'ride' || owner.plan[0].t === 'arrive') return; // 승강 중 보행 불가
    owner.plan = [];                                        // 키 입력이 클릭 이동을 대체
  }
  // 카메라 기준 상대 방향 보행
  const fwd = new THREE.Vector3(orbit.tx - camera.position.x, 0, orbit.tz - camera.position.z).normalize();
  const right = new THREE.Vector3(-fwd.z, 0, fwd.x);
  const dir = fwd.multiplyScalar(az).add(right.multiplyScalar(ax));
  if (dir.lengthSq() < 1e-4) return;
  dir.normalize();
  g.position.addScaledVector(dir, WALK_SPEED*dt);
  g.position.x = Math.max(-SLAB_W/2+0.4, Math.min(SLAB_W/2-0.4, g.position.x));
  g.position.z = Math.max(-SLAB_D/2+0.4, Math.min(SLAB_D/2-0.4, g.position.z));
  g.rotation.y = Math.atan2(dir.x, dir.z);
  owner.walkPh += dt*9; owner.pr.swing(owner.walkPh);
  owner.manual = false; owner.busy = false;
}

// ---------- D4. watchdog 강아지 (저폴리 · 순찰 · kill/alert 반응) ----------
//  메시에 nodeKey·floorY userData 비부여(클릭 오염 방지). 층간 이동=승강 코어 페이드(elevCar 미사용).
function makeDog(){
  const g = new THREE.Group();
  const fur  = new THREE.MeshStandardMaterial({ color:0xb98a52, roughness:0.85, transparent:true });
  const furD = new THREE.MeshStandardMaterial({ color:0x8a5f34, roughness:0.85, transparent:true });
  g.add(mesh(new THREE.BoxGeometry(0.26, 0.28, 0.5), fur, 0, 0.34, 0));          // 몸(전후=z, 머리 +z)
  g.add(mesh(new THREE.BoxGeometry(0.24, 0.24, 0.22), fur, 0, 0.46, 0.34));      // 머리
  g.add(mesh(new THREE.BoxGeometry(0.12, 0.1, 0.12), furD, 0, 0.42, 0.47, false));   // 주둥이
  g.add(mesh(new THREE.BoxGeometry(0.06, 0.12, 0.05), furD,  0.09, 0.60, 0.30, false));  // 귀
  g.add(mesh(new THREE.BoxGeometry(0.06, 0.12, 0.05), furD, -0.09, 0.60, 0.30, false));
  const legG = new THREE.BoxGeometry(0.07, 0.22, 0.07);
  [[0.10,0.18],[-0.10,0.18],[0.10,-0.18],[-0.10,-0.18]].forEach(([lx,lz])=>
    g.add(mesh(legG, furD, lx, 0.11, lz, false)));
  const tail = new THREE.Group(); tail.position.set(0, 0.44, -0.25);             // 꼬리(-z 후방)
  tail.add(mesh(new THREE.BoxGeometry(0.05, 0.05, 0.22), fur, 0, 0.06, -0.10, false));
  g.add(tail);
  g.scale.setScalar(0.95);
  return { grp:g, tail };
}
function buildDog(){
  const d = makeDog();
  worldGroup.add(d.grp);                     // userData 미부여 — 클릭/층 판정 오염 없음
  dogRoute = [];
  const lob = floorPlans.get('로비');
  dogRoute.push({ y:0, patrol: (lob && lob.patrol) || [[0,3.4],[3.6,0],[-3.6,0]] });
  (lastWorld.departments||[]).forEach(dep=>{
    const pl = floorPlans.get(dep.id);
    if (pl && pl.patrol) dogRoute.push({ y: dep.floor*FLOOR_H, patrol: pl.patrol });
  });
  dogRoute.push({ y: SERVER_Y, patrol: [[-2,1.6],[2,1.6],[0,-1.2]] });   // 지하 서버룸
  dog = { grp:d.grp, tail:d.tail, wag:0, state:'patrol', ri:0, wi:0, op:1,
    trY:0, trPhase:'out', trThen:'patrol', killPid:null, killPopped:false,
    barks:0, barkTimer:0, holdMs:0 };
  const p0 = dogRoute[0].patrol[0];
  d.grp.position.set(p0[0], 0, p0[1]);       // 로비 리셋(재빌드 규약)
}
const DOG_SPEED = 2.2;
function dogSetOpacity(o){ dog.grp.traverse(m=>{ if (m.material) m.material.opacity = o; }); }
function dogStepTo(g, x, y, z, dt, speed=DOG_SPEED){
  g.position.y = y;
  const dx = x - g.position.x, dz = z - g.position.z, dist = Math.hypot(dx, dz);
  if (dist < 0.08) return true;
  const s = Math.min(speed*dt, dist);
  g.position.x += dx/dist*s; g.position.z += dz/dist*s;
  g.rotation.y = Math.atan2(dx, dz);         // 머리 +z 전방 — 직원 규약과 동일
  return false;
}
function dogPop(txt, color){
  const s = textSprite(txt, { size:19, color, bg:'rgba(8,26,46,.92)' });
  s.position.copy(dog.grp.position).add(new THREE.Vector3(0, 1.15, 0));
  worldGroup.add(s); pops.push({ s, life:1.6 });
}
function flashRack(pid){                      // pid가 racks에 등록됐을 때만 — 통상 miss가 정상(fallback 기본)
  const led = racks.get(pid); if (!led) return;
  const orig = led.material.color.getHex(); let n = 0;
  const iv = setInterval(()=>{ if (!led.material){ clearInterval(iv); return; }
    led.material.color.setHex(n%2 ? 0xff3030 : 0x330808); n++;
    if (n > 12){ clearInterval(iv); led.material.color.setHex(orig); } }, 250);   // 3s
}
function dogEnter(state){
  if (state === 'kill_run') dog.killPopped = false;
  else if (state === 'alert_bark'){ dog.barks = 2; dog.barkTimer = 0; }
}
function dogTransitTo(targetY, thenState){    // 승강 코어 페이드 전환(elevCar 미사용)
  if (Math.abs(dog.grp.position.y - targetY) < 0.2){ dog.state = thenState; dogEnter(thenState); return; }
  dog.trY = targetY; dog.trThen = thenState; dog.trPhase = 'out'; dog.state = 'transit';
}
function dogResume(){
  const y = dog.grp.position.y;
  const ri = dogRoute.findIndex(r=>Math.abs(r.y - y) < 0.3);
  dog.ri = ri >= 0 ? ri : 0; dog.wi = 0; dog.op = 1; dogSetOpacity(1); dog.state = 'patrol';
}
function dogTick(dt){
  if (!dog || !dogRoute.length) return;
  dog.wag += dt*10; dog.tail.rotation.y = Math.sin(dog.wag)*0.5;   // 꼬리 흔들기
  const g = dog.grp;
  if (dog.state === 'transit'){
    if (dog.trPhase === 'out'){
      const arr = dogStepTo(g, ELEV.x, g.position.y, ELEV.z, dt);
      dog.op = Math.max(0, dog.op - dt*2.4); dogSetOpacity(dog.op);
      if (arr && dog.op <= 0.05){ g.position.set(ELEV.x, dog.trY, ELEV.z); dog.trPhase = 'in'; }
    } else {
      dog.op = Math.min(1, dog.op + dt*2.4); dogSetOpacity(dog.op);
      if (dog.op >= 1){ dog.state = dog.trThen; dogEnter(dog.trThen); }
    }
    return;
  }
  if (dog.state === 'patrol'){
    const route = dogRoute[dog.ri]; const wp = route.patrol[dog.wi] || [0,0];
    if (dogStepTo(g, wp[0], route.y, wp[1], dt)){
      dog.wi++;
      if (dog.wi >= route.patrol.length){
        dog.ri = (dog.ri + 1) % dogRoute.length; dog.wi = 0;
        dogTransitTo(dogRoute[dog.ri].y, 'patrol');
      }
    }
    return;
  }
  if (dog.state === 'kill_run'){
    if (dogStepTo(g, 0, SERVER_Y, 0, dt, 3.4)){                    // 서버룸 중앙 질주(기본 타깃)
      if (!dog.killPopped){ dog.killPopped = true; dogPop('💢', '#ff6a6a');
        if (dog.killPid != null) flashRack(dog.killPid); dog.holdMs = performance.now() + 1600; }
      if (performance.now() > dog.holdMs) dogResume();
    }
    return;
  }
  if (dog.state === 'alert_bark'){
    dog.barkTimer -= dt;
    if (dog.barks > 0 && dog.barkTimer <= 0){ dog.barks--; dog.barkTimer = 0.6; dogPop('🐶 멍!', '#ffd166'); }
    if (dog.barks <= 0 && dog.barkTimer <= 0.15) dogResume();
    return;
  }
}
function fxDog(f){                             // {t:'dog', kind:'kill'|'alert', pid?/sid?, count?}
  if (!dog) return;
  if (dog.state === 'transit') return;         // 이동 중엔 신규 반응 무시(코얼레싱은 브리지가 담당)
  if (f.kind === 'kill'){
    dog.killPid = f.pid;
    addTick(`🐶 watchdog: 중복 프로세스 감지 — 강아지 출동${f.pid!=null?' (pid '+f.pid+')':''}`, 1);
    dogTransitTo(SERVER_Y, 'kill_run');
  } else if (f.kind === 'alert'){
    addTick(`🐶 watchdog 경보: 프로세스 과다${f.count?' ('+f.count+')':''}`, 1);
    let ty = dog.grp.position.y;               // sid → 노드 층(있으면), 없으면 현재 층에서 짖기
    if (f.sid != null){
      for (const e of nodes.values()){ if (String(e.data.key).includes(String(f.sid))){ ty = e.group.position.y; break; } }
    }
    if (Math.abs(ty - dog.grp.position.y) < 0.3){ dog.state = 'alert_bark'; dogEnter('alert_bark'); }
    else dogTransitTo(ty, 'alert_bark');
  }
}

async function postCommand(key, text, meeting){
  try {
    const r = await fetch('/command', { method:'POST',
      headers: { 'Content-Type':'application/json', 'X-HUD-Token': HUD_TOKEN },
      body: JSON.stringify({ key, text: (meeting?'[회의 소집] ':'') + text }) });
    const j = await r.json();
    if (j.ok) pendingCmd = { key, at: performance.now() };
    return j.ok;
  } catch(e){ return false; }
}

canvas.addEventListener('click', e=>{

// ---------- task 전문 말풍선 (hover/선택 · #4) ----------
let taskTipKey = null, lastHover = 0;
function makeMultilineSprite(lines){
  const size = 16, pad = 10, c = document.createElement('canvas'), g = c.getContext('2d');
  g.font = `600 ${size}px 'SF Mono',Menlo,monospace`;
  const w = Math.ceil(Math.max(1, ...lines.map(l=>g.measureText(l).width))) + pad*2;
  const h = lines.length*size*1.3 + pad*2;
  c.width = w; c.height = h;
  g.font = `600 ${size}px 'SF Mono',Menlo,monospace`;
  g.fillStyle = 'rgba(8,20,36,0.94)'; g.fillRect(0,0,w,h);
  g.strokeStyle = 'rgba(120,220,255,.7)'; g.lineWidth = 2; g.strokeRect(1,1,w-2,h-2);
  g.fillStyle = '#dff0ff'; g.textBaseline = 'top';
  lines.forEach((l,i)=> g.fillText(l, pad, pad + i*size*1.3));
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false }));
  sp.scale.set(w*0.006, h*0.006, 1);
  return sp;
}

// ---------- 협업 광섬유 아크 (#5) ----------
const links = new Map(); let lastLinkT = 0;
function linkBump(a, b){
  if (!a || !b || a === b || !nodes.has(a) || !nodes.has(b)) return;
  const k = a < b ? a+'|'+b : b+'|'+a;
  const e = links.get(k) || { n:0, ts:0, line:null };
  e.n = Math.min(e.n+1, 10); e.ts = performance.now(); links.set(k, e);
}
function updateLinks(nowMs){
  links.forEach((e,k)=>{
    const age = (nowMs - e.ts)/1000;
    if (age > 1800){
      if (e.line){ worldGroup.remove(e.line); e.line.geometry.dispose(); e.line.material.dispose(); }
      links.delete(k); return;
    }
    const [ka, kb] = k.split('|');
    const A = nodes.get(ka), B = nodes.get(kb);
    if (!A || !B) return;
    if (!e.line){
      const P0 = A.group.position.clone().add(new THREE.Vector3(0,1.5,0));
      const P2 = B.group.position.clone().add(new THREE.Vector3(0,1.5,0));
      const P1 = P0.clone().add(P2).multiplyScalar(0.5); P1.y = Math.max(P0.y,P2.y)+1.6;
      const pts = [];
      for (let i=0;i<24;i++){ const u=i/23, m=1-u;
        pts.push(new THREE.Vector3(
          m*m*P0.x+2*m*u*P1.x+u*u*P2.x, m*m*P0.y+2*m*u*P1.y+u*u*P2.y,
          m*m*P0.z+2*m*u*P1.z+u*u*P2.z)); }
      e.line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color:0x66d9ff, transparent:true, opacity:0.2 }));
      worldGroup.add(e.line);
    }
    e.line.material.opacity = Math.min(0.5, 0.10 + e.n*0.04) * (1 - age/1800);
  });
}

const weather = { level:0, lastBad:0, rain:null, flash:0 };
function weatherBump(n){ weather.level = Math.min(2, weather.level+n); weather.lastBad = performance.now(); }
function weatherTick(dt){
  const now = performance.now();
  if (weather.level > 0 && now - weather.lastBad > 300000){ weather.level--; weather.lastBad = now; }
  if (!weather.rain){
    const N = 700, arr = new Float32Array(N*3);
    for (let i=0;i<N;i++){ arr[i*3]=(Math.random()-0.5)*52; arr[i*3+1]=Math.random()*30;
      arr[i*3+2]=(Math.random()-0.5)*52; }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(arr, 3));
    weather.rain = new THREE.Points(geo, new THREE.PointsMaterial({
      color:0x9fc8e8, size:0.14, transparent:true, opacity:0.35 }));
    weather.rain.visible = false; scene.add(weather.rain);
  }
  weather.rain.visible = weather.level > 0;
  if (weather.level > 0){
    const pos = weather.rain.geometry.attributes.position;
    for (let i=0;i<pos.count;i++){
      let y = pos.getY(i) - dt*(9 + 9*weather.level);
      if (y < -3) y = 28;
      pos.setY(i, y);
    }
    pos.needsUpdate = true;
    weather.rain.material.opacity = weather.level === 2 ? 0.55 : 0.3;
  }
  if (weather.level === 2 && Math.random() < dt*0.25) weather.flash = 0.12;
  if (weather.flash > 0) weather.flash -= dt;
}

// ---------- 회의 소집 (#3 — 실제 send + 아바타 집합) ----------
let meeting = null;
function entWalkTo(ent, wx, wz, done){
  const pg = ent.set.person.grp;
  const lx = wx - ent.group.position.x, lz = wz - ent.group.position.z;
  ent.set.person.setStanding(true);
  ent.override = 'walk';
  const fx = pg.position.x, fy = pg.position.y, fz = pg.position.z;
  const dist = Math.hypot(lx-fx, lz-fz);
  ent.walkAnim = { fx, fy, fz, tx:lx, ty: done==='seat' ? 0.48 : 0.74, tz:lz,
                   t:0, dur: Math.max(dist/1.9, 0.4), done };
}
function convene(){
  if (!selected){ addChat('sy','시스템','먼저 노드를 클릭해 대상 부서를 선택하세요'); return; }
  const sel = nodes.get(selected); if (!sel) return;
  const deptId = sel.deptId;
  const members = [...nodes.values()].filter(e=>e.deptId===deptId && e.data.presence!=='dead');
  if (!members.length) return;
  const topic = document.getElementById('chat-input').value.trim() || '부서 회의';
  document.getElementById('chat-input').value = '';
  members.forEach(e=> postCommand(e.data.key, `[회의 소집 · 주인] ${topic} — 회의실 집합`, false));
  const plan = floorPlans.get(deptId) || floorPlanOf(deptId, shuffleSeed, members.length);
  const gx = plan.gather.x, gz = plan.gather.z;              // 집합점 = 회의실 중심(plan SOT)
  const rx = plan.meeting.w/2 - 0.4, rz = plan.meeting.d/2 - 0.4;   // 링 = 회의실 AABB 내부(상수 금지)
  members.forEach((e,i)=>{
    const ang = (i/members.length)*Math.PI*2;
    entWalkTo(e, gx + Math.cos(ang)*rx, gz + Math.sin(ang)*rz, 'stand');
  });
  meeting = { deptId, until: performance.now() + 180000 };
  document.getElementById('b-dismiss').hidden = false;
  addChat('sy','시스템',`${deptId} 회의 소집 (${members.length}명) — 3분 후 자동 해산`);
  // 주인도 회의실로 강림

      { t:'walk', to:new THREE.Vector3(ELEV.x, owner.pr.grp.position.y, ELEV.z) },
      { t:'ride', y: fy+0.74 },

      { t:'walk', to:new THREE.Vector3(gx, fy+0.74, gz + plan.meeting.d/2 + 0.9) },

      { t:'wait', s: 6 },
    ];
    owner.busy = true;
    addChat('o','👑 주인', `[회의 소집] ${topic}`);
  }
}

// ---------- 타임머신 (#4 — fx 아카이브 리플레이 · 최근 6시간) ----------
const replay = { mode:false, events:[], simT:0, t0:0, t1:0, idx:0, loaded:false };
const tlSlider = document.getElementById('tl-slider'), tlLabel = document.getElementById('tl-label');
async function loadHistory(){
  try {
    const j = await (await fetch('/history?after=' + (Date.now()/1000 - 21600))).json();
    replay.events = j.events || []; replay.loaded = true;
  } catch(e){ replay.events = []; }
}
tlSlider.addEventListener('input', async ()=>{
  const v = +tlSlider.value;
  if (v >= 1000){ exitReplay(); return; }
  if (!replay.loaded) await loadHistory();
  replay.t1 = Date.now()/1000;
  replay.t0 = replay.t1 - 21600;
  replay.simT = replay.t0 + (replay.t1 - replay.t0)*(v/1000);
  replay.idx = replay.events.findIndex(e=>e.ts > replay.simT);
  if (replay.idx < 0) replay.idx = replay.events.length;
  replay.mode = true;
});
function exitReplay(){ replay.mode = false; tlSlider.value = 1000; tlLabel.textContent = 'LIVE'; }
function replayTick(dt){
  replay.simT += dt*90;   // 90배속
  while (replay.idx < replay.events.length && replay.events[replay.idx].ts <= replay.simT){
    const ev = replay.events[replay.idx].fx;
    if (ev && ev.t === 'dog') fxDog(ev); else handleFx(ev);   // 강아지 fx는 t로 분리 라우팅
    replay.idx++;
  }
  tlLabel.textContent = '⏪ ' + new Date(replay.simT*1000).toLocaleTimeString('ko-KR',{hour12:false});
  tlSlider.value = Math.min(1000, Math.round((replay.simT - replay.t0)/(replay.t1 - replay.t0)*1000));
  if (replay.simT >= replay.t1) exitReplay();
}

  if (!owner || replay.mode){ hideTalk(); return; }
  const op = owner.pr.grp.position;
  let best = null, bestD = 1e9;
  nodes.forEach(ent=>{
    const p = ent.group.position;
    if (Math.abs(p.y - (op.y - 0.74)) > 0.5) return;        // 같은 층만
    if (ent.data.presence === 'dead') return;
    const d = Math.hypot(p.x - op.x, p.z - op.z);
    if (d < bestD){ bestD = d; best = ent; }
  });
  const limit = (best && talkKey === best.data.key) ? TALK_EXIT_D : TALK_ENTER_D;
  if (best && bestD < limit){
    if (talkKey !== best.data.key) showTalk(best);
  } else hideTalk();
}
async function talkSend(){
  const text = talkInput.value.trim();
  if (!text || !talkKey) return;
  if (HUD_TOKEN.startsWith('__')){ talkStatus.textContent = '조작 비활성 — 브리지 경유 접속 필요'; return; }
  talkInput.value = '';
  sayAt(owner.pr.grp.position, text, 4.5);                  // 주인 말풍선
  addChat('o', '👑 주인(근접)', text);
  talkStatus.textContent = '전송 중…';
  const ok = await postCommand(talkKey, text, false);       // 실전달 — cys send + Return
  talkStatus.textContent = ok ? '주입됨 — cys-terminal 반영 대기…' : '게이트 거부 또는 브리지 오류';
}
talkInput.addEventListener('keydown', e=>{
  if (e.key === 'Enter'){ talkSend(); e.stopPropagation(); }
  if (e.key === 'Escape'){ talkInput.blur(); e.stopPropagation(); }
});
document.getElementById('t-send').onclick = talkSend;
document.getElementById('t-peek').onclick = peekSelected;
addEventListener('keydown', e=>{                            // Enter = 말 걸기 (게임식)
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key === 'Enter' && talkKey){ talkInput.focus(); e.preventDefault(); }
});

// ---------- 채팅·버튼 핸들러 (#2 MMORPG) ----------
document.getElementById('chat-input').addEventListener('keydown', e=>{
  if (e.key !== 'Enter') return;
  const text = e.target.value.trim(); if (!text) return;
  if (!selected){ addChat('sy','시스템','대상이 없습니다 — 직원을 클릭하세요'); return; }
  if (HUD_TOKEN.startsWith('__')){ addChat('sy','시스템','브리지 경유 접속이 아니라 조작 불가'); return; }
  if (ownerDeliver(selected, text)) e.target.value = '';
});
async function peekSelected(){
  if (!selected){ addChat('sy','시스템','대상 없음 — 직원을 클릭'); return; }
  try {
    // 키는 불투명 토큰 — URL 삽입점(GET)은 반드시 encodeURIComponent (fragment/구분자 절단 방어·포맷 재변경 대비).
    // cf. /command(POST)는 JSON body 전송이라 인코딩 불요 — GET(URL) vs POST(body) 인코딩 요구 차이.
    const r = await fetch('/peek?key=' + encodeURIComponent(selected), { headers: { 'X-HUD-Token': HUD_TOKEN } });
    const j = await r.json();
    if (j.ok && j.lines.length){
      const tail = j.lines.slice(-3).join('  ⏎ ');
      const ent = nodes.get(selected);
      if (ent) sayAt(ent.group.position, tail, 6.5);
      addChat('st', labelOf(selected), tail);
    } else addChat('sy','시스템','응답 조회 실패');
  } catch(e){ addChat('sy','시스템','응답 조회 오류: ' + e.message); }
}
document.getElementById('chat-peek').onclick = peekSelected;
document.getElementById('chat-meet').onclick = convene;
document.getElementById('b-dismiss').onclick = dismissMeeting;
document.getElementById('b-shuffle').onclick = ()=>{
  if (replay.mode){ addChat('sy','시스템','타임머신 재생 중에는 배치를 섞을 수 없습니다'); return; }
  if (!lastWorld) return;
  shuffleSeed = Math.floor(Math.random()*0x7fffffff) >>> 0;   // 세션 랜덤 seed 재추첨
  buildWorld(lastWorld);
  addChat('sy','시스템','부서 자리배치를 새로 섞었습니다 (세션 랜덤 · 재접속 시 유지)');
};
document.getElementById('b-director').onclick = (e)=>{
  directorOn = !directorOn; e.target.classList.toggle('on', directorOn); };
document.getElementById('b-voice').onclick = (e)=>{
  voiceOn = !voiceOn; e.target.classList.toggle('on', voiceOn);
  e.target.textContent = voiceOn ? '🔊 방송' : '🔇 방송';
  if (voiceOn) announce('안내방송을 시작합니다'); };

// ---------- SSE ----------
const connDot = document.getElementById('conn'), connT = document.getElementById('conn-t');
async function fetchWorld(){
  try { const w = await (await fetch('/world')).json(); buildWorld(w); } catch(e){}
}
function connect(){
  const es = new EventSource('/stream');
  es.onopen = ()=>{ connDot.className='on'; connT.textContent='실시간 연결됨'; };
  es.onerror = ()=>{ connDot.className='off'; connT.textContent='재접속 중…'; };
  es.onmessage = (m)=>{
    let f; try { f = JSON.parse(m.data); } catch(e){ return; }
    switch(f.t){
      case 'world': buildWorld(f.world); break;
      case 'patch': patchNode(f.key, f.node); break;
      case 'patch_top': handlePatchTop(f); break;   // #8 #9 #10 #12 상단 필드 갱신
      case 'fx': if (!replay.mode){ handleFx(f); worldMeta.seq++; refreshStats(); } break;
      case 'dog': if (!replay.mode) fxDog(f); break;   // D4 강아지 fx (kind='alert'가 handleFx rate-limit와 충돌 → t로 분리)
      case 'resync': fetchWorld(); break;
    }
  };
}
connect();
addChat('sy','시스템','메타버스 오피스 가동 — 직원 클릭 → Enter: 👑 주인 강림 전달 · [응답]: 실제 pane 회수 · [🏛 회의]: 부서 소집');

// ---------- 루프 ----------
let last = performance.now();
function frame(now){
  const dt = Math.min((now-last)/1000, 0.05); last = now;
  const t = now/1000;
  nodes.forEach(ent=>{
    applyPose(ent, t, dt);
    const n = ent.data;
    // 디테일 per-frame(할당 없음): ctx 점멸·코드 스크롤·진행 펄스·실패카드 복원
    if (ent.gaugeCrit) ent.set.gaugeFill.material.opacity = 0.35 + 0.4*Math.abs(Math.sin(t*4));
    if (ent.codeSpeed) ent.set.codeTex.offset.y = (ent.set.codeTex.offset.y + dt*(0.05+ent.codeSpeed*0.5)) % 1;
    if (ent.progPulse > 0){ ent.progPulse = Math.max(0, ent.progPulse - dt*2);
      ent.set.progRing.scale.setScalar(1 + ent.progPulse*0.3); }
    if (ent.failCardUntil && now > ent.failCardUntil){ ent.failCardUntil = 0;
      ent.set.activeCard.material.color.setHex(0x9fd8ff);
      ent.set.activeCard.material.emissive.setHex(0x2a6a90); updateRun(ent); }
    if (n.presence==='sleeping' && Math.random() < dt*0.4)
      pops.push({ s:(()=>{ const s=textSprite('z',{size:16,color:'#96bede'});
        s.position.copy(ent.group.position).add(new THREE.Vector3(0.3,1.7,0.4));
        worldGroup.add(s); return s; })(), life:2.0, rise:0.6 });
    if (n.presence==='active' && Math.random() < dt*(1.5+5*(n.activity||0)))
      burst(ent, ROLE_COLOR[n.role] ?? 0x9fd8ff);
  });
  for (let i=sparks.length-1;i>=0;i--){ const s=sparks[i]; s.life-=dt;
    if (s.life<=0){ worldGroup.remove(s.m); s.m.material.dispose(); sparks.splice(i,1); continue; }
    s.m.position.addScaledVector(s.m.userData.v, dt);
    s.m.userData.v.y -= dt*2.2; s.m.material.opacity = s.life/0.6; }
  for (let i=pops.length-1;i>=0;i--){ const p=pops[i]; p.life-=dt;
    if (p.life<=0){ worldGroup.remove(p.s); p.s.material.map.dispose(); p.s.material.dispose();
      pops.splice(i,1); continue; }
    p.s.position.y += dt*(p.rise||0.35); p.s.material.opacity = Math.min(p.life/1.2, 1); }
  for (let i=ripples.length-1;i>=0;i--){ const r=ripples[i]; r.life-=dt;
    if (r.life<=0){ worldGroup.remove(r.r); r.r.material.dispose(); ripples.splice(i,1); continue; }
    r.r.scale.setScalar(r.r.scale.x + dt*10); r.r.material.opacity = r.life; }
  for (let i=flights.length-1;i>=0;i--){ const fl=flights[i]; fl.t += dt/fl.dur;
    if (fl.t>=1){ const e=nodes.get(fl.toKey);
      if (e) fxRipple(e.group.position);
      worldGroup.remove(fl.doc); worldGroup.remove(fl.trail);
      fl.doc.material.dispose(); fl.trail.material.dispose(); flights.splice(i,1); continue; }
    const mt=1-fl.t;
    fl.doc.position.set(
      mt*mt*fl.A.x + 2*mt*fl.t*fl.C.x + fl.t*fl.t*fl.B.x,
      mt*mt*fl.A.y + 2*mt*fl.t*fl.C.y + fl.t*fl.t*fl.B.y,
      mt*mt*fl.A.z + 2*mt*fl.t*fl.C.z + fl.t*fl.t*fl.B.z);
    fl.doc.rotation.y += dt*6;
    const pts = fl.trail.geometry.attributes.position;
    for (let k=pts.count-1;k>0;k--) pts.copyAt(k, pts, k-1);
    pts.setXYZ(0, fl.doc.position.x, fl.doc.position.y, fl.doc.position.z);
    pts.needsUpdate = true; }
  advanceOwner(dt, t);
  ownerManualTick(dt);
  dogTick(dt);
  proxT += dt;
  if (proxT > 0.2){ proxT = 0; proximityTick(); }
  if (talkKey) positionTalk();
  for (let i=bubbles.length-1;i>=0;i--){ const b=bubbles[i]; b.life-=dt;
    if (b.life<=0){ worldGroup.remove(b.s); b.s.material.map.dispose();
      b.s.material.dispose(); bubbles.splice(i,1); continue; }
    b.s.material.opacity = Math.min(b.life/1.0, 1); }
  nodes.forEach(ent=>{ const w = ent.walkAnim; if (!w) return;
    const pg = ent.set.person.grp;
    w.t += dt/w.dur;
    if (w.t >= 1){ pg.position.set(w.tx, w.ty, w.tz); ent.walkAnim = null;
      if (w.done === 'seat'){ ent.set.person.setStanding(false); ent.override = null;
        pg.rotation.y = Math.PI; pg.position.set(0, 0.48, 0.52); }
      else ent.override = 'stand';
      ent.set.person.swing(0);
      if (w.then){ const fn = w.then; w.then = null; fn(); }   // #11 배달 도착 후속(복귀)
      return; }
    pg.position.set(w.fx+(w.tx-w.fx)*w.t, w.fy+(w.ty-w.fy)*w.t, w.fz+(w.tz-w.fz)*w.t);
    pg.rotation.y = Math.atan2(w.tx-w.fx, w.tz-w.fz);
    ent.set.person.swing(t*9); });
  const nowMs = performance.now();
  ghosts.forEach((g,k)=>{ if (nowMs - g.ts > 600000) despawnGhost(k); });
  if (reviewGather && nowMs > reviewGather.until){        // #10 리뷰 집결 자동 복귀
    reviewGather.members.forEach(e=>{ if (nodes.has(e.data.key) && e.override && !e.walkAnim)
      entWalkTo(e, e.group.position.x, e.group.position.z + 0.52, 'seat'); });
    reviewGather = null;
  }
  if (nowMs - lastLinkT > 1000){ lastLinkT = nowMs; updateLinks(nowMs); drawChairDash(); drawCafeMenu(); }   // 대시보드·메뉴판 ≥2s 스로틀 내장
  weatherTick(dt);
  dayNightTick(dt);
  if (replay.mode) replayTick(dt);
  if (meeting && nowMs > meeting.until) dismissMeeting();
  updateCamera(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
setInterval(()=>{ document.getElementById('clock').textContent =
  new Date().toLocaleTimeString('ko-KR'); }, 1000);
</script>
