<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>CYSJAVIS · Metaverse Office</title>
<style>
  html,body{margin:0;height:100%;background:#05080f;overflow:hidden;
    font-family:'SF Mono',Menlo,monospace;color:#cfeeff}
  #scene{position:fixed;inset:0}
  .hud{position:fixed;z-index:10;pointer-events:none;text-shadow:0 0 8px rgba(0,20,50,.9)}
  #hud-tl{top:14px;left:16px}
  #hud-tl h1{margin:0;font-size:30px;letter-spacing:1px}
  #hud-tl .sub{font-size:21px;color:#8cc3eb;margin-top:5px}
  #hud-tl .stats{font-size:26px;color:#6ee1be;margin-top:7px}
  #conn{display:inline-block;width:16px;height:16px;border-radius:50%;background:#666;margin-right:5px}
  #conn.on{background:#35e0c0;box-shadow:0 0 6px #35e0c0}
  #conn.off{background:#ff5a5a;box-shadow:0 0 6px #ff5a5a}
  #ticker{top:110px;right:16px;width:700px;text-align:right;font-size:23px;line-height:1.5}
  #ticker .h{color:#78c8ff;font-weight:600;font-size:24px;margin-bottom:6px}
  #ticker .row{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#8ccdf0}
  #ticker .row.warn{color:#ffcd78}
  #ticker .row.alert{color:#ff7878}
  #legend{bottom:16px;left:16px;font-size:24px;color:#aacdeb}
  #legend i{display:inline-block;width:18px;height:18px;margin-right:10px;border-radius:3px}
  #legend div{margin-top:6px}
  #clock{bottom:16px;right:16px;font-size:30px;color:#a0d2f5}
  #paused{top:40%;left:50%;transform:translate(-50%,-50%);font-size:34px;color:#ff5a5a;
    letter-spacing:8px;display:none;text-shadow:0 0 24px rgba(255,60,60,.8)}
  /* 지시 패널 (클릭→조작) */
  #panel{position:fixed;right:16px;bottom:70px;width:460px;z-index:20;display:none;
    background:rgba(7,16,30,.94);border:1px solid rgba(90,190,255,.55);border-radius:8px;
    padding:14px;box-shadow:0 0 24px rgba(20,120,220,.25)}
  #panel h2{margin:0 0 6px;font-size:20px;color:#cfeeff}
  #panel .meta{font-size:16px;color:#8cc3eb;line-height:1.6;margin-bottom:8px}
  #panel textarea{width:100%;box-sizing:border-box;height:64px;background:#050c18;
    color:#d8ecfa;border:1px solid rgba(90,190,255,.4);border-radius:5px;padding:7px;
    font:16px 'SF Mono',Menlo,monospace;resize:vertical}
  #panel .row2{display:flex;gap:8px;margin-top:8px;align-items:center}
  #panel button{background:#0d2c4a;color:#bfeaff;border:1px solid rgba(90,190,255,.6);
    border-radius:5px;padding:6px 13px;font:600 16px 'SF Mono',Menlo,monospace;cursor:pointer}
  #panel button:hover{background:#144066}
  #panel button:disabled{opacity:.4;cursor:default}
  #panel #p-close{background:transparent;border:none;position:absolute;top:8px;right:8px;
    color:#6d93b5;font-size:14px;padding:2px 6px}
  #panel .status{font-size:15px;margin-top:7px;min-height:14px;color:#8ccdf0}
  #panel .status.ok{color:#35e0c0} #panel .status.err{color:#ff8080}
  /* 근접 대화 팝업 (#talk — 주인이 아바타에 다가가면 자동) */
  #talk{position:fixed;z-index:18;width:360px;display:none;
    background:rgba(10,18,32,.94);border:1.5px solid rgba(255,209,102,.75);border-radius:9px;
    padding:10px;box-shadow:0 0 22px rgba(255,190,80,.22)}
  #talk .t-title{font-size:15px;color:#ffd166;font-weight:600;margin-bottom:6px}
  #talk .t-row{display:flex;gap:6px}
  #talk input{flex:1;background:#050c18;color:#d8ecfa;border:1px solid rgba(255,209,102,.4);
    border-radius:5px;padding:6px;font:14px 'SF Mono',Menlo,monospace}
  #talk button{background:#3a2c10;color:#ffd166;border:1px solid rgba(255,209,102,.6);
    border-radius:5px;padding:6px 10px;font:600 13px 'SF Mono',Menlo,monospace;cursor:pointer}
  #talk .t-status{font-size:12px;color:#8cc3eb;margin-top:6px;min-height:14px}
  /* MMORPG 채팅창 · 버튼바 · 타임머신 */
  #chat{position:fixed;left:16px;bottom:252px;width:600px;z-index:15;
    background:rgba(6,14,26,.9);border:1px solid rgba(90,190,255,.45);border-radius:8px;padding:10px}
  #chat-log{height:150px;overflow-y:auto;font-size:15px;line-height:1.55}
  #chat-log .o{color:#ffd166} #chat-log .st{color:#7fd2c0} #chat-log .sy{color:#7fa8c8}
  #chat-input-row{display:flex;gap:6px;margin-top:8px;align-items:center}
  #chat-target{font-size:13px;color:#8cc3eb;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis}
  #chat-input{flex:1;background:#050c18;color:#d8ecfa;border:1px solid rgba(90,190,255,.4);
    border-radius:5px;padding:7px;font:15px 'SF Mono',Menlo,monospace}
  #chat button, #btnbar button{background:#0d2c4a;color:#bfeaff;border:1px solid rgba(90,190,255,.6);
    border-radius:5px;padding:6px 10px;font:600 13px 'SF Mono',Menlo,monospace;cursor:pointer}
  #btnbar{position:fixed;right:16px;bottom:64px;z-index:15;display:flex;gap:8px}
  #btnbar button.on{background:#14563e;border-color:#35e0c0}
  #timeline{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;width:42%;z-index:15;
    display:flex;gap:10px;align-items:center;background:rgba(6,14,26,.82);
    border:1px solid rgba(90,190,255,.35);border-radius:8px;padding:6px 12px}
  #tl-slider{flex:1}
  #tl-label{font-size:14px;color:#8ce7ff;min-width:90px;text-align:right}
  #panel .note{font-size:13px;color:#5f81a0;margin-top:6px;line-height:1.5}
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div class="hud" id="hud-tl">
  <h1>CYSJAVIS · METAVERSE OFFICE</h1>
  <div class="sub"><span id="conn"></span><span id="conn-t">연결 중…</span> · 127.0.0.1 · 노드 클릭=지시 패널</div>
  <div class="stats" id="stats">—</div>
  <div class="sub">🎮 주인 조종: 방향키/WASD 보행 · 바닥 클릭 이동 · 엘리베이터 안 ⬆⬇=층 이동(진입 시 줌인)</div>
</div>
<div class="hud" id="ticker"><div class="h">LIVE EVENTS ─ cys events</div><div id="tick-rows"></div></div>
<div class="hud" id="legend"></div>
<div class="hud" id="clock"></div>
<div class="hud" id="paused">PAUSED</div>
<div id="talk">
  <div class="t-title" id="t-title">—</div>
  <div class="t-row">
    <input id="t-input" placeholder="명령 입력… (Enter=실전달)">
    <button id="t-send">전달</button>
    <button id="t-peek" title="이 직원 pane 최근 출력 회수">응답</button>
  </div>
  <div class="t-status" id="t-status"></div>
</div>
<div id="chat">
  <div id="chat-log"></div>
  <div id="chat-input-row">
    <span id="chat-target">대상: (노드 클릭)</span>
    <input id="chat-input" placeholder="선택 직원에게 지시… Enter = 주인 강림 전달">
    <button id="chat-peek" title="해당 pane 최근 출력을 1회 조회해 답변으로 표시">응답</button>
    <button id="chat-meet" title="선택 노드의 부서 전원 회의 소집 (실제 send)">🏛 회의</button>
  </div>
</div>
<div id="btnbar">
  <button id="b-director" title="중요 이벤트 자동 줌인 — 기본 꺼짐(주인 이동 줌인과 혼동 방지)">🎥 디렉터</button>
  <button id="b-voice" title="실패·승인·경보 한국어 안내방송">🔇 방송</button>
  <button id="b-theme" title="메타버스 테마 전환 (저장됨)">🎨 테마</button>
  <button id="b-wide" hidden>🔭 전체 보기</button>
  <button id="b-dismiss" hidden>회의 해산</button>
</div>
<div id="timeline">
  <span style="font-size:14px;color:#8cc3eb">⏪ 타임머신</span>
  <input id="tl-slider" type="range" min="0" max="1000" value="1000">
  <span id="tl-label">LIVE</span>
</div>
<div id="panel">
  <button id="p-close">✕</button>
  <h2 id="p-title">—</h2>
  <div class="meta" id="p-meta">—</div>
  <textarea id="p-text" placeholder="이 직원에게 보낼 지시를 입력… (1줄 · 전송 시 Return까지 주입)"></textarea>
  <div class="row2">
    <button id="p-send">지시 전송 → cys-terminal</button>
    <span id="p-status" class="status"></span>
  </div>
  <div class="note">전송 = cys send + Return (해당 pane에 즉시 타이핑됨). 배달은
    surface.input_injected 이벤트로 이 화면에 되돌아와 확인된다(동시성 루프).</div>
</div>

<script type="module">
import * as THREE from '/vendor/three.module.js';
const HUD_TOKEN = "__HUD_TOKEN__";   // 브리지가 서빙 시 주입 (파일 직접 열면 조작 비활성)

/* ============================================================
   CYSJAVIS 메타버스 오피스 — 리얼리티 렌더러 v2 (Wave 2)
   실물감: 조명·그림자·목재 책상·모니터·의자·관절 있는 사람(포즈 6종)
   조작:   노드 클릭 → 지시 패널 → POST /command → cys send+Return
   ============================================================ */

// ---------- 상수 ----------
const ROLE_COLOR = { master:0xd9a441, worker:0x3fb8dd, cso:0x9b7bd8,
  'reviewer-gemini':0x5f8fd9, 'reviewer-codex':0x63c47f, 'reviewer-agy':0x7fd2c0,
  '무소속':0x8a93a6, owner:0xf2c14e };
const HAIR = [0x2b2119, 0x1a1a1e, 0x4a3320, 0x555a60];
const SKIN = 0xe4b48c;
const FLOOR_H = 3.8, SLAB_W = 13.0, SLAB_D = 8.6;
const TOOL_ICON = { Bash:'⌘', Read:'📖', Edit:'✎', Write:'✎', Grep:'🔍', Glob:'🔍',
  WebSearch:'🌐', WebFetch:'🌐', Task:'⚙', Agent:'⚙', TodoWrite:'☑' };
const PRESENCE_KO = { active:'활동중', waiting:'대기', drowsy:'꾸벅', sleeping:'수면',
  quiescing:'컨텍스트 정리중', dead:'소등', unknown:'미상' };

// ---------- 렌더러·씬·조명 ----------
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05080f);
scene.fog = new THREE.Fog(0x05080f, 30, 70);
const camera = new THREE.PerspectiveCamera(48, 1, 0.1, 220);

const hemi = new THREE.HemisphereLight(0xaec6e0, 0x1c2634, 1.25);
scene.add(hemi);
let hemiBase = 1.25;
const sun = new THREE.DirectionalLight(0xfff1dc, 1.35);
sun.position.set(14, 26, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, { left:-18, right:18, top:22, bottom:-8, far:70 });
scene.add(sun);
const grid = new THREE.GridHelper(90, 45, 0x14324a, 0x0a1a2a);
grid.position.y = -3.6; scene.add(grid);

// ---------- 오빗 카메라 ----------
const orbit = { theta: Math.PI*0.24, phi: Math.PI*0.36, r: 30, ty: 6.4, lastInput: 0 };
let dragging=false, dragMoved=false, px=0, py=0;
canvas.addEventListener('pointerdown', e=>{dragging=true;dragMoved=false;px=e.clientX;py=e.clientY;});
addEventListener('pointerup', ()=>dragging=false);
addEventListener('pointermove', e=>{
  if(!dragging) return;
  if (Math.abs(e.clientX-px)+Math.abs(e.clientY-py) > 3) dragMoved = true;
  orbit.theta -= (e.clientX-px)*0.005; orbit.phi -= (e.clientY-py)*0.004;
  orbit.phi = Math.max(0.12, Math.min(1.4, orbit.phi));
  px=e.clientX; py=e.clientY; orbit.lastInput=performance.now();
});
let userR = 30, baseTy = 6.4;
const camGoal = { active:false, r:30, tx:0, ty:6.4, tz:0, until:0, kind:null };
canvas.addEventListener('wheel', e=>{
  userR = Math.max(9, Math.min(55, userR + e.deltaY*0.016));
  orbit.lastInput = performance.now();
}, {passive:true});
orbit.tx = 0; orbit.tz = 0;
function updateCamera(dt){
  if (performance.now()-orbit.lastInput > 9000 && !camGoal.active) orbit.theta += 0.0005;
  if (camGoal.active && camGoal.until && performance.now() > camGoal.until) releaseCam();
  const gr = camGoal.active ? camGoal.r : userR;
  const gtx = camGoal.active ? camGoal.tx : 0;
  const gty = camGoal.active ? camGoal.ty : baseTy;
  const gtz = camGoal.active ? camGoal.tz : 0;
  const L = Math.min(dt*2.6, 1);
  orbit.r += (gr-orbit.r)*L; orbit.tx += (gtx-orbit.tx)*L;
  orbit.ty += (gty-orbit.ty)*L; orbit.tz += (gtz-orbit.tz)*L;
  camera.position.set(
    orbit.tx + Math.sin(orbit.theta)*Math.sin(orbit.phi)*orbit.r,
    Math.cos(orbit.phi)*orbit.r + orbit.ty,
    orbit.tz + Math.cos(orbit.theta)*Math.sin(orbit.phi)*orbit.r);
  camera.lookAt(orbit.tx, orbit.ty, orbit.tz);
}
function setCam(kind, tx, ty, tz, r, holdMs){
  // 우선순위: focus(주인·층) > director. 낮은 우선순위는 높은 것을 못 뺏는다.
  if (camGoal.active && camGoal.kind === 'focus' && kind === 'director') return;
  Object.assign(camGoal, { active:true, kind, tx, ty, tz, r,
    until: holdMs ? performance.now()+holdMs : 0 });
  document.getElementById('b-wide').hidden = kind !== 'focus';
}
function releaseCam(){
  camGoal.active = false; camGoal.kind = null; camGoal.until = 0;
  document.getElementById('b-wide').hidden = true;
}
document.getElementById('b-wide').onclick = releaseCam;
addEventListener('keydown', e=>{ if (e.key === 'Escape') releaseCam(); });
function resize(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

// ---------- 공유 지오메트리·재질 ----------
const G = {
  deskTop: new THREE.BoxGeometry(1.5, 0.06, 0.78),
  deskSide: new THREE.BoxGeometry(0.05, 0.62, 0.7),
  deskBack: new THREE.BoxGeometry(1.5, 0.42, 0.04),
  monStand: new THREE.CylinderGeometry(0.035, 0.06, 0.14, 8),
  monScreen: new THREE.BoxGeometry(0.62, 0.38, 0.03),
  keyboard: new THREE.BoxGeometry(0.44, 0.02, 0.15),
  mouse: new THREE.BoxGeometry(0.07, 0.025, 0.11),
  seat: new THREE.BoxGeometry(0.46, 0.06, 0.44),
  seatBack: new THREE.BoxGeometry(0.44, 0.5, 0.06),
  chairPost: new THREE.CylinderGeometry(0.03, 0.03, 0.3, 8),
  chairFoot: new THREE.BoxGeometry(0.5, 0.03, 0.06),
  hips: new THREE.BoxGeometry(0.3, 0.16, 0.22),
  torso: new THREE.BoxGeometry(0.34, 0.42, 0.2),
  upperArm: new THREE.BoxGeometry(0.09, 0.26, 0.1),
  foreArm: new THREE.BoxGeometry(0.08, 0.24, 0.09),
  thigh: new THREE.BoxGeometry(0.13, 0.13, 0.34),
  shin: new THREE.BoxGeometry(0.11, 0.3, 0.11),
  head: new THREE.SphereGeometry(0.13, 14, 12),
  hairCap: new THREE.SphereGeometry(0.135, 14, 10, 0, Math.PI*2, 0, Math.PI*0.55),
  mug: new THREE.CylinderGeometry(0.035, 0.03, 0.08, 10),
  pot: new THREE.CylinderGeometry(0.09, 0.07, 0.14, 10),
  leaves: new THREE.SphereGeometry(0.14, 8, 6),
  pillar: new THREE.BoxGeometry(0.35, FLOOR_H, 0.35),
  rack: new THREE.BoxGeometry(0.8, 1.5, 0.7),
};
const M = {
  wood: new THREE.MeshStandardMaterial({ color:0x7a5c40, roughness:0.75 }),
  woodDark: new THREE.MeshStandardMaterial({ color:0x4d3a29, roughness:0.8 }),
  metal: new THREE.MeshStandardMaterial({ color:0x3a4552, roughness:0.4, metalness:0.6 }),
  dark: new THREE.MeshStandardMaterial({ color:0x1c2430, roughness:0.7 }),
  skin: new THREE.MeshStandardMaterial({ color:SKIN, roughness:0.85 }),
  pants: new THREE.MeshStandardMaterial({ color:0x2c3442, roughness:0.9 }),
  chair: new THREE.MeshStandardMaterial({ color:0x223041, roughness:0.85 }),
  glass: new THREE.MeshStandardMaterial({ color:0x9fd4ff, transparent:true, opacity:0.13, roughness:0.15 }),
  concrete: new THREE.MeshStandardMaterial({ color:0x33404f, roughness:0.95 }),
  concreteT: new THREE.MeshStandardMaterial({ color:0x3a4a5c, roughness:0.9,
    transparent:true, opacity:0.34, depthWrite:false }),   // 반투명 구조체 — 직원 가림 방지
  coreT: new THREE.MeshStandardMaterial({ color:0x243040, roughness:0.8,
    transparent:true, opacity:0.28, depthWrite:false }),
  white: new THREE.MeshStandardMaterial({ color:0xcfd8df, roughness:0.6 }),
  mug: new THREE.MeshStandardMaterial({ color:0xd8dee6, roughness:0.5 }),
  potM: new THREE.MeshStandardMaterial({ color:0x8a5a3a, roughness:0.9 }),
  leafM: new THREE.MeshStandardMaterial({ color:0x2e7d4f, roughness:0.9 }),
  rackM: new THREE.MeshStandardMaterial({ color:0x141c26, roughness:0.6 }),
  frost: new THREE.MeshStandardMaterial({ color:0xbcd4e6, roughness:0.3,
    transparent:true, opacity:0.30, depthWrite:false }),      // 데스크 파티션 (반투명 프로스트)
  meetGlass: new THREE.MeshStandardMaterial({ color:0x9fd4ff, roughness:0.15,
    transparent:true, opacity:0.16, depthWrite:false }),      // 회의실 유리벽
};
const ACCENTS = [0xe8804a, 0x2fbfa3, 0xc9b458, 0xb07fe0];     // 빅테크 액센트 (오렌지·티얼·옐로·퍼플)
const roleMats = {}, hairMats = HAIR.map(c=>new THREE.MeshStandardMaterial({color:c, roughness:0.9}));
function roleMat(role){
  if (!roleMats[role]) roleMats[role] =
    new THREE.MeshStandardMaterial({ color: ROLE_COLOR[role] ?? 0x8a93a6, roughness:0.8 });
  return roleMats[role];
}
function mesh(g, m, x=0, y=0, z=0, shadow=true){
  const o = new THREE.Mesh(g, m);
  o.position.set(x, y, z);
  if (shadow){ o.castShadow = true; o.receiveShadow = true; }
  return o;
}

// ---------- 텍스트 스프라이트 ----------
function textSprite(txt, {size=22, color='#cfeeff', bg=null, pad=8, scale=0.013}={}){
  const c = document.createElement('canvas'), g = c.getContext('2d');
  g.font = `600 ${size}px 'SF Mono', Menlo, monospace`;
  const w = Math.ceil(g.measureText(txt).width)+pad*2, h = size+pad*2;
  c.width=w; c.height=h;
  g.font = `600 ${size}px 'SF Mono', Menlo, monospace`;
  if (bg){ g.fillStyle=bg; const r=6;
    g.beginPath(); g.moveTo(r,0); g.lineTo(w-r,0); g.arcTo(w,0,w,r,r); g.lineTo(w,h-r);
    g.arcTo(w,h,w-r,h,r); g.lineTo(r,h); g.arcTo(0,h,0,h-r,r); g.lineTo(0,r); g.arcTo(0,0,r,0,r);
    g.fill(); g.strokeStyle='rgba(120,220,255,.8)'; g.stroke(); }
  g.fillStyle=color; g.textBaseline='middle'; g.textAlign='center';
  g.fillText(txt, w/2, h/2+1);
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false }));
  sp.scale.set(w*scale, h*scale, 1);
  return sp;
}
function batterySprite(pct){
  const c=document.createElement('canvas'); c.width=120; c.height=30;
  const g=c.getContext('2d');
  const col = pct==null?'#556': pct>=90?'#ff5050': pct>=60?'#ffcc55':'#35e0c0';
  g.strokeStyle='rgba(190,225,250,.9)'; g.lineWidth=2; g.strokeRect(6,8,70,14);
  g.fillStyle='rgba(190,225,250,.9)'; g.fillRect(78,11,4,8);
  if (pct!=null){ g.fillStyle=col; g.fillRect(8,10,66*Math.min(pct,100)/100,10); }
  g.font='600 15px Menlo,monospace'; g.fillStyle=col; g.textBaseline='middle';
  g.fillText(pct==null?'—':pct+'%', 88, 16);
  const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace;

function makePerson(role, seed){

  const P = new THREE.Group();                       // 원점 = 의자 좌면 위 골반
  P.add(mesh(G.hips, M.pants, 0, 0.08, 0));
  const torsoG = new THREE.Group(); torsoG.position.set(0, 0.16, 0);   // 허리 피벗
  torsoG.add(mesh(G.torso, shirt, 0, 0.21, 0));
  const headG = new THREE.Group(); headG.position.set(0, 0.46, 0);     // 목 피벗
  const headM = mesh(G.head, M.skin, 0, 0.1, 0);
  const hairM = mesh(G.hairCap, hair, 0, 0.115, -0.012);
  headG.add(headM); headG.add(hairM);
  torsoG.add(headG);
  function arm(side){                                 // side: -1 좌 / +1 우
    const sh = new THREE.Group(); sh.position.set(side*0.21, 0.36, 0); // 어깨 피벗
    sh.add(mesh(G.upperArm, shirt, 0, -0.12, 0));
    const el = new THREE.Group(); el.position.set(0, -0.25, 0);        // 팔꿈치 피벗
    el.add(mesh(G.foreArm, M.skin, 0, -0.1, 0));
    sh.add(el); torsoG.add(sh);
    return { sh, el };
  }
  const lA = arm(-1), rA = arm(1);
  // 다리 — 앉은 ㄴ자(기본) / 선 자세(보행·회의 — #2 #3)
  const legsSeat = new THREE.Group();
  legsSeat.add(mesh(G.thigh, M.pants, -0.09, 0.06, -0.18));
  legsSeat.add(mesh(G.thigh, M.pants,  0.09, 0.06, -0.18));

    hip.add(mesh(new THREE.BoxGeometry(0.10,0.30,0.10), M.pants, 0, -0.48, 0, false));
    legsStand.add(hip); return hip; };
  const legL = mkLeg(-0.09), legR = mkLeg(0.09);
  P.add(legsStand);
  P.add(torsoG);
  return { grp:P, torsoG, headG, lA, rA,
    setStanding(on){ legsSeat.visible = !on; legsStand.visible = on; },
    swing(ph){ legL.rotation.x = Math.sin(ph)*0.55; legR.rotation.x = -Math.sin(ph)*0.55; } };

// ---------- 포즈 적용 ----------
function applyPose(ent, t, dt){
  const { person:pr, screen } = ent.set;
  const n = ent.data, a = ent.anim;
  const act = n.activity || 0;
  const pres = n.presence;
  if (ent.override){                    // 보행·회의(서기) — 상태 포즈를 대체 (#3)
    pr.grp.visible = pres !== 'dead';
    const L2 = Math.min(8*dt, 1);
    pr.torsoG.rotation.x += (0 - pr.torsoG.rotation.x)*L2;
    pr.headG.rotation.x += (0.04 - pr.headG.rotation.x)*L2;
    pr.headG.rotation.y += (0 - pr.headG.rotation.y)*L2;
    pr.lA.sh.rotation.x += (-0.15 - pr.lA.sh.rotation.x)*L2;
    pr.rA.sh.rotation.x += (-0.15 - pr.rA.sh.rotation.x)*L2;
    pr.lA.el.rotation.x += (-0.2 - pr.lA.el.rotation.x)*L2;
    pr.rA.el.rotation.x += (-0.2 - pr.rA.el.rotation.x)*L2;
    ent.set.selRing.material.opacity = (selected === n.key) ? 0.6 : 0;
    return;
  }
  // 기본 리셋 목표값 (부드럽게 lerp)
  let torsoX = -0.06, headX = 0.12, headY = 0;
  let lSh = -0.9, lEl = -0.5, rSh = -0.9, rEl = -0.5;   // 타이핑 기본(팔 앞으로)
  let visible = true, screenGlow = 0.12;
  if (pres === 'active' || pres === 'quiescing'){
    const speed = 8 + act*14;
    lEl += Math.sin(t*speed)*0.16; rEl += Math.sin(t*speed+Math.PI)*0.16;
    headX = 0.16; screenGlow = 0.55 + 0.25*Math.min(act,1) + Math.sin(t*3)*0.05;
  } else if (pres === 'waiting'){
    lSh = -0.25; lEl = -0.35; rSh = -0.25; rEl = -0.35;  // 손 내림
    headY = Math.sin(t*0.5 + ent.seed)*0.3;               // 두리번
    screenGlow = 0.3;
  } else if (pres === 'drowsy'){
    lSh = -0.2; lEl = -0.3; rSh = -0.2; rEl = -0.3;
    headX = 0.3 + Math.max(0, Math.sin(t*1.1 + ent.seed))*0.35;  // 꾸벅
    screenGlow = 0.18;
  } else if (pres === 'sleeping'){
    torsoX = 0.72; headX = 0.5;                          // 책상에 엎드림
    lSh = -1.25; lEl = -0.1; rSh = -1.25; rEl = -0.1;
    screenGlow = 0.05;
  } else if (pres === 'dead'){
    visible = false; screenGlow = 0.0;                   // 빈 자리 — 소등
  } else { screenGlow = 0.1; }
  if (a.handupUntil && t < a.handupUntil){ rSh = 2.6; rEl = 0.15; } // 손들기(승인 대기)
  if (a.rateLimited){ rSh = -0.05; rEl = -1.5; }         // 커피잔 든 팔
  pr.grp.visible = visible;
  const L = 8*dt;                                        // 포즈 블렌딩 속도
  pr.torsoG.rotation.x += (torsoX - pr.torsoG.rotation.x)*L;
  pr.headG.rotation.x += (headX - pr.headG.rotation.x)*L;
  pr.headG.rotation.y += (headY - pr.headG.rotation.y)*L;
  pr.lA.sh.rotation.x += (lSh - pr.lA.sh.rotation.x)*L;
  pr.lA.el.rotation.x += (lEl - pr.lA.el.rotation.x)*L;
  pr.rA.sh.rotation.x += (rSh - pr.rA.sh.rotation.x)*L;
  pr.rA.el.rotation.x += (rEl - pr.rA.el.rotation.x)*L;
  screen.material.emissiveIntensity +=
    (screenGlow - screen.material.emissiveIntensity)*Math.min(6*dt,1);
  if (a.critical){
    ent.set.ring.material.opacity = 0.3 + 0.45*Math.abs(Math.sin(t*4));
  } else ent.set.ring.material.opacity = 0;
  ent.set.selRing.material.opacity = (selected === ent.data.key)
    ? 0.5 + 0.3*Math.abs(Math.sin(t*3)) : 0;
}

function disposeGroup(g){
  g.traverse(o=>{
    if (o.geometry && !Object.values(G).includes(o.geometry)) o.geometry.dispose();
    if (o.material && !Object.values(M).includes(o.material)
        && !hairMats.includes(o.material) && !Object.values(roleMats).includes(o.material)){
      (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>{
        if (m.map) m.map.dispose(); m.dispose(); });

  scene.remove(g);
}
function slotPositions(n){
  const cols = Math.max(3, Math.ceil(Math.sqrt(n*1.6)));
  const rows = Math.ceil(n/cols), out=[];

let billboard = null, billCanvas = null, billTex = null;
function makeBillboard(y){
  billCanvas = document.createElement('canvas'); billCanvas.width=512; billCanvas.height=256;
  billTex = new THREE.CanvasTexture(billCanvas); billTex.colorSpace = THREE.SRGBColorSpace;
  const pane = new THREE.Mesh(new THREE.PlaneGeometry(3.4, 1.7),
    new THREE.MeshBasicMaterial({ map:billTex, transparent:true }));

    SLAB_W/2-2.2, y+1.85, -SLAB_D/2+0.3);
  const g = new THREE.Group(); g.add(frame); g.add(pane);

function drawBillboard(){
  if (!billCanvas) return;
  const g = billCanvas.getContext('2d');
  g.clearRect(0,0,512,256);
  g.fillStyle = 'rgba(6,16,30,0.95)'; g.fillRect(0,0,512,256);
  g.strokeStyle = '#3fa8e0'; g.lineWidth=3; g.strokeRect(4,4,504,248);
  g.fillStyle = '#7fe3ff'; g.font = '600 30px Menlo,monospace';
  g.fillText('CYSJAVIS OPERATIONS', 24, 46);
  let active=0; nodes.forEach(e=>{ if(e.data.presence==='active') active++; });
  g.fillStyle = '#cfeeff'; g.font = '24px Menlo,monospace';
  g.fillText(`부서 ${worldMeta.deps} · 직원 ${worldMeta.total} · 활동 ${active}`, 24, 92);
  const todo = (lastWorld && lastWorld.todo) || {};
  let ty = 136; g.font = '21px Menlo,monospace';
  for (const [role, tv] of Object.entries(todo).slice(0,3)){
    const pct = tv.total ? Math.round(tv.done/tv.total*100) : 0;
    g.fillStyle = '#8cc3eb'; g.fillText(`${role}`, 24, ty);
    g.fillStyle = '#0d2c4a'; g.fillRect(190, ty-16, 220, 18);
    g.fillStyle = pct>=90 ? '#35e0c0' : '#3fa8e0';
    g.fillRect(190, ty-16, 220*Math.min(pct,100)/100, 18);
    g.fillStyle = '#cfeeff'; g.fillText(`${tv.done}/${tv.total}`, 424, ty);
    ty += 30;
  }
  let soon = null;   // 근무 교대(#7) = 5h rate 리셋
  nodes.forEach(e=>(e.data.rate||[]).forEach(r=>{
    if (r.label === '5h' && r.resets_at && (!soon || r.resets_at < soon)) soon = r.resets_at; }));
  if (soon){
    const mins = Math.max(0, Math.round((soon - Date.now()/1000)/60));
    g.fillStyle = '#ffd77a'; g.font = '20px Menlo,monospace';
    g.fillText(`근무 교대(5h 리셋)까지 ${Math.floor(mins/60)}시간 ${mins%60}분`, 24, 240);
  }
  billTex.needsUpdate = true;
}

function addNode(n, deptId, pos, seed){
  const set = makeDeskSet(n, seed);
  set.grp.position.copy(pos);
  const bat = batterySprite(n.ctx?.pct);
  bat.position.set(0, 1.95, 0); set.grp.add(bat);
  const label = textSprite(n.role, { size:20, color:'#d8ecfa' });
  label.position.set(0, 0.14, 0.95); set.grp.add(label);
  let note = null;
  if (n.task){ note = textSprite(n.task.slice(0,26), { size:14, color:'#86aacd' });
    note.position.set(0, -0.06, 0.95); set.grp.add(note); }
  set.grp.traverse(o=>{ o.userData.nodeKey = n.key; });   // 클릭 판정용
  worldGroup.add(set.grp);
  const ent = { set, group:set.grp, data:n, deptId, battery:bat, seed,
    anim:{ handupUntil:0, critical:false, rateLimited:false } };
  nodes.set(n.key, ent);
  applyNodeFlags(ent);
}
function applyNodeFlags(ent){
  const n = ent.data;
  ent.anim.critical = (n.flags||[]).includes('ctx_critical') || n.presence==='quiescing';
  ent.anim.rateLimited = (n.flags||[]).includes('rate_limited');
  ent.set.mug.visible = ent.anim.rateLimited;
}
function patchNode(key, n){
  const ent = nodes.get(key);
  if (!ent){ fetchWorld(); return; }
  const prev = ent.data; ent.data = n;
  if ((prev.ctx?.pct??null) !== (n.ctx?.pct??null)){
    ent.group.remove(ent.battery);
    ent.battery.material.map.dispose(); ent.battery.material.dispose();
    ent.battery = batterySprite(n.ctx?.pct);
    ent.battery.position.set(0, 2.15, 0); ent.group.add(ent.battery);
    if ((n.ctx?.pct??0) >= 90 && (prev.ctx?.pct??0) < 90)
      addTick(`⚠ ${labelOf(key)} 컨텍스트 ${n.ctx.pct}% — /clear 임박`, 2);
  }
  if (prev.presence !== n.presence)
    addTick(`${labelOf(key)} ${PRESENCE_KO[prev.presence]||prev.presence} → ${PRESENCE_KO[n.presence]||n.presence}`, 0);
  applyNodeFlags(ent);
  if (selected === key) fillPanel(ent);
  refreshStats();
}
function labelOf(key){
  const e = nodes.get(key);
  return e ? `${e.deptId}·${e.data.role}` : key;
}

function fxTool(f){
  const ent = nodes.get(f.key); if (!ent) return;
  if (f.tool === 'Task' || f.tool === 'Agent'){           // 유령 알바 (#6)
    if (f.phase === 'pre') spawnGhost(f.key);
    else if (f.phase === 'post') despawnGhost(f.key);
  }
  if (f.phase==='post' && !f.ok){
    pop(ent, `✗ ${f.tool||'도구'} 실패`, '#ff8080');
    addTick(`✗ ${labelOf(f.key)} · ${f.tool} 실패`, 2);
    directorCut(ent.group.position);                       // #1 자동 줌인
    announce(`${ent.data.role}의 ${f.tool||''} 작업이 실패했습니다`);   // #8
    weatherBump(1);                                        // #9
    return;
  }
  if (f.phase==='perm'){
    ent.anim.handupUntil = performance.now()/1000 + 4;   // 손들기
    pop(ent, `✋ 승인 대기 · ${f.tool||''}`, '#ffd166');
    addTick(`✋ ${labelOf(f.key)} 승인 대기 (${f.tool})`, 1);
    directorCut(ent.group.position);
    announce(`승인이 필요합니다. ${ent.data.role}의 ${f.tool||'작업'} 요청`);
    return;
  }
  pop(ent, `${TOOL_ICON[f.tool]||'🔧'} ${f.tool||''}`, '#bfeaff');
  burst(ent, ROLE_COLOR[ent.data.role] ?? 0x9fd8ff);
  if (f.phase==='post') addTick(`${labelOf(f.key)} · ${f.tool} ✓`, 0);
}
function fxDoc(f){
  const to = nodes.get(f.to); if (!to) return;
  linkBump(f.from, f.to);                                  // #5 협업 아크
  const from = f.from ? nodes.get(f.from) : null;
  const A = from ? from.group.position.clone().add(new THREE.Vector3(0,1.6,0))
                 : lobbyAnchor.clone();
  const B = to.group.position.clone().add(new THREE.Vector3(0,1.6,0));
  const C = A.clone().add(B).multiplyScalar(0.5); C.y = Math.max(A.y,B.y)+2.6;
  const doc = new THREE.Mesh(new THREE.BoxGeometry(0.24,0.3,0.02),
    new THREE.MeshBasicMaterial({ color:0xfff2c8 }));
  worldGroup.add(doc);
  const trailG = new THREE.BufferGeometry().setFromPoints(Array(14).fill(A));
  const trail = new THREE.Line(trailG,
    new THREE.LineBasicMaterial({ color:0xffd77a, transparent:true, opacity:0.6 }));
  worldGroup.add(trail);
  flights.push({ doc, trail, A, B, C, t:0, dur:1.25, toKey:f.to });
  addTick(`📄 ${f.from?labelOf(f.from):'외부'} → ${labelOf(f.to)} 배달 ${f.bytes?`(${f.bytes}B)`:''}`, 0);
  if (pendingCmd && f.to === pendingCmd.key){
    setPanelStatus(`✅ cys-terminal 반영 확인 (input_injected ${f.bytes||''}B 수신)`, 'ok');
    if (talkKey === f.to) talkStatus.textContent = `✅ cys-terminal 반영 확인 (${f.bytes||''}B 수신)`;
    pendingCmd = null;
  }
}
function fxRipple(pos, color=0x8ce7ff){
  const r = new THREE.Mesh(new THREE.RingGeometry(0.05, 0.1, 32),
    new THREE.MeshBasicMaterial({ color, transparent:true, opacity:0.9, side:THREE.DoubleSide }));
  r.rotation.x = -Math.PI/2; r.position.copy(pos).setY(pos.y+0.06);

function handleFx(f){
  switch(f.kind){
    case 'tool': fxTool(f); break;
    case 'doc': fxDoc(f); break;
    case 'queue': { const e=nodes.get(f.to); if(e) pop(e,`📥 큐 ${f.depth??''}`,'#9fd8ff'); break; }
    case 'usage': break;
    case 'todo': addTick(`☑ TODO ${f.done}/${f.total} — ${(f.path||'').split('/').pop()}`, 0);
      drawBillboard(); break;
    case 'alert': { const e=f.key&&nodes.get(f.key);
      if(e){ e.anim.rateLimited = true; e.set.mug.visible = true; pop(e,'☕ rate-limit','#ffcd78'); }
      addTick(`⚠ ${f.rule}: ${f.line||''}`, 1);
      weatherBump(1); announce(`경고. ${f.rule||'시스템 경보'}`); break; }
    case 'deadman': { const e=f.key&&nodes.get(f.key);
      if (e) directorCut(e.group.position);
      addTick(`🚨 master 무응답 ${f.idle_secs||'?'}초`, 2);
      weatherBump(2); announce('마스터가 응답이 없습니다'); break; }
    case 'bell': fxRipple(lobbyAnchor, f.error?0xff8080:0x8ce7ff); drawBillboard();
      addTick(`${f.error?'⚠':'🔔'} 스케줄 ${f.job||''}`, f.error?1:0); break;
    case 'spawn': addTick(`＋ 입사: ${f.key}`, 0); break;
    case 'despawn': addTick(`－ 퇴거: ${f.key}`, 1); break;
    case 'rack': { const led=racks.get(f.pid);
      if(led) led.material.color.set(f.on?0x2fe08a:0x30404f);
      addTick(`${f.on?'▶':'■'} scoped 프로세스 ${f.pid}`, 0); break; }
    case 'idle': break;
  }
}

  const size = 26, pad = 16, maxW = 560;
  g.font = `600 ${size}px 'SF Mono', Menlo, monospace`;
  const words = text.split(' '); const lines = ['']; 
  for (const w of words){
    const t = (lines[lines.length-1] + ' ' + w).trim();
    if (g.measureText(t).width > maxW && lines[lines.length-1]) lines.push(w);
    else lines[lines.length-1] = t;
    if (lines.length >= 4){ lines[3] += '…'; break; }
  }
  const w = Math.min(maxW, Math.max(...lines.map(l=>g.measureText(l).width))) + pad*2;
  const h = lines.length*size*1.25 + pad*2 + 14;
  c.width = w; c.height = h;
  g.font = `600 ${size}px 'SF Mono', Menlo, monospace`;
  g.fillStyle = 'rgba(240,246,252,0.96)';
  const r = 12, bw = w, bh = h-14;
  g.beginPath(); g.moveTo(r,0); g.lineTo(bw-r,0); g.arcTo(bw,0,bw,r,r); g.lineTo(bw,bh-r);
  g.arcTo(bw,bh,bw-r,bh,r); g.lineTo(bw/2+12,bh); g.lineTo(bw/2,h); g.lineTo(bw/2-12,bh);
  g.lineTo(r,bh); g.arcTo(0,bh,0,bh-r,r); g.lineTo(0,r); g.arcTo(0,0,r,0,r); g.fill();
  g.fillStyle = '#101820'; g.textBaseline = 'top';
  lines.forEach((l,i)=>g.fillText(l, pad, pad + i*size*1.25));
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false }));
  sp.scale.set(w*0.0062, h*0.0062, 1);
  return sp;
}

  owner = { pr, plan: [], walkPh: 0, busy: false };

const WALK_SPEED = 2.6, RIDE_SPEED = 3.4;
function ownerDeliver(key, text, opts={}){
  const ent = nodes.get(key); if (!owner || !ent) return false;
  if (owner.busy){ addChat('sy','시스템','주인이 이동 중입니다 — 잠시 후 다시.'); return false; }
  const tp = ent.group.position;
  const floorY = tp.y;
  const deskFront = new THREE.Vector3(tp.x, floorY+0.74, tp.z+1.35);
  owner.plan = [
    { t:'walk', to:new THREE.Vector3(ELEV.x, owner.pr.grp.position.y, ELEV.z) },
    { t:'ride', y: floorY+0.74 },
    { t:'focus', y: floorY },                       // 층 진입 = 층 줌인 (#2)
    { t:'walk', to: deskFront },
    { t:'say', text },
    { t:'post', key, text, meeting: opts.meeting || false },
    { t:'wait', s: 2.0 },
    { t:'walk', to:new THREE.Vector3(ELEV.x, floorY+0.74, ELEV.z) },
    { t:'ride', y: ownerHome.y },
    { t:'unfocus' },
    { t:'walk', to: ownerHome.clone() },
  ];
  owner.busy = true;
  addChat('o','👑 주인',(opts.meeting?'[회의 소집] ':'')+text);
  return true;
}
function advanceOwner(dt, t){
  if (!owner || !owner.plan.length){ if (owner) owner.busy = false; return; }
  const g = owner.pr.grp, step = owner.plan[0];
  if (step.t === 'walk'){
    const d = step.to.clone().sub(g.position); d.y = 0;
    const dist = d.length();
    if (dist < 0.08){ g.position.x = step.to.x; g.position.z = step.to.z;
      owner.pr.swing(0); owner.plan.shift(); return; }
    d.normalize(); g.position.addScaledVector(d, Math.min(WALK_SPEED*dt, dist));
    g.rotation.y = Math.atan2(d.x, d.z);
    owner.walkPh += dt*9; owner.pr.swing(owner.walkPh);
  } else if (step.t === 'ride'){
    const dy = step.y - g.position.y;
    const mv = Math.sign(dy) * Math.min(RIDE_SPEED*dt, Math.abs(dy));
    g.position.y += mv; elevCar.position.y = g.position.y + 0.24;
    if (Math.abs(step.y - g.position.y) < 0.03){ g.position.y = step.y; owner.plan.shift(); }
  } else if (step.t === 'focus'){
    setCam('focus', 0, step.y + 1.5, 0, 14, 0); owner.plan.shift();
  } else if (step.t === 'unfocus'){
    setTimeout(releaseCam, 1200); owner.plan.shift();
  } else if (step.t === 'say'){
    sayAt(g.position, step.text); owner.plan.shift();
  } else if (step.t === 'post'){
    postCommand(step.key, step.text, step.meeting).then(ok=>{
      if (!ok) addChat('sy','시스템','전달 실패 — 게이트 거부 또는 브리지 오류');
    });
    owner.plan.shift();
  } else if (step.t === 'wait'){
    step.s -= dt; if (step.s <= 0) owner.plan.shift();
  } else if (step.t === 'arrive'){
    arriveFloor(step.y); owner.plan.shift();
  } else if (step.t === 'manualDone'){
    owner.busy = false; owner.manual = false; owner.pr.swing(0); owner.plan.shift();
  } else owner.plan.shift();
}
// ---------- 주인 직접 조종 (MMORPG · 2026-07-07 박사님 지시) ----------
let FLOORS = [];            // buildWorld가 채움 (로비·부서층·옥상 y 목록)
const FLOOR_NAMES = new Map();
const keys = {};
const KEYMAP = { arrowup:'up', arrowdown:'down', arrowleft:'left', arrowright:'right',
                 w:'up', s:'down', a:'left', d:'right' };
addEventListener('keydown', e=>{
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;   // 채팅 타이핑은 이동 아님
  const k = KEYMAP[e.key.toLowerCase()];
  if (k){ keys[k] = true; e.preventDefault(); }
});
addEventListener('keyup', e=>{
  const k = KEYMAP[e.key.toLowerCase()];
  if (k) keys[k] = false;
});
let elevCooldown = 0;
function curFloorY(){ return owner ? owner.pr.grp.position.y - 0.74 : 0; }
function arriveFloor(fy){
  // 줌인 규율: 주인이 이동해 층에 '들어갈 때만' 줌인. 옥상 복귀 = 전체 뷰.
  const roof = FLOORS.length ? FLOORS[FLOORS.length-1] : null;
  if (roof !== null && Math.abs(fy - roof) < 0.3) releaseCam();
  else setCam('focus', 0, fy + 1.5, 0, 14, 0);
  const nm = FLOOR_NAMES.get(Math.round(fy*10)/10);
  if (nm) sayAt(owner.pr.grp.position, `${nm} 도착`, 2.2);
}
function moveOwnerTo(fy, x, z){
  if (!owner || (owner.busy && !owner.manual)) return;   // 강림(지시 전달) 중엔 보호
  x = Math.max(-SLAB_W/2+0.5, Math.min(SLAB_W/2-0.5, x));
  z = Math.max(-SLAB_D/2+0.5, Math.min(SLAB_D/2-0.5, z));
  const cy = curFloorY();
  owner.manual = true; owner.busy = true;
  if (Math.abs(cy - fy) < 0.3){
    owner.plan = [ { t:'walk', to:new THREE.Vector3(x, fy+0.74, z) }, { t:'manualDone' } ];
  } else {
    owner.plan = [
      { t:'walk', to:new THREE.Vector3(ELEV.x, cy+0.74, ELEV.z) },
      { t:'ride', y: fy+0.74 },
      { t:'arrive', y: fy },
      { t:'walk', to:new THREE.Vector3(x, fy+0.74, z) },
      { t:'manualDone' },
    ];
  }
}
function ownerManualTick(dt){
  if (!owner) return;
  elevCooldown = Math.max(0, elevCooldown - dt);
  if (owner.busy && !owner.manual) return;               // 강림 플랜 보호
  const g = owner.pr.grp;
  const inElev = Math.hypot(g.position.x - ELEV.x, g.position.z - ELEV.z) < 1.15;
  const ax = (keys.right?1:0) - (keys.left?1:0);
  const az = (keys.up?1:0) - (keys.down?1:0);
  if (inElev && az !== 0 && ax === 0){                    // 엘리베이터 존: ⬆⬇ = 층 이동
    if (elevCooldown > 0) return;
    const cy = curFloorY();
    const i = FLOORS.findIndex(f=>Math.abs(f-cy) < 0.3);
    const ni = i + (az > 0 ? 1 : -1);
    if (i >= 0 && ni >= 0 && ni < FLOORS.length){
      elevCooldown = 0.6;
      owner.manual = true; owner.busy = true;
      owner.plan = [ { t:'ride', y: FLOORS[ni]+0.74 }, { t:'arrive', y: FLOORS[ni] },
                     { t:'manualDone' } ];
    }
    return;
  }
  if (ax === 0 && az === 0) return;
  if (owner.manual && owner.plan.length){
    if (owner.plan[0].t === 'ride' || owner.plan[0].t === 'arrive') return; // 승강 중 보행 불가
    owner.plan = [];                                        // 키 입력이 클릭 이동을 대체
  }
  // 카메라 기준 상대 방향 보행
  const fwd = new THREE.Vector3(orbit.tx - camera.position.x, 0, orbit.tz - camera.position.z).normalize();
  const right = new THREE.Vector3(-fwd.z, 0, fwd.x);
  const dir = fwd.multiplyScalar(az).add(right.multiplyScalar(ax));
  if (dir.lengthSq() < 1e-4) return;
  dir.normalize();
  g.position.addScaledVector(dir, WALK_SPEED*dt);
  g.position.x = Math.max(-SLAB_W/2+0.4, Math.min(SLAB_W/2-0.4, g.position.x));
  g.position.z = Math.max(-SLAB_D/2+0.4, Math.min(SLAB_D/2-0.4, g.position.z));
  g.rotation.y = Math.atan2(dir.x, dir.z);
  owner.walkPh += dt*9; owner.pr.swing(owner.walkPh);
  owner.manual = false; owner.busy = false;
}

async function postCommand(key, text, meeting){

    if (j.ok) pendingCmd = { key, at: performance.now() };
    return j.ok;
  } catch(e){ return false; }
}

// ---------- 협업 광섬유 아크 (#5) ----------
const links = new Map(); let lastLinkT = 0;
function linkBump(a, b){
  if (!a || !b || a === b || !nodes.has(a) || !nodes.has(b)) return;
  const k = a < b ? a+'|'+b : b+'|'+a;
  const e = links.get(k) || { n:0, ts:0, line:null };
  e.n = Math.min(e.n+1, 10); e.ts = performance.now(); links.set(k, e);
}
function updateLinks(nowMs){
  links.forEach((e,k)=>{
    const age = (nowMs - e.ts)/1000;
    if (age > 1800){
      if (e.line){ worldGroup.remove(e.line); e.line.geometry.dispose(); e.line.material.dispose(); }
      links.delete(k); return;
    }
    const [ka, kb] = k.split('|');
    const A = nodes.get(ka), B = nodes.get(kb);
    if (!A || !B) return;
    if (!e.line){
      const P0 = A.group.position.clone().add(new THREE.Vector3(0,1.5,0));
      const P2 = B.group.position.clone().add(new THREE.Vector3(0,1.5,0));
      const P1 = P0.clone().add(P2).multiplyScalar(0.5); P1.y = Math.max(P0.y,P2.y)+1.6;
      const pts = [];
      for (let i=0;i<24;i++){ const u=i/23, m=1-u;
        pts.push(new THREE.Vector3(
          m*m*P0.x+2*m*u*P1.x+u*u*P2.x, m*m*P0.y+2*m*u*P1.y+u*u*P2.y,
          m*m*P0.z+2*m*u*P1.z+u*u*P2.z)); }
      e.line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color:0x66d9ff, transparent:true, opacity:0.2 }));
      worldGroup.add(e.line);
    }
    e.line.material.opacity = Math.min(0.5, 0.10 + e.n*0.04) * (1 - age/1800);
  });
}

const weather = { level:0, lastBad:0, rain:null, flash:0 };
function weatherBump(n){ weather.level = Math.min(2, weather.level+n); weather.lastBad = performance.now(); }
function weatherTick(dt){
  const now = performance.now();
  if (weather.level > 0 && now - weather.lastBad > 300000){ weather.level--; weather.lastBad = now; }
  if (!weather.rain){
    const N = 700, arr = new Float32Array(N*3);
    for (let i=0;i<N;i++){ arr[i*3]=(Math.random()-0.5)*52; arr[i*3+1]=Math.random()*30;
      arr[i*3+2]=(Math.random()-0.5)*52; }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(arr, 3));
    weather.rain = new THREE.Points(geo, new THREE.PointsMaterial({
      color:0x9fc8e8, size:0.14, transparent:true, opacity:0.35 }));
    weather.rain.visible = false; scene.add(weather.rain);
  }
  weather.rain.visible = weather.level > 0;
  if (weather.level > 0){
    const pos = weather.rain.geometry.attributes.position;
    for (let i=0;i<pos.count;i++){
      let y = pos.getY(i) - dt*(9 + 9*weather.level);
      if (y < -3) y = 28;
      pos.setY(i, y);
    }
    pos.needsUpdate = true;
    weather.rain.material.opacity = weather.level === 2 ? 0.55 : 0.3;
  }
  if (weather.level === 2 && Math.random() < dt*0.25) weather.flash = 0.12;
  if (weather.flash > 0) weather.flash -= dt;
}

function dayNightTick(dt){
  const th = THEMES[themeIdx];
  let sunI, hemI, sunC, bgC;
  if (th.auto){
    const d = new Date(); const h = d.getHours() + d.getMinutes()/60;
    if (h >= 6 && h < 9){ sunI=1.15; hemI=1.15; sunC=0xffe0b8; bgC=0x0a1220; }
    else if (h >= 9 && h < 17){ sunI=1.5; hemI=1.3; sunC=0xfff1dc; bgC=0x081018; }
    else if (h >= 17 && h < 20){ sunI=0.85; hemI=1.0; sunC=0xffb27a; bgC=0x140f1c; }
    else { sunI=0.4; hemI=0.8; sunC=0x8fb0d8; bgC=0x04070d; }
  } else {
    sunI = th.sunI; hemI = th.hemI; sunC = th.sunC; bgC = th.bgC;
    hemi.color.lerp(new THREE.Color(th.hemSky), Math.min(dt*0.8, 1));
  }
  sunI *= 1 - 0.28*weather.level;
  hemI *= 1 - 0.18*weather.level;
  const L = Math.min(dt*0.8, 1);
  sun.intensity += (sunI - sun.intensity)*L;
  hemiBase += (hemI - hemiBase)*L;
  hemi.intensity = hemiBase + (weather.flash > 0 ? 2.2*weather.flash/0.12 : 0);
  sun.color.lerp(new THREE.Color(sunC), L);
  scene.background.lerp(new THREE.Color(bgC), L);
  scene.fog.color.copy(scene.background);
}

// ---------- 회의 소집 (#3 — 실제 send + 아바타 집합) ----------
let meeting = null;
function entWalkTo(ent, wx, wz, done){
  const pg = ent.set.person.grp;
  const lx = wx - ent.group.position.x, lz = wz - ent.group.position.z;
  ent.set.person.setStanding(true);
  ent.override = 'walk';
  const fx = pg.position.x, fy = pg.position.y, fz = pg.position.z;
  const dist = Math.hypot(lx-fx, lz-fz);
  ent.walkAnim = { fx, fy, fz, tx:lx, ty: done==='seat' ? 0.48 : 0.74, tz:lz,
                   t:0, dur: Math.max(dist/1.9, 0.4), done };
}
function convene(){
  if (!selected){ addChat('sy','시스템','먼저 노드를 클릭해 대상 부서를 선택하세요'); return; }
  const sel = nodes.get(selected); if (!sel) return;
  const deptId = sel.deptId;
  const members = [...nodes.values()].filter(e=>e.deptId===deptId && e.data.presence!=='dead');
  if (!members.length) return;
  const topic = document.getElementById('chat-input').value.trim() || '부서 회의';
  document.getElementById('chat-input').value = '';
  members.forEach(e=> postCommand(e.data.key, `[회의 소집 · 주인] ${topic} — 회의실 집합`, false));
  members.forEach((e,i)=>{
    const ang = (i/members.length)*Math.PI*2;
    entWalkTo(e, 4.4 + Math.cos(ang)*1.5, -2.2 + Math.sin(ang)*1.0, 'stand');
  });
  meeting = { deptId, until: performance.now() + 180000 };
  document.getElementById('b-dismiss').hidden = false;
  addChat('sy','시스템',`${deptId} 회의 소집 (${members.length}명) — 3분 후 자동 해산`);
  // 주인도 회의실로 강림
  if (owner && !owner.busy){
    const fy = sel.group.position.y;
    owner.plan = [
      { t:'walk', to:new THREE.Vector3(ELEV.x, owner.pr.grp.position.y, ELEV.z) },
      { t:'ride', y: fy+0.74 },
      { t:'focus', y: fy },
      { t:'walk', to:new THREE.Vector3(4.4, fy+0.74, -0.6) },
      { t:'say', text: `[회의] ${topic}` },
      { t:'wait', s: 6 },
    ];
    owner.busy = true;
    addChat('o','👑 주인', `[회의 소집] ${topic}`);
  }
}
function dismissMeeting(){
  if (!meeting) return;
  [...nodes.values()].filter(e=>e.deptId===meeting.deptId).forEach(e=>{
    if (e.override) entWalkTo(e, e.group.position.x, e.group.position.z + 0.52, 'seat');
  });
  meeting = null;
  document.getElementById('b-dismiss').hidden = true;
  addChat('sy','시스템','회의 해산 — 전원 복귀');
  if (owner){ // 주인 귀환 플랜
    const gy = owner.pr.grp.position.y;
    owner.plan = [
      { t:'walk', to:new THREE.Vector3(ELEV.x, gy, ELEV.z) },
      { t:'ride', y: ownerHome.y },
      { t:'unfocus' },
      { t:'walk', to: ownerHome.clone() },
    ];
    owner.busy = true;
  }
}

// ---------- 타임머신 (#4 — fx 아카이브 리플레이 · 최근 6시간) ----------
const replay = { mode:false, events:[], simT:0, t0:0, t1:0, idx:0, loaded:false };
const tlSlider = document.getElementById('tl-slider'), tlLabel = document.getElementById('tl-label');
async function loadHistory(){
  try {
    const j = await (await fetch('/history?after=' + (Date.now()/1000 - 21600))).json();
    replay.events = j.events || []; replay.loaded = true;
  } catch(e){ replay.events = []; }
}
tlSlider.addEventListener('input', async ()=>{
  const v = +tlSlider.value;
  if (v >= 1000){ exitReplay(); return; }
  if (!replay.loaded) await loadHistory();
  replay.t1 = Date.now()/1000;
  replay.t0 = replay.t1 - 21600;
  replay.simT = replay.t0 + (replay.t1 - replay.t0)*(v/1000);
  replay.idx = replay.events.findIndex(e=>e.ts > replay.simT);
  if (replay.idx < 0) replay.idx = replay.events.length;
  replay.mode = true;
});
function exitReplay(){ replay.mode = false; tlSlider.value = 1000; tlLabel.textContent = 'LIVE'; }
function replayTick(dt){
  replay.simT += dt*90;   // 90배속
  while (replay.idx < replay.events.length && replay.events[replay.idx].ts <= replay.simT){
    handleFx(replay.events[replay.idx].fx); replay.idx++;
  }
  tlLabel.textContent = '⏪ ' + new Date(replay.simT*1000).toLocaleTimeString('ko-KR',{hour12:false});
  tlSlider.value = Math.min(1000, Math.round((replay.simT - replay.t0)/(replay.t1 - replay.t0)*1000));
  if (replay.simT >= replay.t1) exitReplay();
}

// ---------- 티커·HUD ----------
const tickRows = document.getElementById('tick-rows');
function addTick(text, level){
  const div = document.createElement('div');
  div.className = 'row' + (level===2?' alert':level===1?' warn':'');
  div.textContent = new Date().toLocaleTimeString('ko-KR',{hour12:false}) + ' · ' + text;
  tickRows.prepend(div);
  while (tickRows.children.length > 11) tickRows.lastChild.remove();
}
function refreshStats(){
  let active=0; nodes.forEach(e=>{ if(e.data.presence==='active') active++; });
  document.getElementById('stats').textContent =
    `부서 ${worldMeta.deps} · 직원 ${worldMeta.total} · 활동중 ${active} · 데몬 v${worldMeta.daemonv} · SEQ ${worldMeta.seq}`;
}
const legend = document.getElementById('legend');
[['#63c47f','활동중(타이핑)'],['#3fb8dd','대기'],['#ffcc55','꾸벅(1h−)'],
 ['#8a93a6','수면(책상에 엎드림)'],['#ff5a5a','ctx≥90% · quiescing'],['#556677','빈 자리(dead)']]
 .forEach(([c,t])=>{ const d=document.createElement('div');
   d.innerHTML=`<i style="background:${c}"></i>${t}`; legend.appendChild(d); });

// ---------- 근접 대화 팝업 (2026-07-07 박사님 지시 — 실전달·흉내 아님) ----------
const talkEl = document.getElementById('talk');
const talkInput = document.getElementById('t-input');
const talkStatus = document.getElementById('t-status');
let talkKey = null, proxT = 0;
const TALK_ENTER_D = 2.3, TALK_EXIT_D = 3.1;   // 히스테리시스 — 경계에서 깜빡임 방지
function showTalk(ent){
  talkKey = ent.data.key;
  selected = talkKey;                            // 채팅창·selRing 대상 동기
  document.getElementById('chat-target').textContent = '대상: ' + labelOf(talkKey);
  document.getElementById('t-title').textContent =
    `💬 ${ent.deptId} · ${ent.data.role} — 근접 대화 (Enter로 입력)`;
  talkStatus.textContent = '실전달 모드: 입력 즉시 cys send + Return';
  talkEl.style.display = 'block';
}
function hideTalk(){
  if (!talkKey) return;
  talkKey = null;
  if (document.activeElement === talkInput) talkInput.blur();
  talkEl.style.display = 'none';
}
function positionTalk(){
  const ent = talkKey && nodes.get(talkKey);
  if (!ent){ hideTalk(); return; }
  const v = ent.group.position.clone().add(new THREE.Vector3(0, 2.1, 0)).project(camera);
  if (v.z > 1){ talkEl.style.visibility = 'hidden'; return; }
  talkEl.style.visibility = 'visible';
  const x = Math.max(8, Math.min(innerWidth - 375, (v.x*0.5 + 0.5)*innerWidth + 24));
  const y = Math.max(8, Math.min(innerHeight - 130, (-v.y*0.5 + 0.5)*innerHeight - 40));
  talkEl.style.left = x + 'px'; talkEl.style.top = y + 'px';
}
function proximityTick(){
  if (!owner || replay.mode){ hideTalk(); return; }
  const op = owner.pr.grp.position;
  let best = null, bestD = 1e9;
  nodes.forEach(ent=>{
    const p = ent.group.position;
    if (Math.abs(p.y - (op.y - 0.74)) > 0.5) return;        // 같은 층만
    if (ent.data.presence === 'dead') return;
    const d = Math.hypot(p.x - op.x, p.z - op.z);
    if (d < bestD){ bestD = d; best = ent; }
  });
  const limit = (best && talkKey === best.data.key) ? TALK_EXIT_D : TALK_ENTER_D;
  if (best && bestD < limit){
    if (talkKey !== best.data.key) showTalk(best);
  } else hideTalk();
}
async function talkSend(){
  const text = talkInput.value.trim();
  if (!text || !talkKey) return;
  if (HUD_TOKEN.startsWith('__')){ talkStatus.textContent = '조작 비활성 — 브리지 경유 접속 필요'; return; }
  talkInput.value = '';
  sayAt(owner.pr.grp.position, text, 4.5);                  // 주인 말풍선
  addChat('o', '👑 주인(근접)', text);
  talkStatus.textContent = '전송 중…';
  const ok = await postCommand(talkKey, text, false);       // 실전달 — cys send + Return
  talkStatus.textContent = ok ? '주입됨 — cys-terminal 반영 대기…' : '게이트 거부 또는 브리지 오류';
}
talkInput.addEventListener('keydown', e=>{
  if (e.key === 'Enter'){ talkSend(); e.stopPropagation(); }
  if (e.key === 'Escape'){ talkInput.blur(); e.stopPropagation(); }
});
document.getElementById('t-send').onclick = talkSend;
document.getElementById('t-peek').onclick = peekSelected;
addEventListener('keydown', e=>{                            // Enter = 말 걸기 (게임식)
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key === 'Enter' && talkKey){ talkInput.focus(); e.preventDefault(); }
});

// ---------- 채팅·버튼 핸들러 (#2 MMORPG) ----------
document.getElementById('chat-input').addEventListener('keydown', e=>{
  if (e.key !== 'Enter') return;
  const text = e.target.value.trim(); if (!text) return;
  if (!selected){ addChat('sy','시스템','대상이 없습니다 — 직원을 클릭하세요'); return; }
  if (HUD_TOKEN.startsWith('__')){ addChat('sy','시스템','브리지 경유 접속이 아니라 조작 불가'); return; }
  if (ownerDeliver(selected, text)) e.target.value = '';
});
async function peekSelected(){
  if (!selected){ addChat('sy','시스템','대상 없음 — 직원을 클릭'); return; }
  try {
    const r = await fetch('/peek?key=' + selected, { headers: { 'X-HUD-Token': HUD_TOKEN } });
    const j = await r.json();
    if (j.ok && j.lines.length){
      const tail = j.lines.slice(-3).join('  ⏎ ');
      const ent = nodes.get(selected);
      if (ent) sayAt(ent.group.position, tail, 6.5);
      addChat('st', labelOf(selected), tail);
    } else addChat('sy','시스템','응답 조회 실패');
  } catch(e){ addChat('sy','시스템','응답 조회 오류: ' + e.message); }
}
document.getElementById('chat-peek').onclick = peekSelected;
document.getElementById('chat-meet').onclick = convene;
document.getElementById('b-dismiss').onclick = dismissMeeting;
document.getElementById('b-director').onclick = (e)=>{
  directorOn = !directorOn; e.target.classList.toggle('on', directorOn); };
document.getElementById('b-voice').onclick = (e)=>{
  voiceOn = !voiceOn; e.target.classList.toggle('on', voiceOn);
  e.target.textContent = voiceOn ? '🔊 방송' : '🔇 방송';
  if (voiceOn) announce('안내방송을 시작합니다'); };

// ---------- SSE ----------
const connDot = document.getElementById('conn'), connT = document.getElementById('conn-t');
async function fetchWorld(){
  try { const w = await (await fetch('/world')).json(); buildWorld(w); } catch(e){}
}
function connect(){
  const es = new EventSource('/stream');
  es.onopen = ()=>{ connDot.className='on'; connT.textContent='실시간 연결됨'; };
  es.onerror = ()=>{ connDot.className='off'; connT.textContent='재접속 중…'; };
  es.onmessage = (m)=>{
    let f; try { f = JSON.parse(m.data); } catch(e){ return; }
    switch(f.t){
      case 'world': buildWorld(f.world); break;
      case 'patch': patchNode(f.key, f.node); break;
      case 'fx': if (!replay.mode){ handleFx(f); worldMeta.seq++; refreshStats(); } break;
      case 'resync': fetchWorld(); break;
    }
  };
}
connect();
addChat('sy','시스템','메타버스 오피스 가동 — 직원 클릭 → Enter: 👑 주인 강림 전달 · [응답]: 실제 pane 회수 · [🏛 회의]: 부서 소집');

// ---------- 루프 ----------
let last = performance.now();
function frame(now){
  const dt = Math.min((now-last)/1000, 0.05); last = now;
  const t = now/1000;
  nodes.forEach(ent=>{
    applyPose(ent, t, dt);
    const n = ent.data;
    if (n.presence==='sleeping' && Math.random() < dt*0.4)
      pops.push({ s:(()=>{ const s=textSprite('z',{size:16,color:'#96bede'});
        s.position.copy(ent.group.position).add(new THREE.Vector3(0.3,1.7,0.4));
        worldGroup.add(s); return s; })(), life:2.0, rise:0.6 });
    if (n.presence==='active' && Math.random() < dt*(1.5+5*(n.activity||0)))
      burst(ent, ROLE_COLOR[n.role] ?? 0x9fd8ff);
  });
  for (let i=sparks.length-1;i>=0;i--){ const s=sparks[i]; s.life-=dt;
    if (s.life<=0){ worldGroup.remove(s.m); s.m.material.dispose(); sparks.splice(i,1); continue; }
    s.m.position.addScaledVector(s.m.userData.v, dt);
    s.m.userData.v.y -= dt*2.2; s.m.material.opacity = s.life/0.6; }
  for (let i=pops.length-1;i>=0;i--){ const p=pops[i]; p.life-=dt;
    if (p.life<=0){ worldGroup.remove(p.s); p.s.material.map.dispose(); p.s.material.dispose();
      pops.splice(i,1); continue; }
    p.s.position.y += dt*(p.rise||0.35); p.s.material.opacity = Math.min(p.life/1.2, 1); }
  for (let i=ripples.length-1;i>=0;i--){ const r=ripples[i]; r.life-=dt;
    if (r.life<=0){ worldGroup.remove(r.r); r.r.material.dispose(); ripples.splice(i,1); continue; }
    r.r.scale.setScalar(r.r.scale.x + dt*10); r.r.material.opacity = r.life; }
  for (let i=flights.length-1;i>=0;i--){ const fl=flights[i]; fl.t += dt/fl.dur;
    if (fl.t>=1){ const e=nodes.get(fl.toKey);
      if (e) fxRipple(e.group.position);
      worldGroup.remove(fl.doc); worldGroup.remove(fl.trail);
      fl.doc.material.dispose(); fl.trail.material.dispose(); flights.splice(i,1); continue; }
    const mt=1-fl.t;
    fl.doc.position.set(
      mt*mt*fl.A.x + 2*mt*fl.t*fl.C.x + fl.t*fl.t*fl.B.x,
      mt*mt*fl.A.y + 2*mt*fl.t*fl.C.y + fl.t*fl.t*fl.B.y,
      mt*mt*fl.A.z + 2*mt*fl.t*fl.C.z + fl.t*fl.t*fl.B.z);
    fl.doc.rotation.y += dt*6;
    const pts = fl.trail.geometry.attributes.position;
    for (let k=pts.count-1;k>0;k--) pts.copyAt(k, pts, k-1);
    pts.setXYZ(0, fl.doc.position.x, fl.doc.position.y, fl.doc.position.z);
    pts.needsUpdate = true; }
  advanceOwner(dt, t);
  ownerManualTick(dt);
  proxT += dt;
  if (proxT > 0.2){ proxT = 0; proximityTick(); }
  if (talkKey) positionTalk();
  for (let i=bubbles.length-1;i>=0;i--){ const b=bubbles[i]; b.life-=dt;
    if (b.life<=0){ worldGroup.remove(b.s); b.s.material.map.dispose();
      b.s.material.dispose(); bubbles.splice(i,1); continue; }
    b.s.material.opacity = Math.min(b.life/1.0, 1); }
  nodes.forEach(ent=>{ const w = ent.walkAnim; if (!w) return;
    const pg = ent.set.person.grp;
    w.t += dt/w.dur;
    if (w.t >= 1){ pg.position.set(w.tx, w.ty, w.tz); ent.walkAnim = null;
      if (w.done === 'seat'){ ent.set.person.setStanding(false); ent.override = null;
        pg.rotation.y = Math.PI; pg.position.set(0, 0.48, 0.52); }
      else ent.override = 'stand';
      ent.set.person.swing(0); return; }
    pg.position.set(w.fx+(w.tx-w.fx)*w.t, w.fy+(w.ty-w.fy)*w.t, w.fz+(w.tz-w.fz)*w.t);
    pg.rotation.y = Math.atan2(w.tx-w.fx, w.tz-w.fz);
    ent.set.person.swing(t*9); });
  const nowMs = performance.now();
  ghosts.forEach((g,k)=>{ if (nowMs - g.ts > 600000) despawnGhost(k); });
  if (nowMs - lastLinkT > 1000){ lastLinkT = nowMs; updateLinks(nowMs); }
  weatherTick(dt);
  dayNightTick(dt);
  if (replay.mode) replayTick(dt);
  if (meeting && nowMs > meeting.until) dismissMeeting();
  updateCamera(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
setInterval(()=>{ document.getElementById('clock').textContent =
  new Date().toLocaleTimeString('ko-KR'); }, 1000);
</script>
